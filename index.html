: "1954م", "event": "تأسيس وزارة الأشغال العامة ووزارة المواصلات", "details": "تأسّست وزارة الأشغال العامّة وأنيطت بها مهمة تنفيذ وتأهيل الطرق والتقاطعات. أنشئت وزارة المواصلات (البرق والبريد والطيران المدني والسكك الحديدية وميناء العقبة).", "type": "تأسيس"}, {"date": "1955م", "event": "صدور قانون تشجيع الصناعة وقانون تشجيع توظيف رؤوس الأموال", "details": "صدر قانون تشجيع وتوجيه الصناعة الأردني، وفي العام نفسه صدر قانون تشجيع توظيف رؤوس الأموال الأجنبية.", "type": "قرار"}, {"date": "1958م", "event": "إنشاء مجلس الإعمار الأردني", "details": "أنشأت الحكومة مجلس الإعمار الأردني لتحقيق استغلال أمثل للموارد الاقتصادية المتاحة.", "type": "تأسيس"}, {"date": "1959م", "event": "تأسيس مؤسسة الإقراض الزراعي", "details": "تأسّست بهدف تنفيذ عمليات الائتمان الزراعي للمزارعين والجمعيات التعاونية الزراعية للنهوض بالزراعة وتحسينها، وكان لها استقلال مالي.", "type": "تأسيس"}, {"date": "1960م", "event": "تأسيس سلطة السياحة الأردنية", "details": "أُنشئت لمأسسة القطاع السياحي الأردني وتنظيمه، استجابة لتطور حركة السياحة عالميًا.", "type": "تأسيس"}, {"date": "1961م", "event": "إنشاء غرفة صناعة عمّان", "details": "أُنشئت لتكون ممثّلًا للقطاع الصناعي بعد أن كانت غرفة تجارة عمّان تمثّل القطاعين التجاري والصناعي.", "type": "تأسيس"}, {"date": "1963م", "event": "بدء العمل في قناة الغور الشرقية وتأسيس شركة الطيران الأردني (عالية)", "details": "بدأ العمل في قناة الغور الشرقية (قناة الملك عبد الله) التي تمتد لمسافة 110 كم تقريبًا. وتأسّست شركة الطيران الأردني (عالية).", "type": "تأسيس"}, {"date": "1964م", "event": "تأسيس البنك المركزي الأردني وقرارات قمة الإسكندرية", "details": "تأسس البنك المركزي الأردني مؤسسة رسمية مستقلة تتولى إصدار النقد. اتّخذ القادة العرب في قمة الإسكندرية قرارًا بجعل مشروع سدّ المخيبة جزءًا من المشروع العربي لاستثمار روافد نهر الأردن.", "type": "تأسيس"}, {"date": "1966م", "event": "افتتاح سدّ المخيبة", "details": "افتتح الملك الحسين بن طلال سد المخيبة في يوم الاستقلال. يهدف إلى تخزين المياه في الشتاء لإنقاذ الأراضي الزراعية من تحويل إسرائيل لمياه نهر الأردن. بلغت مساحة الأراضي التي غطّاها 70 ألف دونم.", "type": "تأسيس"}, {"date": "1967م", "event": "تأسيس بنك الإنماء الصناعي", "details": "تأسّس لتشجيع المشاريع الصناعية وتنشيطها وزيادة فرص العمل في مناطق المملكة كافّة.", "type": "تأسيس"}, {"date": "1967م", "event": "تدمير إسرائيل لسدّ المخيبة", "details": "دمّرت إسرائيل سدّ المخيبة في حرب حزيران 1967م.", "type": "حرب"}], "cards": [{"type": "مؤسسة", "title": "قناة الغور الشرقية (قناة الملك عبد الله)", "summary": "قناة ري رئيسية في الأغوار الأردنية بدأ العمل بها عام 1963م.", "details": "تمتد لمسافة 110 كم تقريبًا شرقي نهر الأردن، تمرّ من العدسية والمخيبة شمالًا إلى الشونة الجنوبية قرب البحر الميت. تتغذّى من مياه نهر اليرموك وسيل الزرقاء وآبار المخيبة الارتوازية والأودية المجاورة. تُعدّ الشريان الحيوي للمناطق الزراعية."}, {"type": "مؤسسة", "title": "سدّ المخيبة (سدّ الوحدة)", "summary": "سدّ على نهر اليرموك افتُتح عام 1966م.", "details": "اتّخذ القادة العرب في قمة الإسكندرية 1964م قرارًا بجعله جزءًا من المشروع العربي لاستثمار روافد نهر الأردن. هدفه تخزين المياه في الشتاء. غطّى 70 ألف دونم منها 40 ألفًا في الضفة الشرقية و30 ألفًا في الغربية. دمّرته إسرائيل عام 1967م."}, {"type": "مؤسسة", "title": "البنك المركزي الأردني", "summary": "مؤسسة رسمية مستقلة تتولى إصدار النقد، تأسست 1964م.", "details": "تتولى إصدار أوراق النقد والمسكوكات والشيكات والتحويلات، وقبول الودائع من الحكومة والمؤسّسات والبنوك، وإدارة قروض الحكومة، وشراء العملات الأجنبية وبيعها."}, {"type": "مؤسسة", "title": "مؤسسة الإقراض الزراعي", "summary": "مؤسسة لتمويل المزارعين تأسست عام 1959م.", "details": "كان لها استقلال مالي. تنفّذ عمليات الائتمان الزراعي للمزارعين والجمعيات التعاونية الزراعية للنهوض بالزراعة وتحسينها."}, {"type": "مؤسسة", "title": "شركة مناجم الفوسفات الأردنية", "summary": "شركة مساهمة محدودة لاستخراج الفوسفات.", "details": "صُدّرت أول كمية فوسفات عام 1951م. تواصل أعمالها باستخراج الفوسفات من مناجمه في الرصيفة. بدأت عام 1960م بإنتاج السوبر فوسفات للاستهلاك المحلي. من أبرز المستوردين: يوغسلافيا والهند وتشيكوسلوفاكيا وبولندا واليابان وإيطاليا."}, {"type": "مؤسسة", "title": "شركة البوتاس العربية", "summary": "شركة مساهمة تأسست عام 1951م لاستغلال ثروات البحر الميت.", "details": "بنت ملاحات ومصنعًا تجريبيًا في المنطقة الواقعة جنوبي البحر الميت."}, {"type": "مؤسسة", "title": "ميناء العقبة", "summary": "المنفذ البحري الرئيسي للأردن.", "details": "أنشأت الحكومة الأردنية سلطة ميناء العقبة عام 1952م، وعهدت إليها إنشاء وإدارة وتنمية الميناء. جرت توسعته عام 1964م ليصبح منفذًا تجاريًا مهمًا للبلاد بعد إغلاق الموانئ الفلسطينية أمام التجارة الأردنية عام 1948م."}]}, {"id": "lesson_3_2_3", "title": "الحياة الاقتصادية في الأردن بين عامَي 1968-1999م", "timeline": [{"date": "1972م", "event": "صدور قانون تشجيع الاستثمار وتأسيس مؤسسة سكة حديد العقبة", "details": "صدر قانون تشجيع الاستثمار وسهّل عمليات الاستثمار العربية والأجنبية. تأسّست مؤسسة سكة حديد العقبة التي مدّت خطًا من بطن الغول إلى العقبة لنقل الفوسفات. تأسّس مطار العقبة في العام نفسه.", "type": "قرار"}, {"date": "1973م", "event": "بدء تجربة المناطق الحرّة", "details": "أُقيمت في ميناء العقبة منطقة حرّة عامّة صغيرة لتنمية التجارة الخارجية وخدمة تجارة الترانزيت.", "type": "تأسيس"}, {"date": "1976م", "event": "إنشاء مؤسسة المناطق الحرّة", "details": "أُنشئت ومن مهامّها إنشاء المناطق الحرّة وإدارة الاستثمار فيها والإشراف عليها.", "type": "تأسيس"}, {"date": "1980م", "event": "إنشاء مؤسسة المدن الصناعية", "details": "أُنشئت لدعم القطاع الصناعي الأردني.", "type": "تأسيس"}, {"date": "1983م", "event": "إنشاء مطار الملكة علياء الدولي", "details": "أُنشئ المطار جنوب العاصمة عمّان.", "type": "تأسيس"}, {"date": "1984م", "event": "افتتاح مدينة سحاب الصناعية", "details": "افتتحت كأول مدينة صناعية في الأردن، وسُمّيت لاحقًا مدينة الملك عبد الله الثاني ابن الحسين الصناعية.", "type": "تأسيس"}, {"date": "1986م", "event": "تغيير اسم شركة الطيران إلى الملكية الأردنية", "details": "تغيّر اسم شركة الطيران الأردني (عالية) إلى الملكية الأردنية.", "type": "قرار"}, {"date": "1988م", "event": "إعادة تسمية وزارة الأشغال", "details": "أُعيدت تسمية وزارة الأشغال العامّة لتصبح وزارة الأشغال العامّة والإسكان، وقامت بتنفيذ وتأهيل وصيانة الطرق والجسور والمباني العامّة.", "type": "قرار"}, {"date": "1989م", "event": "الأزمة الاقتصادية وانخفاض سعر الدينار", "details": "أدّت زيادة الإنفاق العام والاعتماد على القروض وانخفاض أسعار الفوسفات والبوتاس عالميًا إلى تأثير سلبي في الاقتصاد. انخفض سعر صرف الدينار إلى نصف قيمته. قُوبل الوضع باحتجاجات شعبية واسعة انتهت باستقالة الحكومة في نيسان 1989م.", "type": "ثورة"}, {"date": "1990-1991م", "event": "تداعيات أزمة الخليج الثانية", "details": "تعرّض الاقتصاد لهزّة جديدة بسبب احتلال العراق للكويت وعودة آلاف الأردنيين المغتربين العاملين في دول الخليج إلى البلاد بصورة مفاجئة. انخفض حجم التحويلات وارتفعت البطالة وتوقّفت الصادرات إلى دول الخليج.", "type": "حرب"}, {"date": "1995م", "event": "إصدار قانون جديد لتشجيع الاستثمار", "details": "أصدرته الحكومة لإنعاش الحياة الاقتصادية وتشجيع الاستثمارات المحلّية والعربية والأجنبية وجذبها.", "type": "قرار"}, {"date": "1997م", "event": "توقيع اتفاقية الشراكة مع الاتحاد الأوروبي", "details": "وقّع الأردن الاتفاقية ضمن جهوده لتنشيط الاقتصاد وتعزيز العلاقات التجارية الدولية.", "type": "معاهدة"}, {"date": "1998م", "event": "اتفاقية منطقة التجارة الحرّة العربية", "details": "وقّع الأردن الاتفاقية لتعزيز التعاون الاقتصادي مع الدول العربية.", "type": "معاهدة"}], "cards": [{"type": "مفهوم", "title": "المناطق الحرّة", "summary": "شكل تنظيمي استثماري لجذب الاستثمارات وتسهيلها.", "details": "بدأت تجربة المناطق الحرّة في الأردن عام 1973م في ميناء العقبة. أُنشئت مؤسسة المناطق الحرّة عام 1976م لإنشاء المناطق الحرّة وإدارتها والإشراف عليها."}, {"type": "مؤسسة", "title": "مدينة سحاب الصناعية", "summary": "أول مدينة صناعية في الأردن افتُتحت عام 1984م.", "details": "سُمّيت لاحقًا مدينة الملك عبد الله الثاني ابن الحسين الصناعية. أُنشئت في إطار مسيرة إنشاء المدن الصناعية بعد تأسيس مؤسسة المدن الصناعية عام 1980م."}, {"type": "مفهوم", "title": "الأزمة الاقتصادية 1989م", "summary": "أزمة اقتصادية أدّت إلى انخفاض الدينار وقيام هبّة شعبية.", "details": "أسبابها زيادة الإنفاق العام والاعتماد على القروض وانخفاض أسعار الفوسفات والبوتاس. لجأت الحكومة لرفع الأسعار ورفع الدعم. انخفض سعر الدينار إلى نصف قيمته. قُوبل الوضع باحتجاجات شعبية أدّت لاستقالة الحكومة وعودة الحياة النيابية."}, {"type": "مفهوم", "title": "عجز الميزان التجاري", "summary": "من أبرز التحديات التي واجهت القطاع التجاري الأردني.", "details": "من تحديات القطاع التجاري بين 1968-1999م، إلى جانب الأوضاع الأمنية وعدم الاستقرار في الإقليم وضعف المنافسة."}, {"type": "مؤسسة", "title": "مطار الملكة علياء الدولي", "summary": "المطار الدولي الرئيسي للأردن.", "details": "أُنشئ عام 1983م جنوب العاصمة عمّان. افتُتح مبنى المسافرين الجديد عام 2013م ليرفع قدرته الاستيعابية إلى 9 ملايين مسافر سنويًا، ثم 12 مليونًا بعد ثلاث سنوات."}, {"type": "معاهدة", "title": "اتفاقية الشراكة مع الاتحاد الأوروبي 1997م", "summary": "اتفاقية وقّعها الأردن لتعزيز علاقاته الاقتصادية مع أوروبا.", "details": "من أبرز الاتفاقيات الاقتصادية التي وقّعها الأردن في إطار جهود إنعاش الحياة الاقتصادية بعد أزمة الخليج وتحفيز الاستثمار."}]}, {"id": "lesson_3_2_4", "title": "الحياة الاقتصادية في الأردن منذ عام 1999م", "timeline": [{"date": "2000م", "event": "افتتاح مدينة الحسين بن عبد الله الثاني الصناعية", "details": "افتتحت في محافظة الكرك لتكون أول مدينة صناعية في جنوبي الأردن وصرحًا اقتصاديًا تنمويًا وإنتاجيًا.", "type": "تأسيس"}, {"date": "2001م", "event": "اتفاقية التجارة الحرة مع الولايات المتحدة وإنشاء هيئة تنظيم النقل", "details": "أُبرمت اتفاقية التجارة الحرّة بين الأردن والولايات المتحدة الأمريكية لإقامة منطقة تجارة حرة بين البلدين وتشجيع النمو الاقتصادي. وأُنشئت هيئة تنظيم قطاع النقل العام.", "type": "معاهدة"}, {"date": "2002م", "event": "صدور قانون الهيئة البحرية الأردنية", "details": "صدر القانون بهدف تنظيم ومراقبة وتطوير قطاع النقل البحري في المملكة، وتعزيز دور القطاع الخاصّ، ومنع الاحتكار، ورفع مستويات السلامة والأمن البحري.", "type": "قرار"}, {"date": "2003م", "event": "افتتاح مدينة العقبة الصناعية الدولية", "details": "افتُتحت لتكون حاضنة للاستثمارات الصناعية ورافعة اقتصادية للأنشطة الاقتصادية في المملكة.", "type": "تأسيس"}, {"date": "2005م", "event": "تأسيس غرفة صناعة م", "timeline": [{"date": "1921م", "event": "تأسيس إمارة شرقي الأردن", "details": "بلغ عدد سكان الأردن عند تأسيس الإمارة ثلاثمئة ألف نسمة، وكان معظمهم يمارسون الزراعة وتربية الماشية، واتسم المجتمع بالطابع القبلي وسيادة الأعراف العشائرية.", "type": "تأسيس"}, {"date": "1925م", "event": "تأسيس جمعية النهضة الأرثوذكسية وافتتاح أول صيدلية في عمّان", "details": "تشكلت أول جمعية بعد تأسيس الإمارة باسم جمعية النهضة الأرثوذكسية، وافتُتحت أول صيدلية في عمّان كخطوة في تطوير الرعاية الصحية.", "type": "تأسيس"}, {"date": "1926م", "event": "تأسيس جمعية التضامن النسائي الاجتماعي", "details": "أول جمعية نسائية في الأردن برئاسة الملكة مصباح زوجة الملك عبد الله الأول، وضمّت عددًا من زوجات التجار والأعيان. وبلغ عدد الأطباء في الأردن آنذاك 28 طبيبًا وطبيبة.", "type": "تأسيس"}, {"date": "1937م", "event": "افتتاح وحدة طبّية متنقّلة لمنطقة البادية", "details": "تألفت الوحدة الطبية المتنقلة من طبيب وممرضَين اثنين لتقديم الرعاية الصحية لسكان البادية.", "type": "تأسيس"}, {"date": "1944م", "event": "إعادة تأسيس جمعية التضامن النسائي الاجتماعية", "details": "بهدف العناية بالنساء الفقيرات والتدبير المنزلي وتعليم الخياطة.", "type": "تأسيس"}, {"date": "1945م", "event": "تأسيس جمعية الاتحاد النسائي الأردني", "details": "من الجمعيات النسائية التي اهتمت بقضايا المرأة الأردنية ودعم الأسر المحتاجة.", "type": "تأسيس"}, {"date": "1948م", "event": "الحرب العربية اليهودية", "details": "أسفرت عن هجرة عشرات الألوف من اللاجئين الفلسطينيين المهجرين من مدنهم وقراهم إلى الأردن، وتضاعف عدد سكان الأردن وواجه تحديات اجتماعية واقتصادية كبيرة.", "type": "حرب"}, {"date": "1950م", "event": "وحدة الضفّتين وإنشاء أول وزارة للصحّة", "details": "غدت الضفة الغربية جزءًا من الأردن بعد وحدة الضفّتين، ومُنحت الجنسية الأردنية للاجئين الفلسطينيين، وأُنشئت أول وزارة للصحّة في الأردن.", "type": "قرار"}], "cards": [{"type": "مفهوم", "title": "فئات المجتمع الأردني في عهد الإمارة", "summary": "تكوّن المجتمع الأردني عند تأسيس الإمارة من سكان القرى والقصبات والبادية.", "details": "سكان القرى من الفلاحين المنتظمين في عشائر، وسكان القصبا "type": "أخرى"}], "cards": [{"type": "مفهوم", "title": "الإستراتيجية الوطنية للحماية الاجتماعية 2019-2025م", "summary": "خطة وطنية لتحقيق الاكتفاء الذاتي اقتصاديًا.", "details": "تهدف إلى توفير خدمات التعليم والرعاية الصحية وغيرها من الخدمات الاجتماعية للمواطن، ودعم الأسر المحدودة الدخل، وتنفيذ المشاريع التنموية الإنتاجية."}, {"type": "مؤسسة", "title": "صندوق المعونة الوطنية", "summary": "يقدم المعونات المالية الشهرية للأسر العفيفة.", "details": "قدّم دعمًا لعمال المياومة المتضررين من جائحة كورونا، ويستمر في تقديم المعونات الشهرية للأسر المحتاجة ضمن منظومة الحماية الاجتماعية الأردنية."}, {"type": "مؤسسة", "title": "صندوق الملك عبد الله الثاني للتنمية", "summary": "مبادرة ملكية للنهوض بواقع المجتمعات المحلية.", "details": "أحد المبادرات الملكية إلى جانب الصندوق الهاشمي لتنمية البادية الأردنية، والمناطق التنموية في العقبة والمفرق وإربد ومعان والبحر الميت، والمشاريع الخدمية في قطاعَي الصحة والتعليم."}, {"type": "مؤسسة", "title": "هيئة شباب كلّنا الأردن", "summary": "هيئة شبابية أُنشئت عام 2006م.", "details": "إحدى المبادرات الملكية لإشراك الشباب في الحوار الوطني، إلى جانب جوائز الملك عبد الله الثاني للياقة البدنية والإنجاز والإبداع الشبابي."}, {"type": "جائزة", "title": "جائزة الملك عبد الله الثاني للياقة البدنية", "summary": "أُطلقت عام 2005م لرفع لياقة الطلبة.", "details": "تهدف إلى رفع مستوى اللياقة الصحية للطلبة في المدارس الأردنية والكشف عن قدراتهم الخاصة، واستثمار أوقات فراغهم على نحو إيجابي."}, {"type": "سبب_ونتيجة", "title": "أثر اللجوء السوري", "summary": "أكبر تحدٍ واجه الأردن منذ 2011م.", "details": "ضغوط متزايدة على الموارد المائية المحدودة، والخدمات العامة كالتعليم والصحة والبنية التحتية، وانعكاسات اجتماعية واقتصادية واسعة استدعت تدخّل المجتمع الدولي."}, {"type": "مفهوم", "title": "رعاية ذوي الإعاقة", "summary": "اهتمام بدمج ذوي الإعاقة في المجتمع.", "details": "شملت حملة (مدرستي) و(مكاني بينكم)، وتوفير فرص العمل، وإنشاء مراكز تشخيص الإعاقات ومراكز الكشف المبكر عنها، إلى جانب المجلس الأعلى لحقوق الأشخاص ذوي الإعاقة."}]}]}, {"id": "unit_4_2", "title": "التعليم والثقافة في الأردن", "general_idea": "تطور التعليم العام والعالي والحياة الثقافية في الأردن منذ تأسيس الإمارة، باعتبار التعليم جوهر التغيير السياسي والاقتصادي والاجتماعي، ودور الصحافة والإذاعة والتلفزيون والمؤسسات الثقافية في بناء الهوية الوطنية.", "lessons": [{"id": "lesson_4_2_1", "title": "التعليم العام في الأردن بين عامَي 1921-1950م", "timeline": [{"date": "1921م", "event": "تأسيس الإمارة وبدء التعليم النظامي", "details": "بلغ عدد المدارس الحكومية 44 مدرسة بما فيها مدرستان ثانويتان في السلط وإربد، وكان التعليم في الحكم العثماني مقتصرًا على بعض المدارس الأولية والابتدائية.", "type": "تأسيس"}, {"date": "1923م", "event": "وضع حجر الأساس للمدرسة السلطانية (الثانوية) في السلط", "details": "احتُفل بوضع حجر الأساس، وانعقد فيها أول مؤتمر للمعلمين في شرقي الأردن في صيف العام نفسه.", "type": "تأسيس"}, {"date": "1924م", "event": "تأسيس مدرسة الصنائع والفنون في عمّان", "details": "أول مدرسة صناعية في الأردن، ضمت شعبة للحدادة وشعبة للنجارة، واحتوت على قسم داخلي للطلاب.", "type": "تأسيس"}, {"date": "1926م", "event": "صدور قانون التدريسات الابتدائية", "details": "حدّد بموجبه المواد التدريسية في المدارس الابتدائية، وكان من أوائل القوانين التعليمية في الإمارة.", "type": "قرار"}, {"date": "1939م", "event": "صدور نظام المعارف", "details": "أهم حدث في تاريخ التعليم في عهد الإمارة، نظّم العمل التربوي والمدرسي في الإمارة.", "type": "قرار"}, {"date": "1940م", "event": "إنشاء أول وزارة للمعارف", "details": "حلّت محل دائرة المعارف، وأصبحت مسؤولة عن الإشراف على المدارس الحكومية ومناهج التدريس.", "type": "تأسيس"}, {"date": "1949-1950م", "event": "ارتفاع عدد المدارس", "details": "بلغ عدد المدارس الحكومية 112 مدرسة منها 8 ثانوية ومدرسة صناعية، وعدد المدارس الخاصة 125 مدرسة.", "type": "أخرى"}], "cards": [{"type": "مفهوم", "title": "المدارس الأميرية (الحكومية)", "summary": "المدارس الحكومية في عهد الإمارة.", "details": "نمت ببطء حتى بلغت عند الاستقلال 77 مدرسة، وكانت تشكل العمود الفقري للتعليم النظامي، وكثير من معلميها كانوا من سوريا وفلسطين ولبنان ومصر."}, {"type": "مفهوم", "title": "المدارس الخاصة", "summary": "مدارس الإرساليات التبشيرية وجمعيات الأفراد.", "details": "مثل مدارس المطران والتراسانطة والراهبات الوردية، وأسهمت في النهضة التعليمية في عهد الإمارة، ونمت مع نمو المدارس الحكومية."}, {"type": "مفهوم", "title": "المدارس المهنية", "summary": "خلت إمارة شرقي الأردن من المدارس المهنية تقريبًا.", "details": "باستثناء مدرسة الصنائع والفنون في عمّان التي ضمت شعبتي الحدادة والنجارة، وكان عدد خريجيها قليلًا."}, {"type": "مؤسسة", "title": "نظام المعارف 1939م", "summary": "أهم تشريع تعليمي في عهد الإمارة.", "details": "صدر عام 1939م ونظّم العمل التربوي والمدرسي في الإمارة، وكان مهد إنشاء أول وزارة للمعارف عام 1940م محل دائرة المعارف."}, {"type": "سبب_ونتيجة", "title": "إسهام المجتمع المحلي في التعليم", "summary": "تحمّل الأهالي والبلديات أعباء التعليم.", "details": "أسهم المجتمع المحلي بدفع تكاليف التعليم: بناء المدارس وصيانتها، ودفع أجور المعلمين، وتقديم قطع الأراضي لوزارة المعارف، وتولّت البلديات والمجالس القروية بناء المدارس الأساسية."}]}, {"id": "lesson_4_2_2", "title": "التعليم العام في الأردن منذ عام 1951م", "timeline": [{"date": "1952م", "event": "إنشاء دار المعلمين في عمّان والدستور الأردني", "details": "أُنشئت دار المعلمين في عمّان لتدريب المعلمين، وأصبح التعليم الابتدائي إلزاميًا ومجانيًا في المدارس الحكومية مع صدور الدستور الأردني.", "type": "تأسيس"}, {"date": "1956م", "event": "تغيير اسم وزارة المعارف إلى وزارة التربية والتعليم", "details": "ضمن مرحلة التطور في عهد الملك حسين بن طلال الذي تولى سلطاته الدستورية عام 1953م.", "type": "قرار"}, {"date": "1961م", "event": "استحداث إدارة التعليم المهني", "details": "في وزارة التربية والتعليم للإشراف على المدارس المهنية في المملكة.", "type": "تأسيس"}, {"date": "1964م", "event": "صدور قانون التربية والتعليم رقم 16", "details": "نص على إنشاء مدرسة حيثما يوجد 20 طالبًا في أي حي أو قرية، وتوزيع الكتب المدرسية مجانًا على طلبة التعليم الإلزامي.", "type": "قرار"}, {"date": "1967م", "event": "آثار حرب حزيران على التعليم", "details": "نزوح 350 ألفًا تقريبًا من أبناء الضفة الغربية واللاجئين فيها إلى الضفة ا فالتعليم الأساسي 10 أعوام، ثم الثانوية بمسارَي الأكاديمي والتطبيقي، وأعدّ معلمي المرحلة الأساسية عبر إلحاقهم بكليات التربية في الجامعات الثلاث: الأردنية واليرموك ومؤتة."}, {"type": "مؤسسة", "title": "مدارس الملك عبد الله الثاني للتميز", "summary": "مدارس متميزة في كل المحافظات.", "details": "ضمن مبادرات تطوير نوعية التعليم في عهد الملك عبد الله الثاني، إلى جانب توظيف تكنولوجيا المعلومات في التعليم، وإدخال الحواسيب إلى المدارس، وتدريس اللغة الإنجليزية في المراحل الأساسية الدنيا، والمراكز الريادية للطلبة الموهوبين."}, {"type": "مؤسسة", "title": "مدارس الثقافة العسكرية", "summary": "مدارس تابعة للقوات المسلحة الأردنية.", "details": "بدأت مع تأسيس الجيش العربي بمعلمين متجولين لمحو الأمية بين العسكريين، وتطورت إلى قسم الثقافة العسكرية، ثم مديرية التربية والتعليم والثقافة العسكرية عام 1981م التي تُشرف على المكرمة الملكية لأبناء العسكريين."}, {"type": "مفهوم", "title": "نظام BTEC", "summary": "نظام تعليمي مهني يركز على الجانب العملي التطبيقي.", "details": "أُطلق بالشراكة مع شركة Pearson العالمية في عدد من المدارس الحكومية بدءًا من العام الدراسي 2022/2023م، لتزويد الطلبة بمهارات تقنية ومهنية متقدمة تؤهلهم للاندماج في سوق العمل المحلي والدولي."}, {"type": "جائزة", "title": "جائزة الملكة رانيا العبد الله للتميز التربوي", "summary": "جائزة أُطلقت عام 2006م.", "details": "انبثقت عنها جائزة المعلم المتميز، وجائزة المدير المتميز، ثم جائزة المرشد التربوي المتميز، إلى جانب مبادرات تربوية مثل (لمدرستي أنتمي) و(نحو بيئة مدرسية آمنة)."}]}, {"id": "lesson_4_2_3", "title": "التعليم العالي والبحث العلمي في الأردن", "timeline": [{"date": "1951م", "event": "بداية التعليم العالي في الأردن", "details": "افتُتح صف لتدريس المعلمين في كلية الحسين الثانوية في عمّان، نواةً للتعليم العالي في البلاد.", "type": "تأسيس"}, {"date": "1952م", "event": "إنشاء دار المعلمين في عمّان", "details": "مدة الدراسة فيها عامان، وتطورت دور المعلمين فيما بعد لتصبح كليات مجتمع.", "type": "تأسيس"}, {"date": "1962م", "event": "تأسيس الجامعة الأردنية", "details": "أول جامعة في الأردن، وكانت نقلة نوعية في التعليم العالي، تلاها إنشاء جامعات اليرموك ومؤتة والعلوم والتكنولوجيا.", "type": "تأسيس"}, {"date": "1985م", "event": "ارتفاع كليات المجتمع إلى 52 كلية", "details": "كلية مجتمع موزعة على مختلف أنحاء المملكة، بالإضافة إلى كليات مجتمع خاصة.", "type": "أخرى"}, {"date": "1989-2022م", "event": "تأسيس الجامعات الخاصة", "details": "سُمح بتأسيس جامعات خاصة كفيلادلفيا وعمّان الأهلية والعلوم التطبيقية والإسراء والأميرة سمية للتكنولوجيا والبترا والزيتونة وعمّان العربية والشرق الأوسط وغيرها.", "type": "قرار"}, {"date": "2007م", "event": "إنشاء هيئة الاعتماد وضمان الجودة", "details": "للارتقاء بأداء مؤسسات التعليم العالي الأردنية وتعزيز قدرتها التنافسية العالمية.", "type": "تأسيس"}, {"date": "2018م", "event": "إنشاء صندوق البحث العلمي والابتكار", "details": "تابع لوزارة التعليم العالي والبحث العلمي لدعم البحث العلمي في البلاد.", "type": "تأسيس"}], "cards": [{"type": "مؤسسة", "title": "الجامعة الأردنية", "summary": "أول جامعة حكومية في الأردن، تأسست عام 1962م.", "details": "في عمّان، نقلة نوعية في التعليم العالي الأردني، تلاها إنشاء 9 جامعات حكومية أخرى موزعة على المحافظات بلغ عددها 10 جامعات حكومية."}, {"type": "مؤسسة", "title": "جامعة مؤتة", "summary": "جامعة حكومية في الكرك.", "details": "تأسست بعد الجامعة الأردنية واليرموك، وتعد إحدى الجامعات الحكومية الكبرى في جنوب الأردن، تضم شقًا عسكريًا ومدنيًا."}, {"type": "مؤسسة", "title": "دار المعلمين في عمّان", "summary": "أُنشئت عام 1952م لتدريب المعلمين.", "details": "مدة الدراسة فيها عامان، تطورت لتصبح كليات مجتمع ووصل عددها إلى 52 كلية عام 1985م، إلى جانب كليات مجتمع خاصة."}, {"type": "مؤسسة", "title": "هيئة الاعتماد وضمان الجودة", "summary": "هيئة أُنشئت عام 2007م.", "details": "تعنى بالارتقاء بأداء مؤسسات التعليم العالي الأردنية وتعزيز قدرتها التنافسية العالمية، ضمن جهود ضبط جودة التعليم."}, {"type": "مؤسسة", "title": "صندوق البحث العلمي والابتكار", "summary": "صندوق تابع لوزارة التعليم العالي أُنشئ 2018م.", "details": "لدعم البحث العلمي في الأردن وتوفير التمويل اللازم للباحثين والمشاريع البحثية."}, {"type": "سبب_ونتيجة", "title": "البعثات العلمية", "summary": "إرسال المتفوقين للدراسة في جامعات عربية.", "details": "اعتادت دائرة المعارف ووزارة المعارف الأردنية ابتعاث المتفوقين للدراسة في الجامعة الأمريكية في بيروت، ودار المعلمين العالية في بغداد، والجامعة السورية في دمشق، والطالبات إلى دار المعلمات في القدس."}]}, {"id": "lesson_4_2_4", "title": "الحياة الثقافية في الأردن منذ عام 1921م", "timeline": [{"date": "1920-1921م", "event": "صدور صحيفة الحق يعلو", "details": "أول صحيفة أردنية صدرت في معان، أصدرها الأمير عبد الله بن الحسين، تبنّت مبادئ الثورة العربية الكبرى.", "type": "تأسيس"}, {"date": "1923م", "event": "صدور صحيفة الشرق العربي", "details": "دخلت المطبعة إلى عمّان، وأصدرت الحكومة صحيفة الشرق العربي لتكون الجريدة الرسمية، أشرف على تحريرها الأديب محمد الشريقي.", "type": "تأسيس"}, {"date": "1926م", "event": "تحول الشرق العربي إلى الجريدة الرسمية", "details": "تغير اسمها لتصبح (الجريدة الرسمية لحكومة شرقي الأردن) وتولّت نشر البيانات والأنظمة والقوانين.", "type": "قرار"}, {"date": "1948م", "event": "إنشاء أول إذاعة في الأردن", "details": "باسم إذاعة القدس، تحوّلت إلى إذاعة المملكة الأردنية الهاشمية، ظلت تعمل من رام الله حتى انتقلت إلى عمّان عام 1956م.", "type": "تأسيس"}, {"date": "1966م", "event": "تأسيس دائرة الثقافة والفنون", "details": "اهتمت بالكُتّاب والمثقّفين والفنّانين ودعم إنتاجهم الفكري، وتحوّلت إلى وزارة الثقافة والشباب عام 1977م.", "type": "تأسيس"}, {"date": "1968م", "event": "افتتاح التلفزيون الأردني", "details": "افتُتحت أوّل محطة للتلفزيون الأردني بالأبيض والأسود في منطقة أم الحيران، وتحوّل إلى الملوّن في السبعينيات.", "type": "تأسيس"}, {"date": "1976م", "event": "تأسيس مجمع اللغة العربية الأردني", "details": "بهدف الحفاظ على سلامة اللغة العربية ومواكبتها لمتطلبات الآداب والفنون والعلوم الحديثة.", "type": "تأسيس"}, {"date": "1980م", "event": "إنشاء مؤسسة آل البيت للفكر الإسلامي", "details": "باسم المجمع الملكي لبحوث الحضارة الإسلامية، لتقديم تصور إسلامي معاصر وتعميق الحوار بين المذاهب الإسلامية ونشر الدراسات عن تاريخ الأردن.", "type": "تأسيس"}, {"date": "2002م", "event": "اختيار عمّان عاصمة للثقافة العربية", "details": "ضمن جهود وزارة الثقافة في نشر الإنتاج الثقافي الأردني وإبراز الوجه الحضاري للمملكة.", "type": "أخرى"}], "cards": [{"type": "شخصية", "title": "عرار (مصطفى وهبي التل)", "summary": "من أبرز شعراء الأردن في عهد الإمارة.", "details": "صاحب ديوان (عشيّات وادي اليابس)، ويعد رمزًا أدبيًا أردنيًا، وأُسس في إربد بيت عرار الثقافي تكريمًا له."}, {"type": "شخصية", "title": "محمد الشريقي", "summary": "مؤسس جريدة الشرق العربي وصاحب ديوان أغاني الصبا.", "details": "أديب أردني تولّى تحرير صحيفة الشرق العربي التي أصبحت الجريدة الرسمية، وأسهم في تعزيز الجانب الثقافي في إمارة شرقي الأردن."}, {"type": "مؤسسة", "title": "وزارة الثقافة", "summary": "وزارة دعم الحركة الثقافية الأردنية.", "details": "أصدرت جائزة الدولة التقديرية والتشجيعية، وأطلقت مهرجان القراءة للجميع ضمن مبادرة (مكتبة الأسرة)، واختارت عمّان عاصمة للثقافة العربية 2002م، وتعلن كل عام مدينة الثقافة الأردنية."}, {"type": "مؤسسة", "title": "وكالة الأنباء الأردنية (بترا)", "summary": "مؤسسة إعلامية رسمية.", "details": "تتولى نشر الأخبار الرسمية والعامة وتوزيعها على الصحف، وتعد المصدر الرسمي للأخبار في المملكة الأردنية الهاشمية."}, {"type": "مؤسسة", "title": "مؤسسة آل البيت للفكر الإسلامي", "summary": "أُنشئت 1980م كمجمع ملكي لبحوث الحضارة الإسلامية.", "details": "سعت لتقديم تصور إسلامي معاصر لقيم المجتمع، ومواجهة قضايا العصر بحلول إسلامية، وتعميق الحوار بين المذاهب الإسلامية، ونشر الدراسات عن تاريخ الأردن."}, {"type": "مؤسسة", "title": "مجمع اللغة العربية الأردني", "summary": "أُسس عام 1976م للحفاظ على اللغة العربية.", "details": "نشر المؤلفات التراثية العربية، وترجم بعض مؤلفات العلوم الطبية والبحتة إلى العربية، ويُصدر مجلة علمية بالإضافة إلى مجلة البيان العربي الثقافية."}, {"type": "مؤسسة", "title": "إذاعة المملكة الأردنية الهاشمية", "summary": "أول إذاعة في الأردن، أُسست 1948م.", "details": "نشأت باسم إذاعة القدس وعملت من رام الله، ثم انتقلت إلى عمّان عام 1956م، وبثت البرنامج العام والأجنبي والبرامج الأدبية المختلفة."}, {"type": "مؤسسة", "title": "التلفزيون الأردني", "summary": "أول تلفزيون أردني افتُتح عام 1968م.", "details": "بدأ بالأبيض والأسود ثم تحوّل إلى الملوّن، ولديه قناة ثانية باللغة الإنجليزية، وأسهم في تنشيط الحركة الثقافية الأردنية باستقطاب الأدباء والفنانين العرب."}, {"type": "مؤسسة", "title": "مؤسسة عبد الحميد شومان", "summary": "مؤسسة ثقافية أهلية.", "details": "تمارس أنشطة ثقافية كالمحاضرات والحوارات والندوات، وتقدم جوائز كجائزة شومان للباحثين العرب، وجائزة شومان لمعلمي العلوم، ومسابقة الإنتاج الإبداعي للأطفال."}, {"type": "مكان", "title": "متحف الأردن", "summary": "من أبرز المتاحف في عمّان.", "details": "يضم مقتنيات تاريخية أردنية مهمة، إلى جانب متاحف أخرى كصرح الشهيد، والتراث الأردني، ومتحف الحياة السياسية في عمّان، ومتحف الملك عبد الله الأول في معان، ومتحف الكتاب المدرسي في السلط."}]}]}, {"id": "unit_4_3", "title": "سوق العمل والتوجيه المهني", "general_idea": "حاجات سوق العمل الأردني، وأهمية التوجه المهني والتدريب العملي والابتكار وريادة الأعمال لتعزيز التنمية الاقتصادية والاجتماعية وسد الفجوة بين العرض والطلب.", "lessons": [{"id": "lesson_4_3_1", "title": "التوجه المهني وتحليل سوق العمل", "timeline": [{"date": "1924م", "event": "إنشاء أول مدرسة صناعية", "details": "مدرسة الصنائع والفنون في عمّان لتدريب الطلبة على الحرف الأساسية كالحدادة والنجارة، بداية التعليم المهني في الأردن.", "type": "تأسيس"}, {"date": "1961م", "event": "استحداث إدارة التعليم المهني", "details": "في وزارة التربية والتعليم، أُسندت إليها مهمة الإشراف على المدارس المهنية وتنفيذ الخطط التعليمية المتخصصة.", "type": "تأسيس"}, {"date": "1976م", "event": "إنشاء مؤسسة التدريب المهني", "details": "لتنظيم عملية التدريب المهني والإشراف عليها وتطويرها لتلبية متطلبات التنمية الاقتصادية والاجتماعية.", "type": "تأسيس"}, {"date": "2007م", "event": "إنشاء الشركة الوطنية للتشغيل والتدريب", "details": "شركة مساهمة خاصة غير ربحية لتأهيل الشباب العاطل عن العمل وتأمينهم بفرص العمل، إلى جانب تنفيذ مشروع استخدام المدنيين في القوات المسلحة.", "type": "تأسيس"}, {"date": "2019م", "event": "تأسيس هيئة تنمية وتطوير المهارات المهنية والتقنية", "details": "ضمن خطط الإصلاح الشاملة لتطوير التعليم المهني وتحديث البنية التحتية.", "type": "تأسيس"}, {"date": "2022م", "event": "إطلاق خطة وطنية لتطوير التعليم المهني والتقني", "details": "بالتعاون مع القطاع الخاص لزيادة الإقبال على هذا النوع من التعليم ورفع جودة التدريب.", "type": "قرار"}, {"date": "2023م", "event": "تطبيق نظام المسارات BTEC", "details": "طُبق نظام المسارات الأكاديمي والمهني التقني (BTEC) بعد الصف التاسع بدءًا من العام الدراسي 2023/2024م.", "type": "قرار"}], "cards": [{"type": "مفهوم", "title": "التوجيه المهني", "summary": "إرشاد الطلبة والشباب نحو مسار دراسي أو تدريبي مناسب.", "details": "عملية إرشاد الطلبة والشباب وتوجيههم نحو اختيار مسار يتناسب مع ميولهم وقدراتهم وفرص العمل المتاحة في السوق، بهدف زيادة فرص العمل وتقليل البطالة وسد الفجوة بين العرض والطلب وتعزيز الإنتاجية."}, {"type": "مفهوم", "title": "التوجه الأكاديمي", "summary": "اختيار مسار دراسي يقود لمهن بحثية وأكاديمية.", "details": "اختيار الطلبة للمسارات الأكاديمية كالطب والهندسة والقانون والتعليم والعلوم الإنسانية. يتميز بالتركيز على المواد النظرية والدراسة التحليلية، ومجاله الوظيفي المهن البحثية والأكاديمية والخدمية."}, {"type": "مفهوم", "title": "التوجه المهني", "summary": "اختيار مسار يؤهل للالتحاق بمهنة فور التخرج.", "details": "يعني اختيار الطلبة للمسارات المهنية كتكنولوجيا المعلومات وصيانة الأجهزة والتمريض والهندسة والطاقة المتجددة والأمن السيبراني، مع التركيز على المهارات العملية والارتباط المباشر بسوق العمل والتدريب الميداني."}, {"type": "مؤسسة", "title": "نظام BTEC", "summary": "نظام تعليم مهني عالمي بالشراكة مع شركة Pearson.", "details": "أُطلق في المدارس الحكومية الأردنية عام 2023/2022م، يقدم تخصصات كالهندسة والزراعة وتكنولوجيا المعلومات والضيافة والسياحة والفن والتصميم والأعمال والرعاية الصحية، ويمنح شهادات معتمدة دوليًا."}, {"type": "مؤسسة", "title": "مؤسسة التدريب المهني", "summary": "مؤسسة حكومية أُنشئت عام 1976م.", "details": "تنظم عملية التدريب المهني والإشراف عليها وتطويرها لتلبية متطلبات التنمية الاقتصادية والاجتماعية وتأهيل الكوادر للسوق."}, {"type": "مؤسسة", "title": "الشركة الوطنية للتشغيل والتدريب", "summary": "شركة مساهمة خاصة غير ربحية أُسست 2007م.", "details": "هدفها تأهيل الشباب العاطل عن العمل بتدريبهم تدريبًا عمليًا، وتأمينهم بفرص العمل الممكنة، ضمن الرؤية الملكية لتدريب شباب الوطن وتأهيلهم مهنيًا."}, {"type": "مفهوم", "title": "أدوات تحليل سوق العمل", "summary": "أدوات لفهم حاجات السوق وتحديد الفرص المستقبلية.", "details": "تشمل الإحصاءات الرسمية وتقارير وزارة العمل ودائرة الإحصاءات العامة، والدراسات القطاعية، والتشاور مع أصحاب الأعمال والمختصين، ومواقع التوظيف، والمجتمعات المهنية والمؤتمرات والمنصات الإلكترونية."}, {"type": "مفهوم", "title": "القطاعات الإستراتيجية في الأردن", "summary": "قطاعات تركز عليها رؤية التحديث الاقتصادي 2023-2025م.", "details": "تشمل الصناعات عالية القيمة كالبتروكيماويات، والخدمات المستقبلية كتكنولوجيا المعلومات والذكاء الاصطناعي، والطاقة المتجددة، والريادة والإبداع، والموارد المستدامة كالمياه والزراعة الذكية، والسياحة والإنتاج الإعلامي."}]}, {"id": "lesson_4_3_2", "title": "سوق العمل الأردني", "timeline": [], "cards": [{"type": "مفهوم", "title": "تحولات سوق العمل الأردني", "summary": "تغيرات اقتصادية وتكنولوجية واجتماعية متسارعة.", "details": "تشمل التوسع في تكنولوجيا المعلومات والتجارة الإلكترونية، والنمو في القطاعات الخضراء والطاقة المتجددة، والانفتاح على الأسواق، وانتشار العمل عن بُعد والدوام المرن، وتراجع الصناعات التقليدية مقابل نمو الصناعات الإبداعية."}, {"type": "مفهوم", "title": "الفجوة بين العرض والطلب", "summary": "الاختلاف بين العمالة المتوافرة وفرص العمل المطلوبة.", "details": "أسبابها: امتلاك الخريجين مهارات نظرية لا تتوافق مع الوظائف العملية، وضعف التدريب المهني، والاختيار غير الصحيح للتخصصات المشبعة، وظهور تكنولوجيا جديدة تتطلب مهارات جديدة، والأزمات الاقتصادية."}, {"type": "مفهوم", "title": "التوجيه الأكاديمي المبكر", "summary": "مساعدة الطلبة على اتخاذ قرارات تعليمية بناء على حاجات السوق.", "details": "يلعب دورًا مهمًا في تقليل التشبع في بعض التخصصات وزيادة فرص النجاح المهني، ويُطبّق عبر اجتماعات مع خبراء سوق العمل، واستبانات لتقييم ميول الطلبة، وتجارب ميدانية مبكرة، وإشراك أولياء الأمور والمعلمين."}, {"type": "مفهوم", "title": "التحفيز الذاتي", "summary": "القدرة على العمل والإنجاز دون انتظار أوامر أو رقابة.", "details": "من أهم المهارات الشخصية لمواكبة سوق العمل الحديث، يزيد من الإنتاجية ويوفر حافزًا للاستمرار في مواجهة الصعوبات ويعزز الثقة بالنفس."}, {"type": "مفهوم", "title": "المرونة", "summary": "القدرة على التكيف مع التغيرات والظروف الجديدة.", "details": "تنبع أهميتها في تسهيل التكيف مع التطور التكنولوجي أو التغيرات في سوق العمل، وتعد من أهم المهارات الشخصية لمواكبة سوق العمل الحديث."}, {"type": "مفهوم", "title": "إدارة الوقت", "summary": "تنظيم الوقت وتوزيعه بكفاءة لإنجاز المهام.", "details": "تُسهم في رفع جودة العمل، والتخفيف من الإرهاق وضغط العمل، وإتاحة مساحات للتعلم والتطوير الشخصي، وتعد إحدى أهم المهارات الشخصية لمواكبة سوق العمل."}, {"type": "مفهوم", "title": "المهارات الاجتماعية", "summary": "مهارات التواصل والعمل الجماعي.", "details": "ضرورية في سوق العمل الحديث، تشمل مهارة التواصل الفاعل (التعبير عن الأفكار والمشاعر بوضوح)، ومهارة العمل الجماعي (التعاون مع الآخرين لتحقيق أهداف مشتركة بكفاءة عالية)."}, {"type": "مفهوم", "title": "المهارات التقنية والرقمية", "summary": "أساسيات النجاح في سوق العمل الحديث.", "details": "أصبحت من أساسيات النجاح في سوق العمل مع تسارع التحول الرقمي، وتشمل البرمجة وتحليل البيانات وإدارة المنصات الإلكترونية، إلى جانب إتقان لغة أجنبية واحدة على الأقل."}, {"type": "مفهوم", "title": "سوق العمل غير الرسمي", "summary": "فرص عمل تفتقر إلى الحماية الاجتماعية والأمان الوظيفي.", "details": "يشمل الباعة الجوّالين والعاملين في المنشآت الصغيرة، يشكل نسبة كبيرة من القوى العاملة، ويعد من العوامل المؤثرة على فرص العمل الرسمية في الأردن."}, {"type": "سبب_ونتيجة", "title": "العوامل المؤثرة على فرص العمل", "summary": "عوامل اقتصادية وتكنولوجية وسياسية وديموغرافية.", "details": "تشمل النمو الاقتصادي، والتغيرات التكنولوجية الحديثة كالأتمتة والذكاء الاصطناعي، وجودة التعليم والتدريب، والسياسات الحكومية كبرنامج (فرص)، والاستثمارات، وارتفاع نسبة الشباب، والأوضاع الإقليمية والدولية، وسوق العمل غير الرسمي."}, {"type": "مفهوم", "title": "الشراكة بين القطاعين العام والخاص", "summary": "ركيزة أساسية في تطوير الموارد البشرية.", "details": "تشمل برامج التدريب الميداني (التحاق الطلبة بمؤسسات أو شركات خاصة لاكتساب خبرات عملية) والتشغيل المباشر (آلية توظيف يُستقطب عبرها المتدربون بعد التدريب الميداني بناءً على أدائهم)."}]}, {"id": "lesson_4_3_3", "title": "الابتكار وريادة الأعمال", "timeline": [], "cards": [{"type": "مفهوم", "title": "ريادة الأعمال", "summary": "أسلوب تفكير يقوم على البحث عن الفرص وتحويل الأفكار إلى منتجات وخدمات.", "details": "ليست مجرد إنشاء مشروع صغير أو شركة، بل أسلوب تفكير وطريقة حياة تقوم على ابتكار حلول لحاجات المجتمع، وأصبحت تشمل الذكاء الاصطناعي والطاقة المتجددة والتعليم الرقمي والزراعة الذكية والرعاية الصحية."}, {"type": "مفهوم", "title": "الابتكار", "summary": "المحرك الأساسي للفكرة الجديدة.", "details": "يمثل القوة الدافعة للتقدم والتطور في المجالات المختلفة، وله علاقة وثيقة مع الريادة، حيث تمثل الريادة الوسيلة لتحويل الفكرة المبتكرة إلى إنجاز ملموس يحدث فرقًا في المجتمع والاقتصاد."}, {"type": "مفهوم", "title": "المشروع الريادي", "summary": "نشاط اقتصادي مبتكر يحقق الربح ويلبي حاجات السوق.", "details": "يهدف إلى إنتاج سلع أو تقديم خدمات بطريقة جديدة، ومراحل تطويره: تحديد الفكرة، وضع خطة عمل، تأمين الموارد المالية، البدء الفعلي، التطوير وزيادة الحصة السوقية، ومراجعة الأداء بصورة دورية."}, {"type": "سبب_ونتيجة", "title": "أهمية ريادة الأعمال", "summary": "محرك اقتصادي واجتماعي مهم.", "details": "تُسهم في توفير فرص عمل جديدة للشباب، ودعم الاقتصاد الوطني عبر المشاريع الصغيرة والمتوسطة، وتشجيع الابتكار والإبداع، وتقديم حلول لمشكلات المجتمع، وتحقيق الاستدامة عبر مشاريع صديقة للبيئة."}, {"type": "مفهوم", "title": "أهمية ريادة الأعمال في الأردن", "summary": "ضرورة وطنية بسبب محدودية الموارد وارتفاع نسبة الشباب.", "details": "تزداد أهمية ريادة الأعمال في الأردن بسبب محدودية الموارد الطبيعية من جهة، وارتفاع نسبة الشباب من جهة أخرى، ما يجعل من الابتكار وريادة الأعمال ضرورة وطنية لمواجهة البطالة وإيجاد حلول جديدة."}, {"type": "مفهوم", "title": "مراحل تطوير المشروع الريادي", "summary": "ست مراحل لتطوير المشروع الريادي.", "details": "1) تحديد الفكرة وتحويلها إلى مفهوم عملي، 2) وضع خطة عمل واضحة، 3) تأمين الموارد المالية والمادية، 4) البدء الفعلي للمشروع وتقديم المنتج، 5) تطوير المشروع وزيادة الحصة السوقية، 6) مراجعة الأداء بصورة دورية."}]}]}, {"id": "unit_4_4", "title": "موقف الأردن من القضية الفلسطينية", "general_idea": "موقف الأردن الثابت من القضية الفلسطينية منذ نشأتها وحتى اليوم، ودور الهاشميين في الدفاع عن فلسطين والوصاية على المقدسات الإسلامية والمسيحية في القدس، وإعمار المسجد الأقصى.", "lessons": [{"id": "lesson_4_4_1", "title": "موقف الأردن من القضية الفلسطينية بين عامَي 1916-1951م", "timeline": [{"date": "1897م", "event": "المؤتمر الصهيوني الأول في بازل", "details": "عُقد في مدينة بازل بسويسرا وتقرّر فيه إقامة وطن قومي لليهود في فلسطين، وكان بداية تبلور الأطماع الصهيونية في فلسطين.", "type": "أخرى"}, {"date": "1916م", "event": "معاهدة سايكس بيكو", "details": "أُبرمت سرًا بين فرنسا وبريطانيا وروسيا، تقرّر فيها تقسيم بلاد الشام والعراق إلى مناطق نفوذ، ووضع فلسطين تحت إدارة دولية. احتجّ عليها الشريف الحسين بن علي.", "type": "معاهدة"}, {"date": "1917م", "event": "وعد بلفور واحتلال بريطانيا فلسطين", "details": "في الثاني من تشرين ثاني، صدر تصريح آرثر بلفور وزير الخارجية البريطاني بإنشاء وطن قومي لليهود في فلسطين، واحتلت بريطانيا فلسطين في نهاية العام نفسه.", "type": "قرار"}, {"date": "1919م", "event": "المؤتمر السوري العام", "details": "شارك فيه الأردنيون، ورفض التجزئة السياسية لبلاد الشام ووعد بلفور والسياسة الصهيونية، وأكد الأردنيون أمام لجنة كنج-كراين رفضهم للهجرة اليهودية.", "type": "أخرى"}, {"date": "1920م", "event": "مؤتمر قرية قَم وثورة 1920", "details": "عقد زعماء وشيوخ الشمال في إربد مؤتمرًا في بلدة قَم، قرروا فيه مهاجمة المستعمرات اليهودية في سمخ وبيسان، واستشهد الشيخ كايد المفلح العبيدات. وثورة عام 1920 في فلسطين.", "type": "ثورة"}, {"date": "1921م", "event": "احتجاج الأمير عبد الله على وعد بلفور", "details": "احتجّ الأمير عبد الله بن الحسين خلال مباحثاته مع ونستون تشرشل في القدس على وعد بلفور، وطالب بوحدة فلسطين وشرقي الأردن.", "type": "أخرى"}, {"date": "1922م", "event": "صك الانتداب البريطاني على فلسطين", "details": "استصدرت بريطانيا قرارًا دوليًا من عصبة الأمم بوضع فلسطين تحت الانتداب البريطاني، وتكوّنت الإدارة المدنية البريطانية فيها.", "type": "قرار"}, {"date": "1929م", "event": "ثورة البراق واجتماع الحصن", "details": "ثورة البراق في فلسطين، واجتماع الحصن في إربد لإمداد الفلسطينيين بالمال والسلاح.", "type": "ثورة"}, {"date": "1932م", "event": "إنشاء مخافر منع تهريب السلاح", "details": "أنشأت حكومة الانتداب مخافر في الأزرق والمفرق وجسر بنات يعقوب لمنع تهريب الأسلحة من شرقي الأردن إلى فلسطين.", "type": "أخرى"}, {"date": "1936-1939م", "event": "الثورة الفلسطينية الكبرى", "details": "كان الأردنيون أول من تحرك لنجدتها، فأضربوا وجمعوا الإعانات وأرسلوا المقاتلين، وعقدوا اجتماعًا في قرية أم العمد جنوب عمّان.", "type": "ثورة"}, {"date": "1937م", "event": "تقرير لجنة بيل الملكية", "details": "تضمّن تقسيم فلسطين إلى ثلاثة أقاليم: عربي يُضم إلى شرقي الأردن، يهودي، وإقليم للأماكن المقدسة تحت الانتداب.", "type": "قرار"}, {"date": "1947م", "event": "قرار التقسيم رقم 181", "details": "صدر عن الجمعية العامة للأمم المتحدة بضغط أمريكي، نصّ على إنهاء الانتداب البريطاني وتقسيم فلسطين إلى دولتين عربية ويهودية مع تدويل القدس، رفضه العرب.", "type": "قرار"}, {"date": "1948م", "event": "حرب 1948 وإعلان دولة إسرائيل", "details": "احتلت القوات اليهودية معظم المدن الرئيسة وبما يعادل 78% من مساحة فلسطين، ولجوء 750 ألف فلسطيني، ولجأ إلى الأردن نحو ربع مليون. أُعلنت دولة إسرائيل في 15 أيار 1948م.", "type": "حرب"}, {"date": "1949م", "event": "اتفاقيات الهدنة", "details": "أُبرمت بين إسرائيل وكل من مصر ولبنان والأردن وسوريا، وأصبحت الضفة الغربية تحت الحكم الأردني وقطاع غزة تحت الإدارة المصرية.", "type": "معاهدة"}, {"date": "1950م", "event": "وحدة الضفّتين", "details": "بعد مؤتمرات شعبية في عمّان وأريحا ونابلس ورام الله، وانتخاب 20 نائبًا من كل ضفة، قرر مجلس النواب الجديد في 24 نيسان 1950م الموافقة على وحدة الضفّتين.", "type": "قرار"}, {"date": "1951م", "event": "استشهاد الملك عبد الله الأول", "details": "في يوم الجمعة الموافق 20 تموز 1951م، استشهد الملك عبد الله الأول ابن الحسين عند دخوله إلى المسجد الأقصى للصلاة فيه.", "type": "أخرى"}], "cards": [{"type": "معاهدة", "title": "وعد بلفور", "summary": "تصريح بريطاني بإنشاء وطن قومي لليهود في فلسطين عام 1917م.", "details": "صدر في الثاني من تشرين ثاني 1917م عن وزير الخارجية البريطاني آرثر بلفور، تعهّدت بموجبه بريطانيا بإنشاء وطن قومي لليهود في فلسطين. احتلت بريطانيا فلسطين في نهاية العام نفسه واستصدرت صك الانتداب عام 1922م."}, {"type": "معاهدة", "title": "معاهدة سايكس بيكو", "summary": "اتفاقية سرية لتقسيم المشرق العربي عام 1916م.", "details": "أُبرمت بين فرنسا وبريطانيا وروسيا، تقرّر فيها تقسيم بلاد الشام والعراق إلى مناطق نفوذ بين بريطانيا وفرنسا، ووضع فلسطين تحت إدارة دولية. احتج عليها الشريف الحسين بن علي ورفضها وامتنع عن توقيع المعاهدة الحجازية البريطانية."}, {"type": "شخصية", "title": "الشريف الحسين بن علي", "summary": "ملك الحجاز وقائد الثورة العربية الكبرى.", "details": "احتجّ على معاهدة سايكس بيكو ووعد بلفور ورفضهما، عارض المخططات البريطانية والصهيونية، وامتنع عن توقيع مشروع المعاهدة الحجازية البريطانية، وفضّل النفي على التفريط بحقوق فلسطين. ودُفن في رحاب المسجد الأقصى عام 1931م بناءً على وصيته."}, {"type": "أخرى", "title": "مؤتمر قرية قَم 1920م", "summary": "مؤتمر سياسي للأردنيين في إربد.", "details": "عقده زعماء وشيوخ الشمال في شرقي الأردن، قرروا فيه مهاجمة المستعمرات اليهودية في سمخ وبيسان في غور الأردن، فاستشهد عدد منهم وكان أولهم الشيخ كايد المفلح العبيدات شيخ ناحية الكفارات."}, {"type": "أخرى", "title": "اجتماع قرية أم العمد", "summary": "اجتماع أردني لدعم الثورة الفلسطينية الكبرى.", "details": "عُقد جنوب عمّان عند اندلاع الثورة الفلسطينية الكبرى 1936م، قرر فيه زعماء وشيوخ شرقي الأردن جمع المال والسلاح وإرسال مئات المقاتلين إلى فلسطين، وطلب وقف الهجرة اليهودية."}, {"type": "أخرى", "title": "لجنة بيل الملكية 1936م", "summary": "لجنة بريطانية للتحقيق في أسباب الثورة الفلسطينية.", "details": "أرسلتها الحكومة البريطانية أثناء الثورة الفلسطينية الكبرى، أصدرت تقريرها عام 1937م الذي تضمّن تقسيم فلسطين إلى ثلاثة أقاليم: عربي يُضم إلى شرقي الأردن، يهودي، وإقليم للأماكن المقدسة تحت الانتداب."}, {"type": "قرار", "title": "قرار التقسيم رقم 181", "summary": "قرار الجمعية العامة للأمم المتحدة 1947م.", "details": "نصّ على إنهاء الانتداب البريطاني وتقسيم فلسطين إلى دولتين عربية ويهودية مع تدويل القدس. رفضه العرب وكان سببًا في حرب 1948م. صدر بضغط من الولايات المتحدة الأمريكية."}, {"type": "حرب", "title": "حرب 1948", "summary": "أول حرب عربية إسرائيلية.", "details": "نتائجها: احتلال 78% من مساحة فلسطين، لجوء 750 ألف فلسطيني، لجأ إلى الأردن نحو ربع مليون لاجئ، إعلان دولة إسرائيل في 15 أيار 1948م، واعتراف الولايات المتحدة والاتحاد السوفيتي بها."}, {"type": "قرار", "title": "وحدة الضفّتين 1950م", "summary": "ضم الضفة الغربية للأردن.", "details": "بعد طلب الوجهاء والزعماء الفلسطينيين في الضفة الغربية، وعقد مؤتمرات شعبية في عمّان وأريحا ونابلس ورام الله، وانتخاب 20 نائبًا من كل ضفة، قرر مجلس النواب الجديد في 24 نيسان 1950م الموافقة على وحدة الضفّتين."}]}, {"id": "lesson_4_4_2", "title": "موقف الأردن من القضية الفلسطينية منذ عام 1951م", "timeline": [{"date": "1964م", "event": "مؤتمر القمة العربية في القاهرة", "details": "تقرّر فيه الرد على تحويل إسرائيل لمياه نهر الأردن، وإنشاء سد الوحدة (المخيبة) على نهر اليرموك، وإنشاء قيادة موحدة وقيام منظمة التحرير الفلسطينية.", "type": "أخرى"}, {"date": "1966م", "event": "مجزرة قرية السموع", "details": "اعتداء إسرائيلي على قرية السموع في محافظة الخليل في تشرين الثاني 1966م، وارتكاب مجزرة بحق سكانها.", "type": "حرب"}, {"date": "1967م", "event": "حرب حزيران وقرار مجلس الأمن 242", "details": "شنّت إسرائيل حربًا مفاجئة على مصر والأردن وسوريا، احتلت الضفة الغربية وقطاع غزة وسيناء والجولان، ونزح مئات الآلاف. صدر قرار 242 الذي نصّ على الانسحاب الإسرائيلي.", "type": "حرب"}, {"date": "1973م", "event": "حرب أكتوبر وقرار 338", "details": "في 6 أكتوبر، شنّت مصر وسوريا حربًا لاسترداد أراضيهما، اجتازت القوات المصرية خط بارليف، وصدر قرار مجلس الأمن 338 الذي أكد على قرار 242. أرسل الأردن قواته إلى جبهة الجولان.", "type": "حرب"}, {"date": "1974م", "event": "قمة الرباط", "details": "الاعتراف بمنظمة التحرير الفلسطينية ممثلًا شرعيًا ووحيدًا للشعب الفلسطيني، اعترض الأردن على هذا القرار.", "type": "قرار"}, {"date": "1987-1993م", "event": "الانتفاضة الفلسطينية الأولى", "details": "اندلعت في كانون الأول 1987م واستمرت حتى 1993م، ودعمًا لها قرر الأردن فك الارتباط الإداري والقانوني مع الضفة الغربية في عام 1988م.", "type": "ثورة"}, {"date": "1991م", "event": "مؤتمر مدريد للسلام", "details": "برعاية الولايات المتحدة والاتحاد السوفيتي، وضم أطراف الصراع، وشارك الوفد الفلسطيني ضمن الوفد الأردني، واعترفت منظمة التحرير بقرار 242.", "type": "أخرى"}, {"date": "1993م", "event": "اتفاق أوسلو", "details": "وقّع الفلسطينيون والإسرائيليون اتفاق أوسلو السري، ونص على إقامة سلطة وطنية فلسطينية ومجلس تشريعي للشعب الفلسطيني في الضفة الغربية وقطاع غزة لفترة انتقالية لا تتجاوز 5 أعوام.", "type": "معاهدة"}, {"date": "2000-2006م", "event": "الانتفاضة الفلسطينية الثانية", "details": "اندلعت بسبب اجتياح المسجد الأقصى بقيادة الوزير أرئيل شارون، وامتدت إلى عام 2006م.", "type": "ثورة"}, {"date": "2003م", "event": "بداية بناء الجدار العازل", "details": "بدأت إسرائيل ببناء الجدار العازل في الضفة الغربية لوقف العمليات الفدائية وضم أراض فلسطينية وإنشاء مزيد من المستوطنات.", "type": "أخرى"}, {"date": "2004م", "event": "الرأي الاستشاري لمحكمة العدل الدولية", "details": "نجح الأردن باستصدار رأي محكمة العدل الدولية حول عدم قانونية الجدار العازل، والدعوة إلى إزالته وتعويض المتضررين، وعدّ إسرائيل دولة محتلة للقدس الشرقية.", "type": "قرار"}, {"date": "2023م", "event": "العدوان على غزة والإنزال الجوي الأردني", "details": "مع استمرار العدوان والحصار الإسرائيلي الجائر على قطاع غزة، كسر الأردن الحصار عبر عمليات إنزال جوي أعلن عنها الملك عبد الله الثاني ونفّذها سلاح الجو الملكي.", "type": "حرب"}], "cards": [{"type": "قرار", "title": "قرار مجلس الأمن 242", "summary": "قرار دولي لإنهاء آثار حرب 1967م.", "details": "صدر عن مجلس الأمن عام 1967م، نصّ على الانسحاب الإسرائيلي من الأراضي المحتلة، والتوصل إلى تسوية عادلة لمشكلة اللاجئين الفلسطينيين، وإنهاء حالة الحرب بين الدول وإسرائيل."}, {"type": "قرار", "title": "قرار مجلس الأمن 338", "summary": "قرار صادر إثر حرب 1973م.", "details": "أكد على ما جاء في قرار 242، وأقرّ إيقاف القتال بين الأطراف المتحاربة، والتأكيد على مبدأ عدم جواز احتلال أراضي الغير بالقوة."}, {"type": "معاهدة", "title": "اتفاق أوسلو 1993م", "summary": "اتفاق سري بين منظمة التحرير وإسرائيل.", "details": "نصّ على إقامة سلطة وطنية فلسطينية ومجلس تشريعي منتخب في الضفة الغربية وقطاع غزة لفترة انتقالية لا تتجاوز 5 أعوام، مقابل اعتراف منظمة التحرير بإسرائيل. تلكأت إسرائيل في تنفيذه."}, {"type": "مفهوم", "title": "فك الارتباط 1988م", "summary": "قرار أردني بفك الارتباط الإداري والقانوني مع الضفة الغربية.", "details": "قرار اتخذه الأردن دعمًا للانتفاضة الفلسطينية الأولى، ولتعزيز هوية الكيانية الفلسطينية، وفصل المسارات الإدارية والقانونية بين الضفتين."}, {"type": "أخرى", "title": "قمة الرباط 1974م", "summary": "اعتراف عربي بمنظمة التحرير ممثلًا شرعيًا ووحيدًا.", "details": "فوجئ الأردن بقرار الاعتراف بمنظمة التحرير الفلسطينية ممثلًا شرعيًا ووحيدًا للشعب الفلسطيني، واعترض الأردن لأنه يعني تحويل صفة أراضي الضفة الغربية من أراض أردنية محتلة إلى أراض متنازع عليها."}, {"type": "ثورة", "title": "الانتفاضة الفلسطينية الأولى", "summary": "انتفاضة شعبية فلسطينية 1987-1993م.", "details": "اندلعت في كانون الأول 1987م وامتدت حتى 1993م. على إثرها قرر الأردن فك الارتباط الإداري والقانوني مع الضفة الغربية عام 1988م دعمًا للانتفاضة وتعزيزًا للهوية الفلسطينية."}, {"type": "ثورة", "title": "الانتفاضة الفلسطينية الثانية", "summary": "انتفاضة الأقصى 2000-2006م.", "details": "اندلعت إثر اجتياح المسجد الأقصى عام 2000م بقيادة الوزير أرئيل شارون، وامتدت إلى عام 2006م. اضطرت إسرائيل في أعقابها للانسحاب من قطاع غزة وإخلاء المستوطنات، وفرضت حصارًا اقتصاديًا."}, {"type": "أخرى", "title": "الجدار العازل", "summary": "جدار إسرائيلي في الضفة الغربية بدأ بناؤه 2003م.", "details": "بنته إسرائيل لوقف العمليات الفدائية الفلسطينية وضم أراض وإنشاء مستوطنات. نجح الأردن باستصدار الرأي الاستشاري من محكمة العدل الدولية عام 2004م حول عدم قانونيته والدعوة إلى إزالته."}, {"type": "مفهوم", "title": "ثوابت الموقف الأردني", "summary": "مر ": "مشروع إعادة صنع منبر صلاح الدين الذي دُمر في حريق 1969م، والقيام بأعمال ترميم وصيانة لمرافق المسجد الأقصى.", "type": "أخرى"}, {"date": "1999م", "event": "بدء الإعمار الهاشمي الخامس", "details": "حظيت المقدسات الإسلامية والمسيحية في القدس باهتمام بالغ من الملك عبد الله الثاني، مع تشكيل صندوق هاشمي خاص وأعمال ترميم وإدانة الانتهاكات الإسرائيلية.", "type": "تأسيس"}, {"date": "2007م", "event": "إعادة تركيب منبر صلاح الدين وإنشاء الصندوق الهاشمي", "details": "أعيد بناء وتركيب منبر المسجد الأقصى (منبر صلاح الدين)، وأُنشئ الصندوق الهاشمي لإعمار المسجد الأقصى لتوفير التمويل اللازم لرعاية المسجد والمقدسات.", "type": "تأسيس"}, {"date": "2013م", "event": "اتفاقية الوصاية الهاشمية", "details": "في آذار، وقّع الملك عبد الله الثاني والرئيس الفلسطيني محمود عباس في عمّان اتفاقًا أعاد فيه التأكيد على الوصاية الهاشمية على الأماكن المقدسة في القدس.", "type": "معاهدة"}, {"date": "2016م", "event": "ترميم القبر المقدس في كنيسة القيامة", "details": "إطلاق مشروع ترميم القبر المقدس في كنيسة القيامة، إلى جانب تشكيل مجلس الكنائس الأردني الذي يشمل كنائس القدس الرئيسة.", "type": "تأسيس"}], "cards": [{"type": "مكان", "title": "الحرم القدسي الشريف/المسجد الأقصى", "summary": "كل ما دار عليه السور من أرض تزيد مساحتها على 144 دونمًا.", "details": "يشمل كل ما داخل السور: المسجد الأقصى ومسجد قبة الصخرة، ومصاطب وقباب تحت الأرض وفوق الأرض في مدينة القدس، إلى جانب الأبنية والمساجد والساحات."}, {"type": "معاهدة", "title": "اتفاقية الوصاية الهاشمية 2013م", "summary": "اتفاق بين الأردن والسلطة الفلسطينية.", "details": "وقّعها الملك عبد الله الثاني والرئيس محمود عباس في آذار 2013م. نصت على أن الملك صاحب الوصاية وخادم الأماكن المقدسة، واحترام الأماكن المقدسة، وحرية المسلمين في العبادة، وإدارة الأماكن المقدسة وصيانتها."}, {"type": "مؤسسة", "title": "دائرة أوقاف القدس وشؤون المسجد الأقصى", "summary": "دائرة تنفذ الوصاية الهاشمية على المقدسات.", "details": "تابعة لوزارة الأوقاف والشؤون والمقدسات الإسلامية الأردنية. مهامها: الإشراف على الأملاك الوقفية، إدارة شؤون المسجد الأقصى من حراسة وترميم، متابعة اعتداءات /* ============ DATE PARSING / ERA COLOR ============ */
function parseYear(dateStr) {
  if (!dateStr) return null;
  // Convert Arabic-Indic digits
  const ar2en = s => s.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
  const s = ar2en(String(dateStr));
  const isBC = /ق\.?\s*م|قبل الميلاد/.test(s);
  const isHijri = /\bهـ\b|\bهجري/.test(s);
  // Look for 4-digit, 3-digit, or 1-2 digit numbers
  const m = s.match(/(\d{1,7})/);
  if (!m) return null;
  let y = parseInt(m[1], 10);
  if (isBC) y = -y;
  else if (isHijri) y = y + 622; // approximate Hijri to Gregorian
  // Handle "X مليون سنة" or "X ألف سنة"
  if (/مليون/.test(s)) y = -1000000;
  else if (/ألف/.test(s) && !isHijri) y = -10000;
  return y;
}
function eraColor(year) {
  if (year === null) return 'var(--accent)';
  if (year < -1000) return 'var(--era-prehistoric)';
  if (year < 0) return 'var(--era-ancient)';
  if (year < 395) return 'var(--era-classical)';
  if (year < 636) return 'var(--era-byzantine)';
  if (year < 1250) return 'var(--era-islamic-early)';
  if (year < 1517) return 'var(--era-islamic-mid)';
  if (year < 1918) return 'var(--era-ottoman)';
  if (year < 1946) return 'var(--era-modern-early)';
  if (year < 1999) return 'var(--era-modern-mid)';
  return 'var(--era-contemporary)';
}

/* ============ DOM HELPERS ============ */
const $ = id => document.getElementById(id);
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.append(c.nodeType ? c : document.createTextNode(c));
  }
  return e;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/* ============ FIND LESSON ============ */
function findLesson(id) {
  for (const book of APP_DATA.books) {
    for (const unit of book.units) {
      for (const lesson of unit.lessons) {
        if (lesson.id === id) return { book, unit, lesson };
      }
    }
  }
  return null;
}

/* ============ SIDEBAR ============ */
function renderSidebar() {
  const tree = $('navTree');
  tree.innerHTML = '';
  const q = state.searchQuery.trim().toLowerCase();

  for (const book of APP_DATA.books) {
    const lessonCount = book.units.reduce((a, u) => a + u.lessons.length, 0);

    // Filter lessons in this book if searching
    const visibleUnits = book.units.map(unit => {
      const matchedLessons = q
        ? unit.lessons.filter(l => l.title.toLowerCase().includes(q))
        : unit.lessons;
      return { unit, matchedLessons };
    }).filter(({ matchedLessons }) => !q || matchedLessons.length > 0);

    if (q && visibleUnits.length === 0) continue;

    const bookEl = el('details', { class: 'tree-book', open: '' });
    const bookToggle = el('summary', { class: 'tree-toggle book' },
      el('span', { class: 'chev', html: '◀' }),
      el('span', {}, '📚 ' + book.title),
      el('span', { class: 'count-badge' }, String(lessonCount))
    );
    bookEl.append(bookToggle);
    const bookChildren = el('div', { class: 'tree-children' });

    for (const { unit, matchedLessons } of visibleUnits) {
      const unitEl = el('details', { class: 'tree-unit', open: '' });
      const unitToggle = el('summary', { class: 'tree-toggle unit' },
        el('span', { class: 'chev', html: '◀' }),
        el('span', {}, unit.title),
        el('span', { class: 'count-badge' }, String(matchedLessons.length))
      );
      unitEl.append(unitToggle);
      const unitChildren = el('div', { class: 'tree-children' });
      for (const lesson of matchedLessons) {
        const leaf = el('button', {
          class: 'tree-leaf' + (state.currentLessonId === lesson.id ? ' active' : ''),
          'data-lesson-id': lesson.id,
          onclick: () => selectLesson(lesson.id),
        }, lesson.title);
        unitChildren.append(leaf);
      }
      unitEl.append(unitChildren);
      bookChildren.append(unitEl);
    }
    bookEl.append(bookChildren);
    tree.append(bookEl);
  }
}

/* ============ SELECT LESSON ============ */
function selectLesson(id) {
  state.currentLessonId = id;
  state.cardFilter = 'all';
  exitMegaView();
  renderSidebar();
  renderMain();
  // Close mobile sidebar
  if (window.innerWidth <= 900) $('sidebar').classList.remove('open');
  $('main').scrollTop = 0;
}

/* ============ BREADCRUMB ============ */
function renderBreadcrumb() {
  const bc = $('breadcrumb');
  bc.innerHTML = '';
  if (!state.currentLessonId) {
    bc.append(el('span', { class: 'bc-item' }, 'اختر درساً للبدء'));
    return;
  }
  const found = findLesson(state.currentLessonId);
  if (!found) return;
  const parts = [
    { text: found.book.title, class: 'bc-item' },
    { text: found.unit.title, class: 'bc-item' },
    { text: found.lesson.title, class: 'bc-item current' },
  ];
  parts.forEach((p, i) => {
    if (i > 0) bc.append(el('span', { class: 'bc-sep' }, '◀'));
    bc.append(el('span', { class: p.class }, p.text));
  });
}

/* ============ MAIN ============ */
function renderMain() {
  const main = $('main');
  main.innerHTML = '';
  renderBreadcrumb();

  if (state.megaView) {
    renderMegaTimeline();
    return;
  }
  if (!state.currentLessonId) {
    main.append(renderWelcome());
    return;
  }
  const found = findLesson(state.currentLessonId);
  if (!found) return;
  const { lesson, unit } = found;

  // Lesson header
  const head = el('div', { class: 'lesson-head' });
  head.append(el('div', { class: 'lesson-eyebrow' }, unit.title));
  head.append(el('h1', { class: 'lesson-title' }, lesson.title));
  const stats = el('div', { class: 'lesson-stats' });
  stats.append(el('span', { html: '⏳ <strong>' + (lesson.timeline?.length || 0) + '</strong> حدث في الخط الزمني' }));
  stats.append(el('span', { html: '🗂️ <strong>' + (lesson.cards?.length || 0) + '</strong> بطاقة دراسية' }));
  head.append(stats);
  main.append(head);

  // Timeline
  if ((state.view === 'both' || state.view === 'timeline') && lesson.timeline?.length) {
    main.append(renderTimelineSection(lesson.timeline));
  }
  // Cards
  if ((state.view === 'both' || state.view === 'cards') && lesson.cards?.length) {
    main.append(renderCardsSection(lesson.cards));
  }

  // Empty cases
  if (state.view === 'timeline' && !lesson.timeline?.length) {
    main.append(renderEmpty('⏳', 'لا يوجد خط زمني لهذا الدرس', 'جرّب عرض البطاقات بدلاً من ذلك.'));
  }
  if (state.view === 'cards' && !lesson.cards?.length) {
    main.append(renderEmpty('🗂️', 'لا توجد بطاقات لهذا الدرس', 'جرّب عرض الخط الزمني بدلاً من ذلك.'));
  }
}

/* ============ TIMELINE ============ */
function renderTimelineSection(timeline) {

/* ============ ARABIC NORMALIZATION ============ */
function normalizeArabic(s) {
  if (!s) return '';
  return String(s)
    .toLowerCase()
    .replace(/[ً-ٰٟ]/g, '')   // remove diacritics
    .replace(/[إأآا]/g, 'ا')
    .replace(/ى/g, 'ي')
    .replace(/ة/g, 'ه')
    .replace(/ؤ/g, 'و')
    .replace(/ئ/g, 'ي')
    .replace(/[ـ]/g, '')               // remove tatweel
    .trim();
}

/* ============ SEARCH INDEX ============ */
function buildSearchIndex() {
  SEARCH_INDEX = [];
  for (const book of APP_DATA.books) {
    const bookShort = book.title.split(' - ')[0].replace(/تاريخ الأردن/, '').trim() || book.title;
    for (const unit of book.units) {
      for (const lesson of unit.lessons) {
        // Lesson entry
        SEARCH_INDEX.push({
          kind: 'lesson',
          title: lesson.title,
          snippet: '',
          searchText: normalizeArabic(lesson.title),
          lessonId: lesson.id,
          bookTitle: book.title, unitTitle: unit.title, lessonTitle: lesson.title, bookShort,
        });
        // Timeline events
        (lesson.timeline || []).forEach((ev, i) => {
          SEARCH_INDEX.push({
            kind: 'event',
            title: ev.event,
            date: ev.date,
            type: ev.type,
            snippet: ev.details || '',
            searchText: normalizeArabic((ev.event || '') + ' ' + (ev.details || '') + ' ' + (ev.date || '')),
            lessonId: lesson.id,
            itemIdx: i,
            bookTitle: book.title, unitTitle: unit.title, lessonTitle: lesson.title, bookShort,
          });
        });
        // Cards
        (lesson.cards || []).forEach((c, i) => {
          SEARCH_INDEX.push({
            kind: 'card',
            title: c.title,
            cardType: c.type,
            snippet: c.summary || c.details || '',
            searchText: normalizeArabic((c.title || '') + ' ' + (c.summary || '') + ' ' + (c.details || '')),
            lessonId: lesson.id,
            itemIdx: i,
            bookTitle: book.title, unitTitle: unit.title, lessonTitle: lesson.title, bookShort,
          });
        });
      }
    }
  }
}

function searchAll(query) {
  const q = normalizeArabic(query);
  if (!q) return { lessons: [], events: [], cards: [] };
  const lessons = [], events = [], cards = [];
  for (const it of SEARCH_INDEX) {
    if (!it.searchText.includes(q)) continue;
    // Score: title match higher than snippet match
    const titleMatch = normalizeArabic(it.title || '').includes(q);
    it.score = titleMatch ? 2 : 1;
    if (it.kind === 'lesson') lessons.push(it);
    else if (it.kind === 'event') events.push(it);
    else cards.push(it);
  }
  const byScore = (a, b) => b.score - a.score;
  return {
    lessons: lessons.sort(byScore).slice(0, 30),
    events: events.sort(byScore).slice(0, 50),
    cards: cards.sort(byScore).slice(0, 50),
  };
}

function highlightMatch(text, query) {
  if (!text || !query) return escapeHtml(text);
  const q = normalizeArabic(query);
  const norm = normalizeArabic(text);
  const idx = norm.indexOf(q);
  if (idx < 0) return escapeHtml(text);
  // Walk through original text in parallel with normalized to find span
  // Simple approach: do case-folding only and try direct match
  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return escapeHtml(text).replace(re, m => '<mark>' + m + '</mark>');
}

/* ============ CROSS-REF INDEX ============ */
function buildCrossRefIndex() {
  XREF_INDEX = new Map();
  for (const book of APP_DATA.books) {
    const bookShort = book.title.split(' - ')[0].replace(/تاريخ الأردن/, '').trim() || book.title;
    for (const unit of book.units) {
      for (const lesson of unit.lessons) {
        // Index by card titles
        (lesson.cards || []).forEach(c => addXref(c.title, { lessonId: lesson.id, lessonTitle: lesson.title, bookShort, kind: 'card' }));
        // Index by event titles (for places/people referenced in events)
        (lesson.timeline || []).forEach(ev => addXref(ev.event, { lessonId: lesson.id, lessonTitle: lesson.title, bookShort, kind: 'event' }));
      }
    }
  }
}
function addXref(title, ref) {
  const key = normalizeArabic(title);
  if (!key || key.length < 3) return;
  if (!XREF_INDEX.has(key)) XREF_INDEX.set(key, []);
  XREF_INDEX.get(key).push(ref);
}
function findCrossRefs(title) {
  const key = normalizeArabic(title);
  if (!key || key.length < 3) return [];
  const results = [];
  const seen = new Set();
  // Direct match
  if (XREF_INDEX.has(key)) {
    XREF_INDEX.get(key).forEach(r => {
      const sig = r.lessonId;
      if (seen.has(sig)) return;
      seen.add(sig);
      results.push(r);
    });
  }
  // Substring match (key contained in indexed titles or vice versa) — only for substantial titles
  if (key.length >= 5) {
    for (const [k, refs] of XREF_INDEX) {
      if (k === key) continue;
      if (k.includes(key) || key.includes(k)) {
        refs.forEach(r => {
          const sig = r.lessonId;
          if (seen.has(sig)) return;
          seen.add(sig);
          results.push(r);
        });
      }
    }
  }
  // Exclude refs to the currently shown lesson — figure out current
  if (state.currentLessonId && !state.megaView) {
    return results.filter(r => r.lessonId !== state.currentLessonId);
  }
  return results;
}

    root.innerHTML = '<div class="search-empty">لا نتائج لكلمة "<strong>' + escapeHtml(query) + '</strong>"</div>';

}

/* ============ COMPARE FEATURE ============ */
function makeCompareBtn(item) {
  const isActive = state.compareTray.some(c => c.compareKey === item.compareKey);
  return el('button', {
    class: 'compare-btn' + (isActive ? ' active' : ''),
    title: 'أضف للمقارنة',
    onclick: e => { e.stopPropagation(); toggleCompare(item); },
  }, '⚖️');
}
function toggleCompare(item) {
  const idx = state.compareTray.findIndex(c => c.compareKey === item.compareKey);
  if (idx >= 0) {
    state.compareTray.splice(idx, 1);
  } else {
    if (state.compareTray.length >= 2) state.compareTray.shift();
    state.compareTray.push(item);
  }
  sessionStorage.setItem('compareTray', JSON.stringify(state.compareTray));
  renderCompareTray();
  // Update active state on visible compare buttons
  document.querySelectorAll('.compare-btn').forEach(btn => {
    const parent = btn.closest('.card,.tl-event,.mega-event');
    if (!parent) return;
    // We can't easily map back without re-render; simplest: re-render main
  });
  renderMain();
}
function renderCompareTray() {
  const tray = $('compareTray');
  const itemsEl = $('compareItems');
  $('compareCount').textContent = state.compareTray.length;
  itemsEl.innerHTML = '';
  state.compareTray.forEach((item, idx) => {
    const chip = el('span', { class: 'compare-item' });
    chip.append(el('span', { class: 'compare-item-name' }, (item.icon || '📌') + ' ' + (item.title || '')));
    chip.append(el('span', {
      class: 'compare-item-remove',
      onclick: () => toggleCompare(item),
    }, '×'));
    itemsEl.append(chip);
  });
  $('compareGo').disabled = state.compareTray.length < 2;
  if (state.compareTray.length > 0) tray.classList.add('open');
  else tray.classList.remove('open');
}
function openCompareModal() {
  if (state.compareTray.length < 2) return;
  const cols = $('compareCols');
  cols.innerHTML = '';
  state.compareTray.slice(0, 2).forEach(item => {
    const col = el('div', { class: 'compare-col', style: '--col-color:' + (item.color || 'var(--accent)') });
    const head = el('div', { class: 'compare-col-head' });
    head.append(el('div', { class: 'compare-col-icon' }, item.icon || '📌'));
    const tw = el('div', { style: 'flex:1' });
    if (item.meta) tw.append(el('div', { class: 'compare-col-meta' }, item.meta));
    tw.append(el('div', { class: 'compare-col-title' }, item.title || ''));
    head.append(tw);
    col.append(head);
    col.append(el('div', { class: 'compare-col-body' }, item.body || ''));
    if (item.sourceLesson) {
      const src = el('div', { class: 'compare-col-source' });
      src.append('📚 ' + item.sourceLesson.bookTitle + ' ← ' + item.sourceLesson.unitTitle + ' ← ');
      const link = el('span', {
        class: 'mega-event-source-link',
        onclick: () => {
          $('compareModal').classList.remove('open');
          selectLesson(item.sourceLesson.lessonId);
        },
      }, item.sourceLesson.lessonTitle);
      src.append(link);
      col.append(src);
    }
    cols.append(col);
  });
  $('compareModal').classList.add('open');
}

/* ============ THEME ============ */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  $('themeIcon').innerHTML = state.theme === 'dark'
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

/* ============ INIT ============ */
function init() {
  applyTheme();
  buildSearchIndex();
  buildCrossRefIndex();
  renderSidebar();
  renderMain();
  renderCompareTray();

  // Sidebar lesson search (filter tree)
  $('search').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    renderSidebar();
  });

  // View toggle
  $('viewToggle').addEventListener('click', e => {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    state.view = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b === btn));
    if (state.megaView) exitMegaView();
    renderMain();
  });

  // Theme
  $('themeBtn').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', state.theme);
    applyTheme();
  });

  // Print
  $('printBtn').addEventListener('click', () => {
    if (state.megaView || !state.currentLessonId) {
      alert('اختر درساً أولاً لطباعة ورقة مراجعته.');
      return;
    }
    window.print();
  });

  // Mega timeline button
  $('megaBtn').addEventListener('click', () => {
    if (state.megaView) {
      exitMegaView();
      renderMain();
    } else {
      openMegaView();
    }
  });

  // Global search trigger
  $('searchTrigger').addEventListener('click', openSearch);
  $('searchPanelInput').addEventListener('input', e => renderSearchResults(e.target.value));
  $('searchOverlay').addEventListener('click', e => { if (e.target === $('searchOverlay')) closeSearch(); });

  // Compare
  $('compareGo').addEventListener('click', openCompareModal);
  $('compareModalClose').addEventListener('click', () => $('compareModal').classList.remove('open'));
  $('compareModal').addEventListener('click', e => { if (e.target === $('compareModal')) $('compareModal').classList.remove('open'); });

  // Mobile menu
  $('menuBtn').addEventListener('click', () => $('sidebar').classList.toggle('open'));
  $('backdropMobile').addEventListener('click', () => $('sidebar').classList.remove('open'));

  // Modal
  $('modalClose').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if ($('searchOverlay').classList.contains('open')) { closeSearch(); return; }
      if ($('compareModal').classList.contains('open')) { $('compareModal').classList.remove('open'); return; }
      closeModal();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      openSearch();
    }
    if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) {
      e.preventDefault();
      openSearch();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
