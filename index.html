"مكان", "title": "متحف النميات في البنك الأهلي", "summary": "متحف متخصص بالمسكوكات يغطي أكثر من 2500 عام.", "details": "متحف متخصص بالمسكوكات، يغطي فترة زمنية تزيد على 2500 عام، ويمتلك واحدة من أفضل المجموعات النحاسية الأموية في العالم، ويحتوي على مكتبة متخصصة في علم النميات."}, {"type": "مفهوم", "title": "علم النميات", "summary": "العلم الذي يدرس المسكوكات والنقود.", "details": "علم متخصص بدراسة المسكوكات والنقود وتطورها عبر التاريخ، تختص به متاحف خاصة كمتحف النميات في البنك الأهلي الأردني."}]}]}, {"id": "unit_2_3", "title": "الأردن في العصر الحديث", "general_idea": "خضع الأردن للحكم العثماني أربعة قرون، انتهت بقيام الثورة العربية الكبرى، التي لم تكن مجرد ثورة بل هي نهضة عربية هدفت إلى استقلال البلاد العربية في آسيا، وتخليصها من الظلم والاضطهاد.", "lessons": [{"id": "lesson_2_3_1", "title": "الأحوال السياسية والإدارية في الأردن في العهد العثماني", "timeline": [{"date": "1299م", "event": "تأسيس الدولة العثمانية", "details": "أسس عثمان بن أرطغرل الدولة العثمانية في آسيا الصغرى، وسميت بالعثمانية نسبة إليه، بلغت أوج اتساعها في القرنين السادس عشر والسابع عشر الميلاديين، وضمت أجزاء واسعة من قارات أوروبا وآسيا وإفريقيا.", "type": "تأسيس"}, {"date": "1516م", "event": "معركة مرج دابق وخضوع الأردن للحكم العثماني", "details": "خضع الأردن للحكم العثماني بعد انتصار العثمانيين على المماليك في معركة مرج دابق سنة 1516م. أدرك العثمانيون الأهمية التي أولاها المماليك للأردن وما شهده من تقدم عمراني واقتصادي.", "type": "حرب"}, {"date": "1831م", "event": "بداية الحكم المصري لبلاد الشام", "details": "أرسل والي مصر محمد علي باشا ابنه إبراهيم باشا إلى بلاد الشام على رأس قوة عسكرية تمكنت من السيطرة على بلاد الشام، إذ كان يطمح إلى إنشاء دولة له ولأبنائه.", "type": "حرب"}, {"date": "1834م", "event": "تمرد البلقاء والكرك ضد إبراهيم باشا", "details": "رفض سكان الأردن إجراءات إبراهيم باشا في جمع الضرائب ونزع السلاح وفرض التجنيد الإجباري، وقاموا بالتمرد والاحتجاج في البلقاء والكرك، وحاصر إبراهيم باشا الكرك وضرب قلعتها بالمدفعية.", "type": "ثورة"}, {"date": "1839م", "event": "تمرد جبل عجلون وبداية التنظيمات العثمانية", "details": "قام سكان جبل عجلون بتمرد مماثل لما حدث في البلقاء والكرك، وأسهم في إضعاف قوات إبراهيم باشا. وفي نفس العام بدأت التنظيمات العثمانية التي استمرت إلى نهاية الدولة العثمانية.", "type": "ثورة"}, {"date": "1840م", "event": "نهاية الحكم المصري لبلاد الشام", "details": "اضطرت قوات إبراهيم باشا للانسحاب من بلاد الشام والعودة إلى مصر بعد ضغط الدول الأوروبية على محمد علي باشا.", "type": "أخرى"}, {"date": "1864م", "event": "قانون الولايات العثماني", "details": "نص قانون الولايات العثماني على تقسيم الدولة العثمانية إلى ولايات، والولاية إلى ألوية، واللواء إلى أقضية، والقضاء إلى نواح، والناحية إلى قرى. وفي كل قرية مجلس اختياري يترأسه المختار.", "type": "تأسيس"}, {"date": "1888م", "event": "تمرد بني حميدة", "details": "اندلعت في الأردن احتجاجات وتمرد ضد الإدارة العثمانية بسبب إحصاء النفوس والتجنيد الإجباري وفرض الضرائب، ومنها تمرد بني حميدة عام 1888م.", "type": "ثورة"}, {"date": "1894م", "event": "تشكيل لواء الكرك", "details": "تشكل قضاء معان الذي تحول إلى لواء الكرك في عام 1894م، ضمن إعادة التقسيم الإداري في الأردن.", "type": "تأسيس"}, {"date": "1905م", "event": "تمرد الشوبك", "details": "اندلع تمرد الشوبك ضد الإدارة العثمانية في إطار سلسلة التمردات الناجمة عن سياسات التجنيد الإجباري والضرائب وعدم الاهتمام بالأمن.", "type": "ثورة"}, {"date": "1910م", "event": "تمرد الكرك (الهية)", "details": "اندلع تمرد الكرك المعروف بـ(الهية) ضد الإدارة العثمانية بسبب التشدد في جمع الضرائب والتجنيد الإجباري.", "type": "ثورة"}, {"date": "1914م", "event": "اندلاع الحرب العالمية الأولى", "details": "اندلعت الحرب العالمية الأولى ودخلت الدولة العثمانية الحرب إلى جانب دولتي الوسط الإمبراطورية الألمانية والإمبراطورية النمساوية-الهنغارية في مواجهة الدول الحليفة المؤلفة من بريطانيا وفرنسا وروسيا وإيطاليا. عُيِّن جمال باشا قائد الجيش الرابع والياً على سوريا.", "type": "حرب"}, {"date": "1923م", "event": "نهاية الدولة العثمانية", "details": "انتهت الدولة العثمانية رسمياً بعد قرابة ستة قرون من الحكم.", "type": "أخرى"}], "cards": [{"type": "دولة", "title": "الدولة العثمانية", "summary": "دولة أسسها عثمان بن أرطغرل في آسيا الصغرى وعاصمتها إسطنبول.", "details": "الدولة العثمانية (1299-1923م) أسسها عثمان بن أرطغرل في آسيا الصغرى، وسميت بالعثمانية نسبة إليه. بلغت أوج اتساعها في القرنين السادس عشر والسابع عشر، وضمت أجزاء من قارات أوروبا وآسيا وإفريقيا، واتخذت إسطنبول (الأستانة) عاصمة لها."}, {"type": "حرب", "title": "معركة مرج دابق", "summary": "معركة عام 1516م انتصر فيها العثمانيون على المماليك.", "details": "وقعت سنة 1516م، انتصر فيها العثمانيون على المماليك، وبعدها خضع الأردن للحكم العثماني."}, {"type": "شخصية", "title": "محمد علي باشا", "summary": "والي مصر الذي طمح لإنشاء دولة في بلاد الشام.", "details": "والي مصر الذي أرسل ابنه إبراهيم باشا إلى بلاد الشام على رأس قوة عسكرية، طمحاً في إنشاء دولة له ولأبنائه مستغلاً ضعف الدولة العثمانية."}, {"type": "شخصية", "title": "إبراهيم باشا", "summary": "ابن محمد علي حكم بلاد الشام 1831-1840م.", "details": "ابن والي مصر محمد علي باشا، سيطر على بلاد الشام 1831-1840م. قسم بلاد الشام إلى مديريات ومتسلميات، وفرض الأمن ونزع السلاح، ونظم جباية الضرائب، وفرض التجنيد الإجباري، فثار عليه سكان الأردن."}, {"type": "مفهوم", "title": "التيمار", "summary": "نظام إقطاعي عثماني للأسر المحلية مقابل جباية الضرائب وحفظ الأمن.", "details": "تركت الدولة العثمانية أمور الحكم للأسر الإقطاعية المحلية في بلاد الشام، اعترفت لها بسيادتها على المناطق التي تحكمها، ودعمتها بالسلاح والحماية، ومقابل تيمارهم كانت مهمتهم جباية إقطاعاتهم وحفظ الأمن وإعداد فرق الجند."}, {"type": "شخصية", "title": "فخر الدين المعني الثاني", "summary": "أمير محلي في لبنان طمح للانفصال عن العثمانيين.", "details": "أمير في لبنان، من أبرز الزعامات المحلية في القرنين السابع عشر والثامن عشر، التي طمحت بالانفصال عن الدولة العثمانية وتشكيل كيانات محلية."}, {"type": "شخصية", "title": "ظاهر العمر الزيداني", "summary": "زعيم محلي في شمال فلسطين وشمالي الأردن.", "details": "زعيم محلي في شمال فلسطين وشمالي الأردن، من الزعامات التي تنامى دورها مستغلة ضعف الإدارة العثمانية وانشغالها بحروب أوروبا."}, {"type": "شخصية", "title": "أحمد باشا الجزار", "summary": "زعيم محلي في عكا.", "details": "زعيم محلي في عكا، من الزعامات التي تنامى دورها في القرنين السابع عشر والثامن عشر مستغلاً ضعف الإدارة العثمانية."}, {"type": "حركة", "title": "توطين الشراكسة والشيشان", "summary": "هجرة قسرية إلى الأردن بعد حرب القوقاز.", "details": "حاولت الدولة العثمانية توطين المهاجرين الشراكسة والشيشان الذين هُجِّروا من بلادهم القفقاس بعد حرب دامية مع الإمبراطورية الروسية القيصرية. سكنوا في الزرقاء والسخنة وجرش وعمان وصويلح ووادي السير وناعور، وكان لهم دور في تطوير الحياة الاقتصادية والاجتماعية."}, {"type": "شخصية", "title": "جمال باشا (السفاح)", "summary": "والي سوريا في الحرب العالمية الأولى أعدم مثقفي العرب.", "details": "عين قائد الجيش الرابع والياً على سوريا في الحرب العالمية الأولى، فرض الأحكام العرفية وارتفعت في عهده الأسعار، وأعدم 37 شخصية عربية من خيرة المثقفين والسياسيين في بيروت 1915م ودمشق 1916م."}, {"type": "مفهوم", "title": "قافلة الحج الشامي", "summary": "قافلة دينية تجارية تمر من دمشق عبر الأردن إلى الحجاز.", "details": "كانت تمر من دمشق إلى الحجاز عبر محطات في الأردن، شهدت أهمية كبيرة منذ العصور الإسلامية، واهتمت بها الدولة العثمانية بتوفير الأمن وإقامة محطات الراحة."}, {"type": "شخصية", "title": "توفيق المجالي", "summary": "ممثل الأردن في مجلس المبعوثان العثماني.", "details": "مثل الأردن في مجلس (المبعوثان) العثماني (مجلس النواب)، في عهد التنظيمات العثمانية."}, {"type": "حركة", "title": "تمرد الكرك (الهية)", "summary": "تمرد أردني ضد العثمانيين عام 1910م.", "details": "أحد التمردات التي اندلعت ضد الإدارة العثمانية في نهاية القرن التاسع عشر وبداية القرن العشرين، بسبب التشدد في جمع الضرائب والتجنيد الإجباري."}]}, {"id": "lesson_2_3_2", "title": "الأحوال الاجتماعية والاقتصادية في الأردن في العهد العثماني", "timeline": [{"date": "القرن 19م", "event": "تراجع الزراعة في الأردن", "details": "شهدت الزراعة في الأردن في العهد العثماني وبخاصة في القرن التاسع عشر تراجعاً ملحوظاً بسبب القحط والجفاف والجراد، وكثرة الضرائب وانعدام الأمن، وتعدي القبائل البدوية على القرى الزراعية، واستخدام الأساليب الزراعية التقليدية.", "type": "أخرى"}, {"date": "1839م", "event": "بداية التنظيمات العثمانية وإصلاح التعليم", "details": "شعرت الدولة العثمانية بضرورة مواكبة التقدم بعد انتهاء الحكم المصري، فتأسست وزارة المعارف العمومية، وقسمت المدارس إلى عمومية وخصوصية، وجعل التعليم العام إلزامياً ومجانياً للأعوام الأربعة الأولى.", "type": "أخرى"}], "cards": [{"type": "مفهوم", "title": "الفلاحون", "summary": "الفئة الاجتماعية الأكثر عدداً في الأردن العثماني.", "details": "شكل الفلاحون الغالبية العظمى من سكان الأردن في العهد العثماني، وانتشرت القرى في أنحاء الأردن كافة. بنيت القرى في الأغلب على قمة مرتفعة لتوفير الحماية الطبيعية أو بالقرب من عيون الماء."}, {"type": "مفهوم", "title": "الحضر (القصبات)", "summary": "تجمعات شبيهة بالقرى الكبيرة تضم رجال السلطة والتجار.", "details": "تشكلت القصبات التي تشبه القرى الكبيرة، وتضم رجال السلطة الحاكمة بما في ذلك مقر الحكم والمحاكم والدرك والسجن والسوق. ويعمل سكانها بالتجارة والصناعة والحرف، ومن هذه القصبات: الكرك والسلط وعجلون وإربد."}, {"type": "مفهوم", "title": "البدو", "summary": "نمطان: بدو رحل وبدو نصف رحل (الزراعة).", "details": "نوعان: البدو الرحل الذين يربون الإبل وفي تنقل مستمر بحثاً عن الماء والكلأ، والبدو نصف الرحل أو الزراعة التي تمارس الزراعة وتربية الأغنام داخل ديرة محددة. تعد القبيلة أساس التنظيم الاجتماعي ويرأسها شيخ المشايخ."}, {"type": "مفهوم", "title": "العونة (الفزعة)", "summary": "عادة أردنية تعاونية في البناء والحصاد.", "details": "عادة أردنية إيجابية ما زالت تمارس إلى الآن؛ إذ يتعاون رجال القرية ونساؤها في ما بينهم لمساعدة أهل البيت في البناء، وفي مواسم الحصاد، ترافقها الأغاني والأهازيج الشعبية."}, {"type": "مفهوم", "title": "الكتاتيب", "summary": "مكان تعليم الصبيان في المساجد.", "details": "الكتاب مكان تعليم الصبيان، ظاهرة تعليمية عرفها العرب قديماً واستمرت حتى منتصف القرن العشرين. كانت ملحقة بالمساجد عادة، تعتمد على الحفظ والتلقين والتكرار، ويجرى فيها تعليم القراءة والخط والحساب والقرآن الكريم."}, {"type": "مفهوم", "title": "المدارس الرشدية", "summary": "مدارس عثمانية حكومية تعادل المرحلة الأعلى من الابتدائية.", "details": "كانت مدتها أربعة أعوام وتقام في المدن الكبرى، تأتي بعد المدارس الأولية (الابتدائية) في نظام التعليم العثماني، ثم يأتي التعليم الثانوي بمرحلتيه الإعدادية والسلطانية."}, {"type": "مفهوم", "title": "المدارس التبشيرية", "summary": "مدارس الإرساليات المسيحية الغربية في الأردن.", "details": "مدارس الإرساليات التبشيرية المسيحية الغربية تعود ملكيتها إلى الطوائف المسيحية، وكان من شروط تأسيسها الحصول على موافقة الحكومة العثمانية وخضوع مناهجها للمراقبة، وأدخلت تعليم اللغتين الإنجليزية والفرنسية."}, {"type": "مفهوم", "title": "نظام الالتزام", "summary": "نظام عثماني لجمع الضرائب من خلال ملتزمين.", "details": "نظام كانت الدولة العثمانية تطبقه في جمع الضرائب من خلال ملتزمين، أدى إلى استغلال الفلاحين وتفاقم أوضاعهم الاقتصادية."}, {"type": "مفهوم", "title": "الخط الحديدي الحجازي", "summary": "سكة حديد ربطت دمشق بالمدينة المنورة عبر الأردن.", "details": "خط حديدي جرى البدء بإنشائه عام 1900م، يربط دمشق بالمدينة المنورة مارا بالأردن، كانت محطاته محطات قافلة الحج الشامي، وأثر في نمو التجارة داخل الأردن ومع الأقطار المجاورة."}, {"type": "مصطلح", "title": "ضريبة الويركو", "summary": "ضريبة عثمانية على الأراضي وأصحاب الحرف.", "details": "من الضرائب العثمانية، فرضت على الأراضي وأصحاب الحرف، إلى جانب ضريبة العشر وضريبة المواشي وضريبة المسقفات والضرائب العرفية."}, {"type": "مصطلح", "title": "ضريبة المسقفات", "summary": "ضريبة عثمانية على الأبنية.", "details": "ضريبة كانت تفرض في العهد العثماني على الأبنية، إلى جانب ضرائب أخرى كالعشر والويركو والمواشي والضرائب العرفية."}, {"type": "مصطلح", "title": "ضريبة العشر", "summary": "ضريبة شرعية على المحاصيل الزراعية.", "details": "من الضرائب الرئيسة التي كانت تتقاضاها الدولة العثمانية، تفرض على المحاصيل الزراعية بنسبة العشر."}, {"type": "مفهوم", "title": "الليرة المجيدي", "summary": "عملة عثمانية متداولة في الأردن.", "details": "من العملات التي تداولها السكان في تلك الفترة، إلى جانب الليرة العثمانية الذهبية والبارة والبشلك، والليرة الذهبية الإنجليزية والفرنساوية."}]}, {"id": "lesson_2_3_3", "title": "الثورة العربية الكبرى (النهضة العربية)", "timeline": [{"date": "1908م", "event": "تعيين الشريف الحسين أميراً على مكة", "details": "عين السلطان عبد الحميد الثاني الشريف الحسين بن علي أميراً على مكة في عام 1908م. وكان الحسين مخلصاً لدولة الخلافة العثمانية وارتبط بصلة وثيقة بالسلطان عبد الحميد الثاني.", "type": "تأسيس"}, {"date": "1913م", "event": "المؤتمر العربي الأول في باريس", "details": "عرضت في المؤتمر العربي الأول في باريس المطالب الإصلاحية للعرب: جعل اللغة العربية لغة رسمية في الولايات العربية، والمطالبة باللامركزية، ومنح العرب مزيداً من المشاركة في أجهزة الحكم، وحصر الخدمة العسكرية الإجبارية في داخل الولايات العربية.", "type": "أخرى"}, {"date": "1915م", "event": "ميثاق (بروتوكول) دمشق", "details": "صدر عن عدد من الشخصيات السياسية والفكرية وقادة الجمعيات العربية، لتنصيب الشريف الحسين بن علي زعيماً للحركة العربية، وتفويضه بالتباحث مع بريطانيا لعقد تحالف ضد الاتحاديين الأتراك. من بنوده: اعتراف بريطانيا باستقلال البلاد العربية وإلغاء الامتيازات الأجنبية.", "type": "معاهدة"}, {"date": "1915-1916م", "event": "مراسلات الحسين-مكماهون", "details": "جاءت مراسلات الشريف الحسين بن علي مع السير هنري آرثر مكماهون المندوب السامي البريطاني في القاهرة عامَي 1915-1916م، تعبيراً عن الأهداف والتطلعات العربية المشروعة، وعن أدبيات وأفكار الحركة العربية وبياناتها ومواقفها.", "type": "معاهدة"}, {"date": "1915م", "event": "إعدامات بيروت", "details": "أقدم جمال باشا (السفاح) والي سوريا على إعدام عدد من رجالات العرب ومثقفيهم في بيروت في عام 1915م، ما زاد في تدهور العلاقات العربية - التركية.", "type": "أخرى"}, {"date": "1916م", "event": "اتفاقية سايكس - بيكو", "details": "اتفاقية سرية بين بريطانيا وفرنسا، نسبة إلى المندوبين البريطاني مارك سايكس والفرنسي جورج بيكو، تنص على تقسيم الهلال الخصيب إلى مناطق نفوذ: المنطقة الزرقاء الفرنسية المباشرة، والحمراء البريطانية المباشرة، والمنطقتان (أ) و(ب) نفوذاً غير مباشر، والبنية فلسطين تحت إشراف دولي.", "type": "معاهدة"}, {"date": "1916م", "event": "إعدامات دمشق", "details": "أعدم جمال باشا 37 شخصية عربية من خيرة المثقفين والسياسيين وعلماء الشرع وأعضاء الأحزاب والجمعيات الإصلاحية العربية في دمشق، ما هيأ المجال أمام تفكير العرب بالانفصال عن الدولة العثمانية.", "type": "أخرى"}, {"date": "10 حزيران 1916م", "event": "إعلان الثورة العربية الكبرى", "details": "أعلنت الثورة العربية في التاسع من شعبان 1334هـ، الموافق للعاشر من حزيران 1916م في مكة المكرمة بقيادة الشريف الحسين بن علي، وخاضت قوات الثورة بقيادة أنجاله الأمراء علي وعبد الله وفيصل وزيد سلسلة من المعارك في مكة المكرمة والمدينة المنورة والطائف.", "type": "ثورة"}, {"date": "1917م", "event": "وصول قوات الثورة إلى العقبة", "details": "وصلت طلائع قوات الثورة العربية الشمالية إلى مدينة العقبة بقيادة الأمير فيصل بن الحسين، وخاضت معارك في العقبة وباير والجفر وجبال الشراة وأبو اللسن وعين وهيدة ومعان ووادي موسى والطفيلة.", "type": "حرب"}, {"date": "2 تشرين الثاني 1917م", "event": "وعد بلفور", "details": "أطلق وزير الخارجية البريطانية جيمس آرثر بلفور تصريحاً سياسياً موجهاً إلى الزعيم اليهودي البريطاني الثري اللورد روتشيلد، يعلن فيه التزام الحكومة البريطانية بإقامة وطن قومي لليهود في فلسطين. رفض العرب هذا التصريح المشين ورأوا فيه إنكاراً لحقوقهم.", "type": "معاهدة"}, {"date": "1918م", "event": "معارك معان ودخول دمشق", "details": "تعد معارك معان من أهم معارك الثورة العربية الكبرى؛ إذ جرى القضاء على الحاميات التركية في منطقة معان وما حولها، ومهدت الطريق لجيش الثورة ليواصل مسيره نحو دمشق. واستمرت معارك الثورة على الأراضي الأردنية حتى دخول فصائل منها دمشق في عام 1918م.", "type": "حرب"}], "cards": [{"type": "شخصية", "title": "الشريف الحسين بن علي", "summary": "قائد الثورة العربية الكبرى وأمير مكة (1853-1931م).", "details": "ولد في إسطنبول عام 1853م في أثناء وجود والده منفياً هناك، وتلقى علومه الأولى فيها. عينه السلطان عبد الحميد الثاني أميراً على مكة عام 1908م. تمتع بمكانة رفيعة بسبب انتمائه الهاشمي وكونه من السلالة النبوية. قاد الثورة العربية الكبرى وأعلنها في العاشر من حزيران 1916م."}, {"type": "شخصية", "title": "الملك علي بن الحسين", "summary": "قائد جيش الثورة الجنوبي وملك الحجاز (1881-1935م).", "details": "كان قائداً لجيش الثورة الجنوبي الذي حاصر المدينة المنورة، وأصبح ملكاً على الحجاز، وتوفي في العراق."}, {"type": "شخصية", "title": "الملك عبد الله بن الحسين", "summary": "قائد جيش الثورة الشرقي ومؤسس إمارة شرق الأردن (1882-1951م).", "details": "كان قائداً لجيش الثورة الشرقي، الذي حرر الطائف وحاصر المدينة المنورة، وأصبح أميراً وملكاً على الأردن، واستشهد في القدس ودفن في المقابر الملكية في عمان عام 1951م."}, {"type": "شخصية", "title": "الملك فيصل بن الحسين", "summary": "قائد جيش الثورة الشمالي وملك سوريا والعراق (1883-1933م).", "details": "كان قائداً لجيش الثورة الشمالي، الذي حرر شمالي الحجاز وشرقي الأردن وسوريا، وأصبح ملكاً على سوريا وملكاً على العراق، توفي في بيرن في سويسرا، ودفن في بغداد عام 1933م."}, {"type": "شخصية", "title": "الأمير زيد بن الحسين", "summary": "نجل الشريف الحسين تولى مناصب دبلوماسية في العراق (1898-1970م).", "details": "عاش في العراق، وتولى مناصب دبلوماسية مهمة فيه. توفي في باريس ودفن في عمان."}, {"type": "معاهدة", "title": "ميثاق (بروتوكول) دمشق 1915م", "summary": "ميثاق فوّض الشريف الحسين بقيادة الحركة العربية.", "details": "صدر عام 1915م عن قيادات الجمعيات والأحزاب والتجمعات العربية كجمعيتي العربية الفتاة والعهد، لتنصيب الشريف الحسين زعيماً للحركة العربية وتفويضه بالتباحث مع بريطانيا. من بنوده: استقلال البلاد العربية ضمن حدود تمتد من خط مرسين-أضنة شمالاً إلى المحيط الهندي جنوباً وإلى الخليج العربي شرقاً والبحر الأحمر غرباً."}, {"type": "معاهدة", "title": "مراسلات الحسين - مكماهون", "summary": "مراسلات بين الشريف الحسين والمندوب البريطاني 1915-1916م.", "details": "مراسلات بين الشريف الحسين بن علي والسير هنري آرثر مكماهون المندوب السامي البريطاني في القاهرة 1915-1916م، عبرت عن الأهداف والتطلعات العربية المشروعة."}, {"type": "معاهدة", "title": "اتفاقية سايكس - بيكو 1916م", "summary": "اتفاقية سرية بين بريطانيا وفرنسا لتقسيم الهلال الخصيب.", "details": "اتفاقية سرية وقعتها بريطانيا مع فرنسا ودول الحلفاء، نسبة إلى المندوبَين البريطاني مارك سايكس والفرنسي جورج بيكو. قسمت الهلال الخصيب إلى مناطق نفوذ: زرقاء فرنسية، حمراء بريطانية، (أ) نفوذ فرنسي غير مباشر، (ب) نفوذ بريطاني غير مباشر يشمل شرقي الأردن، بنية فلسطين تحت إشراف دولي."}, {"type": "معاهدة", "title": "وعد بلفور 1917م", "summary": "تصريح بريطاني بإقامة وطن قومي لليهود في فلسطين.", "details": "تصريح سياسي أطلقه وزير الخارجية البريطانية جيمس آرثر بلفور في 2 تشرين الثاني 1917م، موجه إلى الزعيم اليهودي البريطاني اللورد روتشيلد، يعلن فيه التزام الحكومة البريطانية بإقامة وطن قومي لليهود في فلسطين. رفضه العرب ورأوا فيه إنكاراً لحقوقهم ونقضاً لتعهدات بريطانيا للشريف الحسين."}, {"type": "حركة", "title": "جمعية العربية الفتاة", "summary": "جمعية عربية سرية أيدت تنصيب الحسين قائداً للحركة العربية.", "details": "إحدى الجمعيات العربية السرية البارزة التي ساندت قيادة الشريف الحسين للحركة العربية، وأسهمت في إصدار ميثاق دمشق 1915م."}, {"type": "حركة", "title": "جمعية العهد", "summary": "جمعية عربية سرية أسهمت في ميثاق دمشق.", "details": "إحدى الجمعيات العربية السرية البارزة إلى جانب جمعية العربية الفتاة، عبّرت عن دعم قيادة الشريف الحسين للحركة العربية في ميثاق دمشق 1915م."}, {"type": "مفهوم", "title": "سياسة التتريك", "summary": "سياسة تركية متطرفة لتتريك مؤسسات الدولة وسكانها.", "details": "سياسة تصاعدت مع وصول حزب الاتحاد والترقي إلى الحكم عبر الانقلاب على السلطان عبد الحميد الثاني، تقوم على تتريك مؤسسات الدولة وإدارتها وسكانها، وأثارت مخاوف العرب ودفعتهم نحو السعي إلى تقرير المصير."}, {"type": "حركة", "title": "حزب الاتحاد والترقي", "summary": "حزب تركي وصل إلى الحكم بانقلاب على عبد الحميد الثاني.", "details": "حزب تركي تبنى المد القومي التركي المتطرف، رفض المطالب الإصلاحية للعرب التي عرضت في المؤتمر العربي الأول في باريس عام 1913م."}, {"type": "مفهوم", "title": "علم الثورة العربية الكبرى", "summary": "علم بألوان رمزية لتاريخ العرب والإسلام.", "details": "يتكون من ثلاثة مستطيلات متوازية بالألوان الأسود والأخضر والأبيض من الأعلى إلى الأسفل، يشملها مثلث أحمر من جهة السارية. الأسود رمز العقاب وراية النبي والعباسيين، الأبيض شعار الأمويين، الأخضر شعار آل البيت والفاطميين، الأحمر شعار الأسرة الهاشمية منذ أبي نمي."}, {"type": "مفهوم", "title": "وسام معان", "summary": "وسام منحه الشريف الحسين لأبطال معارك معان.", "details": "منحه الشريف الحسين بن علي تكريما لشجاعة أحرار العرب لما قدموه من بطولات في معارك معان عام 1918م. استحق هذا الوسام 343 شخصية من القادة والجنود والشهداء من الحجاز واليمن والعراق وسوريا ولبنان وفلسطين والأردن. ونالت ثلاث شخصيات أردنية هذا الوسام: محمد علي العجلوني، ومفضي عيد، وحسين مبارك."}, {"type": "حركة", "title": "الحركة الصهيونية", "summary": "حركة سياسية عنصرية تلاقت مصالحها مع الاستعمار الغربي.", "details": "حركة سياسية عنصرية تبلورت فيها الأطماع الاستعمارية، وفي أتون الحرب العالمية الأولى تلاقت المصالح الصهيونية والغربية الاستعمارية، وأفرز هذا التلاقي وعد بلفور عام 1917م."}, {"type": "مفهوم", "title": "مجلس المبعوثان", "summary": "مجلس النواب العثماني الذي شارك فيه نواب عرب.", "details": "هو مجلس النواب العثماني الذي شارك فيه نواب عرب في عهد التنظيمات العثمانية، وبعث 35 نائباً عربياً برسالة إلى الشريف الحسين يفوضونه فيها بالرئاسة الدينية والقيادة السياسية للعرب."}]}, {"id": "lesson_2_3_4", "title": "الأردن في عهد المملكة العربية السورية والحكومات المحلية", "timeline": [{"date": "1918م", "event": "دخول قوات الثورة دمشق وتأسيس الحكومة العربية", "details": "دخلت قوات الثورة العربية بقيادة الأمير فيصل بن الحسين دمشق في عام 1918م، وبدأ الأمير فيصل بتشكيل حكومة عربية، سميت لاحقاً المملكة العربية السورية، وقد شملت جميع أقطار بلاد الشام (سوريا ولبنان وفلسطين وشرقي الأردن).", "type": "تأسيس"}, {"date": "1919م", "event": "مؤتمر الصلح في فرساي ولجنة كنج-كرين", "details": "بحث مجلس الحلفاء في مؤتمر الصلح المنعقد في قصر فرساي قرب باريس مستقبل البلاد العربية بحضور الأمير فيصل بن الحسين، وتقرر إرسال لجنة دولية. تشكلت لجنة أمريكية صرفة هي لجنة كنج-كرين برئاسة هنري كينغ وتشارلز كرين، تجولت في بلاد الشام بين 10 حزيران و21 تموز 1919م واستمعت لمطالب الأهالي.", "type": "أخرى"}, {"date": "2 تموز 1919م", "event": "انعقاد المؤتمر السوري العام", "details": "عقد المؤتمر السوري العام في دمشق في الثاني من تموز 1919م، تشكل من النواب العرب الذين مثلوا بلاد الشام في مجلس المبعوثان العثماني ومن الناخبين الثانويين، ليكون برلماناً يمثل أهالي بلاد الشام كافة.", "type": "تأسيس"}, {"date": "8 آذار 1920م", "event": "إعلان قيام المملكة العربية السورية", "details": "أعاد المؤتمر السوري العام التأكيد على قراراته في اجتماعه في تاريخ 8 آذار 1920م. كما نادى بالأمير فيصل بن الحسين ملكاً على سورية الطبيعية (بلاد الشام)، وأعلن قيام المملكة العربية السورية.", "type": "تأسيس"}, {"date": "20 نيسان 1920م", "event": "معركة تل الثعالب واستشهاد كايد المفلح العبيدات", "details": "شكلت زعامات شمال الأردن في مؤتمرها في قرية قم في محافظة إربد قوة من المجاهدين لمواجهة الهجرة والاستيطان اليهوديين، بقيادة الشيخ كايد المفلح العبيدات. هاجمت مستعمرة صهيونية ومعسكراً بريطانياً في سمخ قرب بيسان في معركة تل الثعالب، واستشهد كايد المفلح وعدد من المناضلين الأردنيين، وكان أول شهيد أردني وعربي على أرض فلسطين منذ وعد بلفور.", "type": "حرب"}, {"date": "25 نيسان 1920م", "event": "قرارات مؤتمر سان ريمو", "details": "عقد المجلس الأعلى للحلفاء اجتماعاً بين 18-26 نيسان 1920م في مدينة سان ريمو الإيطالية، وقرر: وضع البلاد العربية تحت الانتداب، وتجزئة البلاد السورية إلى ثلاثة كيانات (فلسطين ولبنان وبقية البلاد)، وفرض الانتداب البريطاني على العراق وفلسطين وشرقي الأردن مع الالتزام بوعد بلفور، وفرض الانتداب الفرنسي على سورية ولبنان.", "type": "معاهدة"}, {"date": "24 تموز 1920م", "event": "معركة ميسلون وزوال المملكة العربية السورية", "details": "هاجمت القوات الفرنسية بقيادة الجنرال غورو دمشق، ووقعت معركة ميسلون في 24 تموز 1920م، وأسفرت عن استشهاد وزير دفاع المملكة العربية السورية يوسف العظمة، واستيلاء القوات الفرنسية على العاصمة دمشق، وزوال المملكة العربية السورية.", "type": "حرب"}, {"date": "آب 1920م", "event": "اجتماع السلط مع هربرت صموئيل", "details": "وجه هربرت صموئيل المندوب السامي البريطاني في القدس دعوة للزعماء في شرقي الأردن للاجتماع بهم في مدينة السلط في آب 1920م. حضر الاجتماع زعماء وسط وجنوب شرقي الأردن. وقال صموئيل إنه لا نية لإلحاق منطقة شرقي الأردن بحكومة فلسطين البريطانية وستمنح إدارة منفردة أو حكماً ذاتياً.", "type": "أخرى"}, {"date": "2 أيلول 1920م", "event": "اجتماع أم قيس", "details": "اجتماع عقد بين زعماء شمال شرقي الأردن وممثل بريطاني (الميجر سُمرست) في قرية أم قيس. عرضت فيه مطالب أردنية: تشكيل حكومة عربية برأسها أمير عربي، تكوين مجلس عام، استقلال الحكومة العربية في شرقي الأردن عن فلسطين، منع الهجرة اليهودية، إنشاء جيش وطني، حرية التبادل التجاري، انضمام شرقي الأردن إلى سوريا حين تتحقق الوحدة.", "type": "معاهدة"}, {"date": "1920-1921م", "event": "تأسيس الحكومات المحلية في شرقي الأردن", "details": "تشكلت ثلاث حكومات: حكومة عجلون ومركزها إربد برئاسة علي خلقي الشرايري، وحكومة السلط برئاسة مظهر أرسلان (من وادي الموجب جنوباً إلى سيل الزرقاء شمالاً)، وحكومة مؤاب (الكرك) برئاسة الشيخ رفيفان المجالي (من وادي الموجب شمالاً إلى وادي الحسا جنوباً).", "type": "تأسيس"}], "cards": [{"type": "دولة", "title": "المملكة العربية السورية", "summary": "دولة أسسها الأمير فيصل بن الحسين في دمشق 1918-1920م.", "details": "حكومة عربية شكلها الأمير فيصل بن الحسين بعد دخول قوات الثورة دمشق عام 1918م، شملت جميع أقطار بلاد الشام (سوريا ولبنان وفلسطين وشرقي الأردن). أعلن قيامها رسميا في 8 آذار 1920م، وزالت في معركة ميسلون 24 تموز 1920م."}, {"type": "مفهوم", "title": "لجنة كنج - كرين", "summary": "لجنة أمريكية لاستطلاع رأي أهالي بلاد الشام 1919م.", "details": "لجنة أمريكية صرفة برئاسة هنري كينغ وتشارلز كرين، تشكلت بعد رفض بريطانيا وفرنسا المشاركة في اللجنة الدولية. تجولت في أنحاء بلاد الشام بما فيها الأردن بين 10 حزيران و21 تموز 1919م، واستمعت لمطالب الأهالي. أوصت بقبول الانتداب تحت وصاية عصبة الأمم والمحافظة على وحدة بلاد الشام وترشيح فيصل رئيساً."}, {"type": "مفهوم", "title": "المؤتمر السوري العام", "summary": "برلمان شعبي مثل بلاد الشام أعلن المملكة العربية السورية.", "details": "تشكل في دمشق في 2 تموز 1919م من النواب العرب الذين مثلوا بلاد الشام في مجلس المبعوثان العثماني، ومن الناخبين الثانويين. قراراته: استقلال البلاد السورية بحدودها الطبيعية، رفض مزاعم الصهيونية في فلسطين، اختيار الأمير فيصل ملكاً دستورياً على سوريا الطبيعية."}, {"type": "معاهدة", "title": "مؤتمر سان ريمو", "summary": "مؤتمر للحلفاء عام 1920م قسم البلاد العربية إلى انتدابات.", "details": "عقد بين 18-26 نيسان 1920م في مدينة سان ريمو الإيطالية بمشاركة رؤساء وزراء بريطانيا وفرنسا وإيطاليا، وبحضور مندوبين عن اليابان وبلجيكا واليونان والحركة الصهيونية. قرر تجزئة البلاد السورية إلى ثلاثة كيانات، وفرض الانتداب البريطاني على العراق وفلسطين وشرقي الأردن مع الالتزام بوعد بلفور، والانتداب الفرنسي على سوريا ولبنان."}, {"type": "حرب", "title": "معركة ميسلون", "summary": "معركة 24 تموز 1920م أنهت المملكة العربية السورية.", "details": "وقعت في 24 تموز 1920م بين القوات الفرنسية بقيادة الجنرال غورو والقوات السورية. أسفرت عن استشهاد وزير دفاع المملكة العربية السورية يوسف العظمة، واستيلاء القوات الفرنسية على دمشق، وزوال المملكة العربية السورية."}, {"type": "شخصية", "title": "يوسف العظمة", "summary": "وزير دفاع المملكة العربية السورية استشهد في ميسلون.", "details": "وزير دفاع المملكة العربية السورية، استشهد في معركة ميسلون في 24 تموز 1920م في الدفاع عن دمشق ضد القوات الفرنسية بقيادة الجنرال غورو."}, {"type": "شخصية", "title": "الجنرال غورو", "summary": "قائد القوات الفرنسية في معركة ميسلون.", "details": "Gouraud، قائد القوات الفرنسية التي هاجمت دمشق وانتصرت في معركة ميسلون 24 تموز 1920م، فسقطت المملكة العربية السورية."}, {"type": "شخصية", "title": "هربرت صموئيل", "summary": "المندوب السامي البريطاني على فلسطين وشرقي الأردن 1920م.", "details": "Herbert Samuel، عينته بريطانيا مندوباً سامياً على فلسطين وشرقي الأردن عام 1920م. وجه دعوة للزعماء الأردنيين للاجتماع في السلط في آب 1920م، ثم في أم قيس في 2 أيلول 1920م."}, {"type": "شخصية", "title": "كايد المفلح العبيدات", "summary": "أول شهيد أردني وعربي على أرض فلسطين بعد وعد بلفور.", "details": "شيخ مشايخ الكفارات في شمال الأردن، تولى قيادة قوة المجاهدين التي شكلتها زعامات شمال الأردن في مؤتمر قرية قم في محافظة إربد. استشهد في معركة تل الثعالب في 20 نيسان 1920م، وكان أول شهيد أردني وعربي على أرض فلسطين منذ صدور وعد بلفور عام 1917م."}, {"type": "حرب", "title": "معركة تل الثعالب", "summary": "أول صدام مسلح ضد المشروع الصهيوني في فلسطين.", "details": "وقعت في 20 نيسان 1920م، هاجمت فيها قوة المجاهدين الأردنيين بقيادة كايد المفلح العبيدات مستعمرة صهيونية ومعسكراً بريطانياً في سمخ قرب بيسان، واستشهد فيها كايد المفلح وعدد من المناضلين الأردنيين، وشكلت أول صدام مسلح ضد المشروع الصهيوني على أرض فلسطين."}, {"type": "دولة", "title": "حكومة عجلون", "summary": "إحدى الحكومات المحلية في شمال شرقي الأردن.", "details": "حكومة محلية ومركزها مدينة إربد، برئاسة علي خلقي الشرايري، ثم انقسمت إلى عدد من الحكومات الفرعية. تشكلت ضمن الحكومات المحلية في شرقي الأردن 1920-1921م."}, {"type": "دولة", "title": "حكومة السلط", "summary": "حكومة محلية في وسط شرقي الأردن برئاسة مظهر أرسلان.", "details": "حكومة محلية مركزها مدينة السلط، تضم المنطقة من وادي الموجب جنوباً إلى سيل الزرقاء شمالاً، برئاسة مظهر أرسلان."}, {"type": "دولة", "title": "حكومة مؤاب (الكرك)", "summary": "حكومة محلية في جنوب شرقي الأردن برئاسة رفيفان المجالي.", "details": "حكومة محلية تمتد من وادي الموجب شمالاً إلى وادي الحسا جنوباً، برئاسة الشيخ رفيفان المجالي. كانت من الحكومات المحلية التي تشكلت بعد سقوط المملكة العربية السورية."}, {"type": "شخصية", "title": "علي خلقي الشرايري", "summary": "ضابط أردني ورئيس حكومة عجلون المحلية.", "details": "ضابط في المملكة العربية السورية شارك في الثورة العربية، ثم تولى رئاسة حكومة عجلون المحلية ومركزها إربد، وقاد متطوعين من شمال الأردن في مقاومة الفرنسيين."}, {"type": "مفهوم", "title": "اجتماع أم قيس", "summary": "اجتماع 2 أيلول 1920م طرح المطالب الأردنية.", "details": "اجتماع عقد في قرية أم قيس بين زعماء شمال شرقي الأردن والميجر سُمرست مندوباً عن هربرت صموئيل. عرضت فيه مطالب أردنية شملت: تشكيل حكومة عربية برأسها أمير عربي، تكوين مجلس عام، استقلال شرقي الأردن عن فلسطين، منع الهجرة اليهودية، إنشاء جيش وطني، انضمام شرقي الأردن لسوريا عند الوحدة."}]}]}]}, {"id": "book_3", "title": "تاريخ الأردن - الصف الثاني عشر (السياسي والاقتصادي)", "units": [{"id": "unit_3_1", "title": "الحياة السياسية في الأردن", "general_idea": "التعرّف إلى تطوّر الحياة السياسية في الأردن، بما في ذلك تطوّر المؤسّسات السياسية والإدارية والجيش والأجهزة الأمنية منذ تأسيس الإمارة عام 1921م وحتى عهد الملك عبد الله الثاني.", "lessons": [{"id": "lesson_3_1_1", "title": "تأسيس الإمارة الأردنية", "timeline": [{"date": "21 تشرين الثاني 1920م", "event": "وصول الأمير عبد الله بن الحسين إلى معان", "details": "وصل الأمير عبد الله بن الحسين إلى معان وأصدر بيانًا تحدث فيه عن تحرير سورية وإعادة الملك العربي لما كان عليه، في إشارة إلى الحكومة العربية في دمشق بقيادة الملك فيصل التي انتهت على يد فرنسا. مكث الأمير بضعة أشهر في معان وأصدر جريدة الحق يعلو والتفّ حوله عدد من الشخصيات الأردنية والعربية.", "type": "تأسيس"}, {"date": "آذار 1921م", "event": "مؤتمر القاهرة", "details": "انعقد مؤتمر بريطاني في القاهرة برئاسة وزير المستعمرات السير ونستون تشرشل، للبحث في مستقبل وجود بريطانيا في الشرق الأوسط. توصّل المؤتمر إلى ترشيح فيصل الأوّل ملكًا على العراق ودعوة الأمير عبد الله للقاء وزير المستعمرات البريطاني في القدس.", "type": "قرار"}, {"date": "آذار 1921م", "event": "اجتماع القدس بين الأمير عبد الله وتشرشل", "details": "عُقد اجتماع الأمير عبد الله وتشرشل في القدس، وضم وفد الأمير عددًا من الشخصيات السورية والفلسطينية. توصّل الطرفان إلى اتفاق يتضمن إقامة حكومة وطنية في شرقي الأردن برئاسة الأمير، مستقلة استقلالًا إداريًا عن فلسطين، وتساعدها بريطانيا ماليًا.", "type": "معاهدة"}, {"date": "11 نيسان 1921م", "event": "تأسيس أول حكومة أردنية (مجلس المشاورين)", "details": "عاد الأمير عبد الله إلى عمان وشرع في إنشاء إدارة مركزية سُمّيت مجلس المشاورين برئاسة رشيد طليع مع أعضاء من حزب الاستقلال السوري. شارك الأمير مع المجلس ممارسة صلاحيات تنفيذية تطوّرت بالتدريج للحد من سلطة المعتمد البريطاني.", "type": "تأسيس"}, {"date": "أيار 1923م", "event": "إعلان الاستقلال الإداري", "details": "زار المندوب السامي البريطاني هربرت صموئيل عمّان وألقى بيانًا اعترفت بلاده بموجبه بحكومة مستقلة إداريًا في شرقي الأردن عن فلسطين، تحت حكم الأمير عبد الله، على أن تكون حكومة دستورية. أُصطلح على تسمية هذا التطوّر الاستقلال الإداري.", "type": "استقلال"}, {"date": "1924-1922م", "event": "غزوات النجدية على الأردن", "details": "تعرّض الأردن لغزوات من نجد وصلت إلى أطراف العاصمة عمان، شكّلت أبرز التحديات الخارجية للإمارة الناشئة.", "type": "حرب"}, {"date": "1927م", "event": "تغيير اسم الإمارة إلى إمارة شرقي الأردن", "details": "حملت الإمارة عند تأسيسها اسم إمارة الشرق العربي، وفي عام 1927م تغيّر اسمها إلى إمارة شرقي الأردن.", "type": "قرار"}, {"date": "شباط 1928م", "event": "توقيع الاتفاقية الأردنية - البريطانية", "details": "وُقّعت الاتفاقية في القدس، ومن أبرز بنودها وضع قانون أساسي للبلاد، وتنازل حكومة الانتداب عن السلطتين التشريعية والتنفيذية للأمير عبد الله، والموافقة على وجود قوات بريطانية، والتزام بريطانيا بمعونة مالية سنوية. شكّلت الاتفاقية اعترافًا بريطانيًا رسميًا بوجود كيان سياسي أردني.", "type": "معاهدة"}, {"date": "نيسان 1928م", "event": "صدور القانون الأساسي للإمارة", "details": "هو أوّل دستور أردني، اشتمل على 72 مادة. تضمنت موادّه تعيين عاصمة البلاد وشكل الراية الوطنية، وحقوق المواطنين والجنسية والمساواة والحرية، وحقوق الأمير وشروط ولاية العهد، وأنواع المحاكم ودرجاتها.", "type": "قرار"}, {"date": "25 تموز 1928م", "event": "انعقاد المؤتمر الوطني الأول وإقرار الميثاق الوطني", "details": "انعقد المؤتمر في مقهى حمدان في عمان برئاسة حسين باشا الطراونة، وأقرّ الميثاق الوطني الذي تضمّن أنّ إمارة شرقي الأردن دولة عربية مستقلة، وعدم الاعتراف بالانتداب إلا كمساعدة فنية، ورفض وعد بلفور.", "type": "تأسيس"}, {"date": "1929م", "event": "إجراء أول انتخابات تشريعية وانعقاد المجلس التشريعي الأول", "details": "تألّف المجلس من 16 عضوًا منتخبًا يضاف إليهم خمسة أعضاء من المجلس التنفيذي. صادق المجلس على الاتفاقية الأردنية - البريطانية لعام 1928م.", "type": "تأسيس"}, {"date": "1935م", "event": "صدور قانون الدفاع", "details": "أصدرت المجالس التشريعية المتعاقبة قانون العقوبات المشتركة وقانون النفي والإبعاد وقانون الدفاع للحد من حرية المعارضة السياسية ونشاطها.", "type": "قرار"}], "cards": [{"type": "شخصية", "title": "الشريف الحسين بن علي", "summary": "ملك الحجاز وقائد الثورة العربية الكبرى.", "details": "لجأت إليه القيادات السياسية العربية في بلاد الشام بعد استيلاء فرنسا على دمشق لإيفاد أحد أنجاله لقيادة الحركة العربية. استجاب وأوفد نجله الثاني الأمير عبد الله إلى بلاد الشام. رفض التوقيع على المعاهدة البريطانية - الحجازية لتضمّنها الاعتراف باتفاقية سايكس - بيكو ووعد بلفور."}, {"type": "شخصية", "title": "الأمير عبد الله بن الحسين", "summary": "مؤسس الإمارة الأردنية وأول أمير لشرقي الأردن.", "details": "نجل الشريف الحسين بن علي، وصل إلى معان في 21 تشرين الثاني 1920م. شرع في إنشاء إدارة مركزية في عمّان وأسّس مجلس المشاورين عام 1921م. اتّبع مبدأ خُذ وطالب للوصول إلى الاستقلال الكامل، ودعا لاحقًا لمشروع وحدة سورية الكبرى."}, {"type": "شخصية", "title": "ونستون تشرشل", "summary": "وزير المستعمرات البريطاني خلال مؤتمر القاهرة 1921م.", "details": "ترأّس المؤتمر البريطاني في القاهرة في آذار 1921م الذي بحث مستقبل بريطانيا في الشرق الأوسط. التقى الأمير عبد الله في القدس وتوصّل معه إلى اتفاق إقامة حكومة وطنية في شرقي الأردن."}, {"type": "شخصية", "title": "رشيد طليع", "summary": "رئيس أول حكومة أردنية (مجلس المشاورين).", "details": "تولّى رئاسة مجلس المشاورين الذي تشكّل في 11 نيسان 1921م بعضوية أعضاء من حزب الاستقلال السوري."}, {"type": "شخصية", "title": "هربرت صموئيل", "summary": "المندوب السامي البريطاني في فلسطين وشرقي الأردن.", "details": "زار عمّان في أيار 1923م وألقى بيانًا اعترفت بريطانيا بموجبه بحكومة مستقلة إداريًا في شرقي الأردن. سعى لضم شرقي الأردن إلى الإدارة الفلسطينية وإخضاعها لوعد بلفور."}, {"type": "معاهدة", "title": "الاتفاقية الأردنية - البريطانية 1928م", "summary": "اتفاقية وُقّعت في القدس نظّمت العلاقة بين الإمارة الأردنية وبريطانيا.", "details": "أهم بنودها وضع قانون أساسي للبلاد، تنازل حكومة الانتداب عن السلطتين التشريعية والتنفيذية للأمير عبد الله، الموافقة على وجود قوات بريطانية، التزام بريطانيا بمعونة مالية سنوية، وإشراف بريطانيا على الامتيازات واستثمار الموارد الطبيعية."}, {"type": "مفهوم", "title": "القانون الأساسي لعام 1928م", "summary": "أول دستور أردني صدر في عام 1928م.", "details": "اشتمل على 72 مادة. تضمنت موادّه تعيين عاصمة البلاد وشكل الراية الوطنية وحقوق المواطنين والجنسية والمساواة والحرية الشخصية والعدالة، وحقوق الأمير وشروط ولاية العهد، وأنواع المحاكم ودرجاتها."}, {"type": "مفهوم", "title": "الانتداب", "summary": "شكل من أشكال الاستعمار الحديث فُرض على الأردن بالقوة.", "details": "تطلّع الأردنيون قيادة وشعبًا إلى التخلّص منه. كانت خطّة الأمير عبد الله تقوم على السعي للتخلّص التدريجي وفق مبدأ خُذ وطالِب وصولًا إلى الاستقلال الكامل."}, {"type": "مفهوم", "title": "الميثاق الوطني الأردني 1928م", "summary": "وثيقة تمخّض عنها المؤتمر الوطني الأول للحركة الوطنية الأردنية.", "details": "تضمّن أنّ إمارة شرقي الأردن دولة عربية مستقلة ذات سيادة، تُدار بحكومة دستورية برئاسة الأمير عبد الله، وعدم الاعتراف بالانتداب إلا كمساعدة فنية، ورفض وعد بلفور، والمطالبة بانتخابات نيابية."}, {"type": "حركة", "title": "الحركة الوطنية الأردنية", "summary": "حركة وطنية عارضت الاتفاقية الأردنية - البريطانية ودعت إلى الاستقلال.", "details": "عقدت سلسلة من المؤتمرات الوطنية بين 1928-1933م، عبّرت عن مواقفها عن طريق المظاهرات والإضرابات وإرسال برقيات الاحتجاج إلى الحكومة البريطانية وعصبة الأمم. تُعدّ تجربة مبكّرة في العمل الحزبي والسياسي الأردني."}, {"type": "مؤسسة", "title": "المجلس التشريعي الأردني", "summary": "أول مجلس نيابي منتخب في الأردن عام 1929م.", "details": "تألّف المجلس من ستة عشر عضوًا منتخبًا، يُضاف إليهم خمسة أعضاء من المجلس التنفيذي. صادق المجلس التشريعي الأول على الاتفاقية الأردنية - البريطانية لعام 1928م."}]}, {"id": "lesson_3_1_2", "title": "استقلال المملكة الأردنية الهاشمية", "timeline": [{"date": "1945م", "event": "نهاية الحرب العالمية الثانية وبدء مفاوضات الاستقلال", "details": "تعمّقت الرغبة الرسمية والشعبية بضرورة استقلال البلاد، فبعثت الحكومة الأردنية مذكّرة إلى الحكومة البريطانية تطلب فيها الدخول في مفاوضات لإعلان استقلال شرقي الأردن.", "type": "قرار"}, {"date": "آذار 1946م", "event": "توقيع معاهدة التحالف والصداقة الأردنية - البريطانية", "details": "وُقّعت بعد محادثات في لندن، وألغت الاتفاقية السابقة لعام 1928م ونظام الانتداب. تضمّنت اعتراف بريطانيا بشرقي الأردن مستقلًا استقلالًا تامًا، وإقامة تحالف بين الدولتين، والتشاور في شؤون السياسة الخارجية.", "type": "معاهدة"}, {"date": "25 أيار 1946م", "event": "إعلان الاستقلال والبيعة للملك عبد الله الأول", "details": "عقد المجلس التشريعي الأردني الخامس جلسته وأصدر بالإجماع القرار التاريخي بإعلان البلاد مملكة مستقلة باسم المملكة الأردنية الهاشمية ومبايعة الأمير عبد الله ملكًا دستوريًا عليها.", "type": "استقلال"}, {"date": "آذار 1948م", "event": "توقيع المعاهدة الأردنية - البريطانية 1948م", "details": "سعت الحكومة البريطانية لتعديل بنود معاهدة 1946م. نصّت المعاهدة على التشاور التام بين الطرفين في حال نشوب نزاع مسلح، وإقامة مبدأ الدفاع المشترك، ومدة المعاهدة 25 عامًا.", "type": "معاهدة"}, {"date": "14 كانون الأول 1955م", "event": "انضمام الأردن إلى هيئة الأمم المتحدة", "details": "تقدّم الأردن بطلب رسمي للانضمام إلى الأمم المتحدة لكنه واجه معارضة الاتحاد السوفيتي وبولندا. ولم ينل عضويتها إلا في 14 كانون الأول 1955م.", "type": "قرار"}], "cards": [{"type": "معاهدة", "title": "معاهدة التحالف والصداقة الأردنية - البريطانية 1946م", "summary": "ألغت نظام الانتداب البريطاني على الأردن.", "details": "تضمّنت اعتراف بريطانيا بشرقي الأردن مستقلًا استقلالًا تامًا، إقامة تحالف بين الدولتين، التشاور في جميع شؤون السياسة الخارجية، وإنشاء علاقات دبلوماسية. تولّى الأردن مسؤولية حفظ الأمن الداخلي والدفاع عن حدوده."}, {"type": "معاهدة", "title": "المعاهدة الأردنية - البريطانية 1948م", "summary": "معاهدة معدّلة لمعاهدة 1946م سعت لتجنّب دخول الأردن في حرب فلسطين.", "details": "نصّت على التشاور التام بين الطرفين في حال نشوب نزاع مسلح مع دولة ثالثة، وإقامة مبدأ الدفاع المشترك بين الأردن وبريطانيا. مدّتها خمسة وعشرون عامًا."}, {"type": "مفهوم", "title": "العلم الأردني", "summary": "الراية الرسمية للمملكة الأردنية الهاشمية مستمد من علم الثورة العربية الكبرى.", "details": "بدأ الاستخدام الرسمي له في عام 1928م. ألوانه: الأسود راية العقاب وراية النبي محمد ﷺ، الأبيض راية الدولة الأموية، الأخضر راية الدولة الفاطمية وشعار آل البيت، الأحمر راية الهاشميين. ويُمثّل الكوكب سباعي الأشعّة فاتحة القرآن الكريم (السبع المثاني)."}, {"type": "مفهوم", "title": "شعار المملكة الأردنية الهاشمية", "summary": "شعار رسمي يستمد دلالاته من الحضارة العربية الإسلامية وتاريخ الهاشميين.", "details": "يضم التاج الملكي الهاشمي رمز نظام الحكم النيابي الملكي الوراثي، والوشاح رمز العرش الهاشمي، والرايتين رمز الثورة العربية الكبرى، وطير العقاب رمز القوة، والكرة الأرضية رمز انتشار الإسلام، والأسلحة العربية والسنابل وسعفة النخيل. شهد تحديثًا آخره عام 2006م."}, {"type": "مفهوم", "title": "السلام الملكي", "summary": "النشيد الوطني للمملكة الأردنية الهاشمية.", "details": "أقرّته لجنة تربوية في عام 1938م، وكتب كلمات النشيد الأميري الشاعر عبد المنعم الرفاعي. بعد الاستقلال أخذ اسم السلام الملكي."}]}, {"id": "lesson_3_1_3", "title": "تطوّر الحياة السياسية في الأردن بين عامَي 1948-1957م", "timeline": [{"date": "1947م", "event": "قرار تقسيم فلسطين رقم 181", "details": "صدر القرار عن الجمعية العامة للأمم المتحدة، وأعلنت بريطانيا نيّتها الانسحاب من فلسطين في 15 أيار 1948م. رفض العرب هذا القرار.", "type": "قرار"}, {"date": "15 أيار 1948م", "event": "اندلاع الحرب العربية اليهودية", "details": "شارك الأردن في الحرب إلى جانب مصر وسورية ولبنان والعراق. خاض الجيش العربي الأردني معارك ضارية، وتمكّن من المحافظة على الضفّة الغربية بما فيها مدينة القدس الشرقية، وألحق خسائر فادحة بالقوات الإسرائيلية في معارك القدس واللطرون وباب الواد.", "type": "حرب"}, {"date": "كانون الأول 1948م", "event": "مؤتمر أريحا", "details": "تقرّر فيه المناداة بالوحدة الأردنية الفلسطينية بوصفها مقدّمة للوحدة العربية، ومبايعة الملك عبد الله الأول ملكًا على الأردن وفلسطين، والمطالبة بعودة اللاجئين الفلسطينيين وتعويضهم.", "type": "قرار"}, {"date": "1950م", "event": "إعلان وحدة الضفّتين", "details": "حُلّ مجلس النواب الأردني وانتُخب مجلس جديد يمثّل الأردنيين والفلسطينيين مناصفة، وكان من أول قراراته إعلان قيام وحدة الضفّتين بعد سلسلة من المؤتمرات الفلسطينية المؤيّدة للوحدة.", "type": "قرار"}, {"date": "20 تموز 1951م", "event": "استشهاد الملك عبد الله الأول", "details": "استُشهد الملك عبد الله بن الحسين في المسجد الأقصى بينما كان يهمّ بأداء فريضة الجمعة في أثناء زيارة تفقّدية لمدن الضفّة الغربية.", "type": "وفاة"}, {"date": "6 أيلول 1951م", "event": "اعتلاء الملك طلال العرش", "details": "نودي بالأمير طلال في مجلس الأمة ملكًا دستوريًا، واعتلى عرش المملكة الأردنية الهاشمية. كانت عملية انتقال الملك أول تجربة دستورية ناجحة وهادئة جرت في الأردن.", "type": "تأسيس"}, {"date": "8 كانون الثاني 1952م", "event": "صدور الدستور الأردني الجديد", "details": "صدر في عهد الملك طلال، تضمنت مادّته الأولى أنّ المملكة الأردنية الهاشمية دولة عربية مستقلة وأن الشعب الأردني جزء من الأمة العربية. حدّد نظام الحكم نيابيًا ملكيًا وراثيًا، ونظّم العلاقة بين السلطتين التنفيذية والتشريعية.", "type": "قرار"}, {"date": "1952م", "event": "اتفاقية الضمان الجماعي العربي", "details": "أُبرمت بهدف إقامة التعاون العسكري بين دول الجامعة العربية.", "type": "معاهدة"}, {"date": "11 آب 1952م", "event": "اعتلاء الملك الحسين بن طلال العرش", "details": "بعد إعفاء الملك طلال من مهامّه الدستورية بسبب وضعه الصحي، نودي بالأمير الحسين ملكًا دستوريًا. عُيّن مجلس وصاية لإدارة شؤون الحكم لحين بلوغه السنّ القانونية.", "type": "تأسيس"}, {"date": "1 آذار 1956م", "event": "قرار تعريب قيادة الجيش العربي", "details": "أقدم الملك حسين على قرار وطني جريء ومهم وهو تعريب قيادة الجيش العربي بإعفاء الجنرال كلوب باشا من منصبه رئيسًا لهيئة الأركان وكبار الضباط البريطانيين. كان للقرار صدى عظيم على المستوى الأردني والعربي والدولي.", "type": "قرار"}, {"date": "1956م", "event": "تشكيل الحكومة الحزبية الأولى", "details": "جرت انتخابات مجلس النواب الخامس على أساس حزبي، وأسند الملك الحسين لسليمان النابلسي رئيس الحزب الوطني الاشتراكي مهمة تشكيل الحكومة.", "type": "تأسيس"}, {"date": "1957م", "event": "إنهاء المعاهدة الأردنية - البريطانية وإعلان الأحكام العرفية", "details": "وقّع الطرفان اتفاق إنهاء المعاهدة في عمّان، وفقد الأردن المعونة البريطانية السنوية البالغة 12.5 مليون جنيه إسترليني. أُقيلت الحكومة الحزبية في نيسان وأُعلنت الأحكام العرفية وحُظر العمل الحزبي.", "type": "قرار"}], "cards": [{"type": "حرب", "title": "الحرب العربية اليهودية 1948م", "summary": "أول حرب عربية إسرائيلية بعد قرار تقسيم فلسطين.", "details": "شارك فيها الأردن إلى جانب مصر وسورية ولبنان والعراق. خسر العرب 78% من مساحة فلسطين التاريخية، لكن الأردن حافظ على الضفة الغربية بما فيها القدس الشرقية والمقدسات الإسلامية والمسيحية. قدّم تضحيات كبيرة في معارك القدس واللطرون وباب الواد."}, {"type": "مفهوم", "title": "وحدة الضفّتين", "summary": "وحدة بين الضفة الشرقية (الأردن) والضفة الغربية (فلسطين) أُعلنت في 1950م.", "details": "جاءت بعد مؤتمر أريحا 1948م. عُقدت سلسلة من المؤتمرات الفلسطينية المؤيّدة للوحدة، مع احتفاظ الشعب الفلسطيني بحقّه في إقامة دولته. حُلّ مجلس النواب الأردني وانتُخب مجلس جديد يمثّل الضفّتين مناصفة."}, {"type": "شخصية", "title": "الملك عبد الله الأول بن الحسين", "summary": "مؤسّس المملكة الأردنية الهاشمية وأول ملوكها.", "details": "ابن الشريف الحسين بن علي، أسّس الإمارة الأردنية عام 1921م ثم المملكة الأردنية الهاشمية عام 1946م. استُشهد في المسجد الأقصى في 20 تموز 1951م خلال زيارة تفقّدية للضفة الغربية."}, {"type": "شخصية", "title": "الملك طلال بن عبد الله", "summary": "ثاني ملوك المملكة الأردنية الهاشمية.", "details": "وُلد في مكّة المكرّمة عام 1909م. تلقّى تعليمه في عمّان والتحق بكلية ساندهيرست العسكرية في بريطانيا وتخرّج فيها عام 1929م. عُيّن وليًا للعهد عام 1947م. شارك في الجيش العربي في حرب 1948م. صدر في عهده الدستور الأردني لعام 1952م."}, {"type": "شخصية", "title": "الملك الحسين بن طلال", "summary": "ثالث ملوك المملكة الأردنية الهاشمية، حكم منذ 1952م حتى وفاته 1999م.", "details": "اعتلى العرش بعد إعفاء والده الملك طلال من مهامّه الدستورية. شهد عهده تعريب قيادة الجيش العربي 1956م، وحرب 1967م، ومعركة الكرامة 1968م، وتوقيع معاهدة السلام مع إسرائيل 1994م. توفي في 7 شباط 1999م."}, {"type": "شخصية", "title": "سليمان النابلسي", "summary": "رئيس الحكومة الحزبية الأولى ورئيس الحزب الوطني الاشتراكي.", "details": "أسند له الملك الحسين تشكيل الحكومة عام 1956م بعد فوز الأحزاب بأغلبية مقاعد مجلس النواب. أنهت حكومته المعاهدة الأردنية - البريطانية لعام 1948م. أُقيلت في نيسان 1957م بسبب خلافات حول السياسة الخارجية."}, {"type": "مفهوم", "title": "الدستور الأردني لعام 1952م", "summary": "دستور جديد صدر في عهد الملك طلال وما زال نافذًا مع التعديلات.", "details": "نصّ على أنّ المملكة الأردنية الهاشمية دولة عربية مستقلة وأن الشعب الأردني جزء من الأمة العربية. حدّد نظام الحكم نيابيًا ملكيًا وراثيًا، ونظّم العلاقة بين السلطات. كفل حقّ العمل والتعليم وإلزامية التعليم الابتدائي ومجانيته."}, {"type": "مفهوم", "title": "مجلس الوصاية", "summary": "مجلس عيّنه مجلس الوزراء لإدارة شؤون الحكم لحين بلوغ الملك الحسين السنّ القانونية.", "details": "تشكّل بعد إعفاء الملك طلال من مهامّه الدستورية بسبب وضعه الصحي عام 1952م، وإلى حين بلوغ الملك الحسين السنّ القانونية."}, {"type": "مفهوم", "title": "تعريب قيادة الجيش العربي", "summary": "قرار وطني تاريخي اتّخذه الملك الحسين في 1 آذار 1956م.", "details": "أقدم الملك حسين على إعفاء الجنرال كلوب باشا من منصبه رئيسًا لهيئة الأركان للجيش العربي وكبار الضباط البريطانيين العاملين فيه. كان للقرار صدى عظيم على المستوى الأردني والعربي والدولي."}, {"type": "مؤسسة", "title": "الحرس الوطني الأردني", "summary": "قوات تشكّلت من الأهالي للدفاع عن القرى الأمامية وصدّ الاعتداءات الإسرائيلية.", "details": "تقرّر تشكيله للدفاع عن القرى الأمامية في مواجهة هجمات إسرائيل المتكرّرة على القرى الأردنية ومراكز الشرطة في بدايات عهد الملك الحسين."}]}, {"id": "lesson_3_1_4", "title": "تطوّر الحياة السياسية في الأردن بين عامَي 1958-1999م", "timeline": [{"date": "1958-1961م", "event": "تأسيس الجمهورية العربية المتّحدة وتوتّر العلاقات معها", "details": "اتّحدت مصر وسورية في الجمهورية العربية المتحدة. بقيت علاقة الأردن بها متوتّرة، وتعرّض الأردن للتحريض ونسج المؤامرات المتواصلة ضدّه في ظلّ غياب الحياة الحزبية.", "type": "تأسيس"}, {"date": "آب 1960م", "event": "اغتيال رئيس الوزراء هزّاع المجالي", "details": "فُوجئ الأردن بوقوع انفجار في رئاسة الوزراء في عمّان، استُشهد على إثره رئيس الوزراء هزّاع المجالي واثنا عشر مواطنًا أردنيًا معه من الموظّفين والمراجعين المدنيين.", "type": "وفاة"}, {"date": "1964م", "event": "القمّة العربية الأولى في القاهرة", "details": "عُقدت بسبب تحويل إسرائيل مياه نهر الأردن نحو صحراء النقب. تقرّر منع تحويل مياه نهر الأردن، وبناء سدّ الوحدة (سد المخيبة) على نهر اليرموك بين الأردن وسوريا. وقرّر المؤتمرون إنشاء منظّمة التحرير الفلسطينية.", "type": "قرار"}, {"date": "تشرين الثاني 1966م", "event": "الهجوم الإسرائيلي على قرية السموع", "details": "تعرّض الأردن لاعتداء إسرائيلي على قرية السموع في قضاء الخليل، وكان من أبرز الاعتداءات الإسرائيلية على القرى الأمامية في الضفة الغربية.", "type": "حرب"}, {"date": "30 أيار 1967م", "event": "توقيع معاهدة الدفاع المشترك مع مصر", "details": "بادر الملك الحسين بزيارة مصر ووقّع مع الرئيس المصري جمال عبد الناصر معاهدة الدفاع المشترك بالصيغة نفسها التي أُبرمت بين مصر وسورية.", "type": "معاهدة"}, {"date": "5 حزيران 1967م", "event": "حرب حزيران والنكسة", "details": "وجّهت إسرائيل ضربة جوية للمطارات والطائرات المصرية، تبعها تدمير سلاحَي الجو الأردني والسوري. احتلّت إسرائيل قطاع غزة وسيناء وهضبة الجولان والضفّة الغربية. بلغت الخسائر الأردنية 696 شهيدًا و421 جريحًا و520 أسيرًا، ونزوح 350 ألف لاجئ.", "type": "حرب"}, {"date": "21 آذار 1968م", "event": "معركة الكرامة", "details": "وقعت في بلدة الكرامة في الأغوار الوسطى الأردنية. هاجمت قوة إسرائيلية مدرّعة من ثلاثة محاور. تصدّى الجيش الأردني وكبّد العدو خسائر فادحة. قدّم الجيش 86 شهيدًا. حطّمت المعركة أسطورة إسرائيل (الجيش الذي لا يُقهر) ورفعت معنويات الإنسان العربي.", "type": "حرب"}, {"date": "أيلول 1970م", "event": "أحداث أيلول", "details": "بعد تدخل بعض الفصائل الفدائية في شؤون الحياة اليومية والداخلية للدولة، ومحاولة النيل من هيبة الجيش، بادر الجيش الأردني إلى حسم الأمور بإخراج المسلحين من العاصمة والمدن. حاول الجيش السوري التدخل لصالحهم وطوّق إربد لكن القوات الأردنية أجبرته على الانسحاب.", "type": "حرب"}, {"date": "1971م", "event": "اغتيال وصفي التل وإخراج الفدائيين", "details": "أدّت أحداث أيلول إلى اغتيال رئيس الوزراء الأردني وصفي التل من قبل منظمة أيلول الأسود في القاهرة. وجرى إخراج المسلحين الفدائيين من الأردن نهائيًا في عام 1971م.", "type": "وفاة"}, {"date": "1971-1974م", "event": "الاتحاد الوطني العربي", "details": "تأسّس عام 1971م كتنظيم سياسي يُمثّل التوجّهات الرسمية للدولة الأردنية، ويضم أبناء الشعب الأردني من الأصول والمنابت كافّة. جرت انتخابات مجلسه عام 1972م واستمر حتى عام 1974م.", "type": "تأسيس"}, {"date": "6 تشرين الأول 1973م", "event": "حرب رمضان (تشرين)", "details": "هاجمت القوات المصرية والسورية إسرائيل. بادر الأردن إلى نجدة سورية بإرسال قوات إلى جبهة الجولان. سجّل الجيش الأردني تضحيات مشهودة على ثرى الجولان، وأسهم في عدم تقدّم القوات الإسرائيلية إلى دمشق.", "type": "حرب"}, {"date": "1974م", "event": "قمة الرباط", "details": "عدّت منظّمة التحرير الفلسطينية المُمثّل الشرعي والوحيد للشعب الفلسطيني.", "type": "قرار"}, {"date": "1978-1984م", "event": "المجلس الوطني الاستشاري", "details": "شُكّل في عام 1978م لسد الفراغ الدستوري الذي أحدثه تجميد الحياة النيابية. مهمّته إسداء المشورة ومناقشة السياسة العامة والنظر في التشريعات المؤقّتة. تشكّل ثلاث مرات بمعدّل عامين لكلّ مرّة.", "type": "تأسيس"}, {"date": "31 تموز 1988م", "event": "قرار فكّ الارتباط الإداري والقانوني مع الضفّة الغربية", "details": "اتُّخذ القرار في ظلّ ظروف الانتفاضة الفلسطينية الأولى وإلحاح منظمة التحرير الفلسطينية، وتطبيقًا لقرار قمة الرباط 1974م. أوضحت الحكومة أن القرار لن يمسّ العلاقة التاريخية بين الشعبين، وأن الأردن سيواصل رعاية المقدسات في القدس.", "type": "قرار"}, {"date": "نيسان 1989م", "event": "هبّة نيسان وعودة الحياة النيابية", "details": "وقعت احتجاجات شعبية في عدة مناطق بسبب ارتفاع الأسعار. رُفعت شعارات سياسية تطالب بعودة الحياة النيابية وإلغاء الأحكام العرفية. استجاب الملك الحسين وأمر بإجراء انتخابات نيابية في تشرين الثاني 1989م.", "type": "ثورة"}, {"date": "1991م", "event": "إصدار الميثاق الوطني الأردني", "details": "شكّل الملك الحسين عام 1990م لجنة ملكية لصياغة ميثاق وطني أردني، وعملت اللجنة على إصداره في عام 1991م. أُلغي قانون الأحكام العرفية، وصدر قانون الأحزاب السياسية في عام 1992م.", "type": "قرار"}, {"date": "1991م", "event": "مؤتمر مدريد للسلام", "details": "وفّر الأردن مظلة مشتركة تجمع الأردن وممثّلي منظمة التحرير الفلسطينية في الوفد الأردني الفلسطيني المشترك للمشاركة في المؤتمر. بعد انفضاضه انتقلت المفاوضات الثنائية إلى واشنطن.", "type": "معاهدة"}, {"date": "تشرين الأول 1994م", "event": "توقيع معاهدة السلام الأردنية - الإسرائيلية (وادي عربة)", "details": "وُقّعت في منطقة وادي عربة الحدودية بعد مفاوضات ثنائية. هدفت إلى ترسيم حدود رسمية ودولية معترف بها مع الجانب الإسرائيلي، واستعادة المياه والأراضي في الباقورة والغمر، وتأكيد الدور الأردني في رعاية المقدسات في القدس.", "type": "معاهدة"}, {"date": "7 شباط 1999م", "event": "وفاة الملك الحسين بن طلال", "details": "توفي الملك الحسين وانتقل العرش الهاشمي إلى الملك عبد الله الثاني. وُصِفت جنازته بجنازة العصر، إذ توافد على عمّان ملوك وملكات وأمراء ورؤساء دول وحكومات من كلّ أنحاء العالم.", "type": "وفاة"}], "cards": [{"type": "حرب", "title": "حرب حزيران 1967م", "summary": "حرب انتهت باحتلال إسرائيل الضفة الغربية وسيناء والجولان وغزة.", "details": "نشبت بعد توتّرات على الجبهة السورية وإغلاق مضائق تيران. وجّهت إسرائيل ضربة جوية للمطارات المصرية ودمّرت سلاحَي الجو الأردني والسوري. خسر الأردن الضفّة الغربية وقدس الشريف، وبلغت خسائره 696 شهيدًا و421 جريحًا و520 أسيرًا ونزوح 350 ألف لاجئ."}, {"type": "حرب", "title": "معركة الكرامة 1968م", "summary": "معركة بين الجيش الأردني وإسرائيل في الأغوار الوسطى.", "details": "وقعت في 21 آذار 1968م. تصدّى الجيش الأردني لقوات إسرائيلية مدرّعة هاجمت من ثلاثة محاور. كانت نتيجتها هزيمة الجيش الإسرائيلي وتكبّده خسائر كبيرة. قدّم الجيش الأردني 86 شهيدًا. حطّمت أسطورة إسرائيل (الجيش الذي لا يُقهر)."}, {"type": "مفهوم", "title": "أحداث أيلول 1970م", "summary": "موقف من الدولة لفرض الأمن والنظام في مواجهة الفصائل الفدائية المسلحة.", "details": "نتيجة لتدخل بعض الفصائل في شؤون الحياة اليومية ومحاولة النيل من هيبة الجيش، بادر الجيش الأردني لحسم الأمور. حاول الجيش السوري التدخل وطوّق إربد لكن الجيش أجبره على الانسحاب. أدّت الأحداث إلى اغتيال رئيس الوزراء وصفي التل في القاهرة."}, {"type": "شخصية", "title": "وصفي التل", "summary": "رئيس وزراء أردني اغتيل في القاهرة عام 1971م.", "details": "اغتيل من قبل منظمة أيلول الأسود في أثناء مشاركته في مؤتمر وزراء الدفاع العرب في القاهرة، الذي عُرضت فيه الخطّة الأردنية للمواجهة مع إسرائيل."}, {"type": "شخصية", "title": "هزّاع المجالي", "summary": "رئيس وزراء أردني استُشهد في انفجار رئاسة الوزراء عام 1960م.", "details": "استُشهد في آب 1960م في انفجار رئاسة الوزراء في عمّان، ومعه اثنا عشر مواطنًا أردنيًا من الموظفين والمراجعين المدنيين."}, {"type": "مؤسسة", "title": "الاتحاد الوطني العربي", "summary": "تنظيم سياسي يُمثّل التوجّهات الرسمية للدولة الأردنية 1971-1974م.", "details": "تأسّس عام 1971م بعد أحداث أيلول لتمتين الصفّ الوطني وتعزيز الوحدة الوطنية. يضم أبناء الشعب الأردني من الأصول والمنابت والاتجاهات الفكرية والسياسية كافّة. جرت انتخابات مجلسه عام 1972م واستمر حتى عام 1974م."}, {"type": "مؤسسة", "title": "المجلس الوطني الاستشاري", "summary": "مجلس استشاري بديل عن المجلس النيابي بين 1978-1984م.", "details": "شُكّل لسد الفراغ الدستوري الذي أحدثه تجميد الحياة النيابية. مهمّته إسداء المشورة ومناقشة السياسة العامّة والنظر في التشريعات والقوانين المقدّمة من الحكومة بوصفها قوانين مؤقتة. تشكّل ثلاث مرات بمعدل عامين لكل مرّة."}, {"type": "قرار", "title": "قرار فكّ الارتباط 1988م", "summary": "قرار أردني بفكّ الارتباط الإداري والقانوني مع الضفّة الغربية.", "details": "اتُّخذ في 31 تموز 1988م في ظل الانتفاضة الفلسطينية الأولى وتطبيقًا لقرار قمة الرباط 1974م. أوضحت الحكومة الأردنية أن القرار لن يمسّ العلاقة الأخوية مع الشعب الفلسطيني، وأن الأردن سيواصل رعاية المقدسات الإسلامية والمسيحية في القدس."}, {"type": "معاهدة", "title": "معاهدة وادي عربة 1994م", "summary": "معاهدة السلام الأردنية - الإسرائيلية.", "details": "وُقّعت في تشرين الأول 1994م في منطقة وادي عربة الحدودية. هدفت إلى ترسيم حدود رسمية مع إسرائيل، واستعادة الأردن لحقه من مياه نهر الأردن، واستعادة أراضيه المحتلة في الباقورة والغمر، وتأكيد الدور الأردني في رعاية المقدسات في القدس."}, {"type": "مفهوم", "title": "الباقورة والغمر", "summary": "منطقتان أردنيتان كانتا محتلتين من إسرائيل واستعادهما الأردن.", "details": "ضمن معاهدة السلام الأردنية - الإسرائيلية عام 1994م، استعاد الأردن أراضيه في منطقتَي الباقورة والغمر."}]}, {"id": "lesson_3_1_5", "title": "الحياة السياسية في الأردن منذ عام 1999م", "timeline": [{"date": "7 شباط 1999م", "event": "تسلّم الملك عبد الله الثاني سلطاته الدستورية", "details": "تسلّم الملك عبد الله الثاني سلطاته الدستورية ملكًا للمملكة الأردنية الهاشمية بعد انتقال والده الملك الحسين إلى الرفيق الأعلى. أدّى اليمين الدستورية أمام مجلس الأمة في اليوم نفسه.", "type": "تأسيس"}, {"date": "2002م", "event": "إطلاق مبادرة الأردن أولًا وتأسيس المركز الوطني لحقوق الإنسان", "details": "سعت مبادرة الأردن أولًا إلى ترسيخ الديمقراطية وسيادة القانون وتعزيز الانتماء الوطني. وأُسّس المركز الوطني لحقوق الإنسان للإسهام في نشر ثقافة حقوق الإنسان وتعزيز الرقابة العامة.", "type": "تأسيس"}, {"date": "2003-2007م", "event": "المجلس النيابي الرابع عشر والكوتا النسائية", "details": "ضمّ المجلس ستة مقاعد مخصّصة للمرأة للمرّة الأولى وفقًا لما سُمّي الكوتا النسائية.", "type": "تأسيس"}, {"date": "2005م", "event": "إطلاق مبادرة الأجندة الوطنية", "details": "تُمثّل مشروع تحديث وطني شامل في المجالات السياسية والاقتصادية والإدارية والمنظومة القانونية.", "type": "قرار"}, {"date": "2006م", "event": "إطلاق برنامج كلّنا الأردن", "details": "سعى إلى تعزيز التصوّرات الوطنية المشتركة بين المكوّنات المجتمعية الأردنية. تفرّعت منه هيئة شباب كلّنا الأردن المعنية بتمكين الشباب وتعزيز مشاركتهم.", "type": "تأسيس"}, {"date": "2010-2011م", "event": "أحداث الربيع العربي وتأثيرها على الأردن", "details": "بدأت الأحداث في تونس وانتقلت إلى مصر وليبيا وسورية واليمن. تمكّن الأردن من النجاة بإستراتيجية الحوار والتواصل، وأمر الملك بتشكيل لجنة الحوار الوطني.", "type": "ثورة"}, {"date": "26 نيسان 2011م", "event": "تشكيل اللجنة الملكية للتعديلات الدستورية", "details": "كُلّفت بمراجعة نصوص الدستور بما يضمن ترسيخ التوازن بين السلطات. نتج عنها إنشاء المحكمة الدستورية والهيئة المستقلة للانتخابات، ومحاكمة المدنيين أمام المحاكم المدنية، وتقييد صلاحيات السلطة التنفيذية.", "type": "قرار"}, {"date": "2011م", "event": "تشكيل لجنة الحوار الوطني", "details": "تألّفت من ممثّلي مختلف الاتجاهات السياسية، وأجرت حوارات طويلة وتقدّمت بتوصيات منها قانون جديد للانتخاب وقانون للأحزاب وإجراء تعديلات دستورية.", "type": "تأسيس"}, {"date": "2012م", "event": "تأسيس الهيئة المستقلة للانتخاب", "details": "هيئة مستقلة لإدارة الانتخابات والإشراف عليها، نتيجة للإصلاحات الدستورية.", "type": "تأسيس"}, {"date": "2015م", "event": "صدور قانون الإدارة اللامركزية", "details": "نصّ على انتخاب مجلس في كل محافظة يُسمّى مجلس المحافظة، على أن تُعيّن الحكومة ربع أعضائه.", "type": "قرار"}, {"date": "2021م", "event": "تشكيل اللجنة الملكية لتحديث المنظومة السياسية", "details": "نتج عنها إجراء تعديلات دستورية لتحديث المنظومة السياسية في 2022م، وصدور قانون الأحزاب وقانون الانتخاب لعام 2022م.", "type": "تأسيس"}, {"date": "2022م", "event": "صدور قانون الأحزاب وقانون الانتخاب الجديدين", "details": "نصّ قانون الأحزاب على إلحاق الإشراف عليها في الهيئة المستقلة للانتخاب، وتخصيص نسبة 20% للنساء و20% للشباب من الأعضاء المؤسّسين. نصّ قانون الانتخاب على تمثيل الأحزاب بنسب تصاعدية في المجالس النيابية.", "type": "قرار"}, {"date": "أيلول 2024م", "event": "انتخاب المجلس النيابي العشرين", "details": "انتُخب وفقًا لقانون الانتخاب الجديد الذي تمثّلت فيه الأحزاب السياسية بنسبة 30% من عدد المقاعد، ثم 50% في المجلس التالي، ثم 65% في المجلس الذي يليه ضمن ما سُمّي القائمة الحزبية.", "type": "تأسيس"}], "cards": [{"type": "شخصية", "title": "الملك عبد الله الثاني ابن الحسين", "summary": "رابع ملوك المملكة الأردنية الهاشمية منذ 1999م.", "details": "تسلّم سلطاته الدستورية في 7 شباط 1999م. أطلق العديد من المبادرات الإصلاحية مثل الأردن أولًا والأجندة الوطنية وكلّنا الأردن. أصدر سلسلة من الأوراق النقاشية، وقاد إصلاحات دستورية شاملة عامَي 2011م و2022م."}, {"type": "مفهوم", "title": "الأوراق النقاشية الملكية", "summary": "سلسلة من الأوراق أصدرها الملك عبد الله الثاني لتحفيز الحوار الوطني حول الإصلاح والتحول الديمقراطي.", "details": "تشمل سبع أوراق: الأولى مسيرتنا نحو بناء الديمقراطية المتجدّدة، الثانية تطوير نظامنا الديمقراطي، الثالثة أدوار تنتظرنا، الرابعة نحو تمكين ديمقراطي ومواطنة فاعلة، الخامسة تعميق التحول الديمقراطي، السادسة سيادة القانون أساس الدولة المدنية، السابعة تطوير التعليم أساس الإصلاح الشامل."}, {"type": "مؤسسة", "title": "المحكمة الدستورية", "summary": "محكمة أُنشئت عام 2012م ضمن الإصلاحات الدستورية.", "details": "من نتائج اللجنة الملكية للتعديلات الدستورية في عام 2011م. تختصّ بالرقابة على دستورية القوانين والأنظمة."}, {"type": "مؤسسة", "title": "الهيئة المستقلة للانتخاب", "summary": "هيئة مستقلة لإدارة الانتخابات والإشراف عليها.", "details": "تأسّست عام 2012م ضمن الإصلاحات الدستورية. أُلحق بها الإشراف على الأحزاب السياسية في قانون الأحزاب لعام 2022م."}, {"type": "مفهوم", "title": "الكوتا النسائية", "summary": "نظام تخصيص مقاعد للمرأة في مجلس النواب.", "details": "بدأت بستّة مقاعد في المجلس الرابع عشر 2003-2007م، وزيدت إلى 12 مقعدًا في المجلس السادس عشر 2010-2012م."}, {"type": "مؤسسة", "title": "المركز الوطني لحقوق الإنسان", "summary": "مؤسسة تأسّست عام 2002م.", "details": "تأسّس للإسهام في نشر ثقافة حقوق الإنسان، وتعزيز الرقابة العامة لحماية حقوق الإنسان والحريات العامّة في الأردن."}, {"type": "مفهوم", "title": "الربيع العربي", "summary": "سلسلة حركات احتجاجية شهدها العالم العربي أواخر 2010م.", "details": "بدأت في تونس وانتقلت إلى مصر وليبيا وسورية واليمن. تمكّن الأردن من النجاة من فوضاها بحكمة الإدارة، وتم استيعاب الحراك الشعبي عبر إستراتيجية الحوار والتواصل وتشكيل لجنة الحوار الوطني."}]}, {"id": "lesson_3_1_6", "title": "الأردن والعلاقات العربية والدولية", "timeline": [{"date": "1938م", "event": "بداية دعوة الأمير عبد الله لمشروع وحدة سورية الكبرى", "details": "دعا الأمير عبد الله لمشروع وحدة سورية الطبيعية (بلاد الشام) منذ عام 1938م، وأخذ زخمًا في ظل تطورات الحرب العالمية الثانية.", "type": "قرار"}, {"date": "آذار 1943م", "event": "المؤتمر الوطني في عمّان لمشروع وحدة سورية الكبرى", "details": "دعا الأمير عبد الله إلى مؤتمر وطني عُقد في عمّان يومَي الخامس والسادس من آذار 1943م، وقدّم المؤتمر مشروعين للوحدة السورية: مشروع الدولة السورية الموحّدة، ومشروع الدولة السورية الاتحادية.", "type": "تأسيس"}, {"date": "آذار 1945م", "event": "توقيع ميثاق جامعة الدول العربية في القاهرة", "details": "جرى توقيع الميثاق بعد إقرار بروتوكول الإسكندرية في أيلول 1944م بحضور مندوبين عن شرقي الأردن ومصر والعراق وسورية ولبنان والسعودية واليمن.", "type": "تأسيس"}, {"date": "1952م", "event": "ميثاق الضمان الجماعي العربي ومعاهدة الدفاع العربي المشترك", "details": "عُقدت بين دول الجامعة العربية اتفاقية الضمان الجماعي العربي، ومضمونها قيام ميثاق تعاون عسكري لمواجهة ما يهدّد الدول العربية من أخطار. ووقّع الأردن معاهدة الدفاع العربي المشترك.", "type": "معاهدة"}, {"date": "1956م", "event": "وقوف الأردن بجانب مصر في العدوان الثلاثي", "details": "وقف الأردن بجانب مصر في أثناء العدوان الثلاثي عليها.", "type": "حرب"}, {"date": "14 شباط 1958م", "event": "إعلان الاتحاد العربي بين الأردن والعراق", "details": "أُعلن عن قيام الاتحاد العربي بين الأردن والعراق على شكل اتحاد كونفدرالي. نصّ دستوره على فتح العضوية لكل دولة عربية ترغب في الانضمام. انتهى مبكرًا بعد الانقلاب العسكري الدموي في تموز 1958م في العراق بقيادة عبد الكريم قاسم.", "type": "تأسيس"}, {"date": "1961م", "event": "إرسال قوات أردنية لمساندة الكويت", "details": "وقف الأردن بجانب الكويت بإرسال قوات أردنية لمساندتها بعد اعتراض العراق على استقلالها.", "type": "حرب"}, {"date": "1972م", "event": "مشروع المملكة العربية المتحدة", "details": "عرض الملك الحسين مشروعًا لإقامة شكل جديد للوحدة بين الأردن وفلسطين (الضفة الغربية). رفضت منظمة التحرير المشروع وعارضته دول عربية كثيرة.", "type": "قرار"}, {"date": "1974-1979م", "event": "مساندة سلطنة عُمان ضد تمرّد ظفار", "details": "ساندت القوات الأردنية سلطنة عُمان ضد التمرد في منطقة ظفار.", "type": "حرب"}, {"date": "1980-1988م", "event": "وقوف الأردن إلى جانب العراق في حربه مع إيران", "details": "وقف الأردن إلى جانب العراق في حربه مع إيران، وذهب متطوّعون أردنيون للقتال إلى جانب العراق فيما سُمّي قوات اليرموك.", "type": "حرب"}, {"date": "1989م", "event": "تأسيس مجلس التعاون العربي", "details": "ضم الأردن والعراق ومصر واليمن الشمالي. شكّل أنموذجًا عمليًا لسعي الدول العربية للتضامن العربي. انتهى بسبب احتلال العراق للكويت عام 1990م.", "type": "تأسيس"}, {"date": "1990-1991م", "event": "موقف الأردن من حرب الخليج الثانية", "details": "رفض الأردن المشاركة في التحالف الدولي ضد العراق بعد احتلاله للكويت، وأصدر وثيقة الكتاب الأبيض في عام 1991م لتوضيح حقيقة الموقف الأردني.", "type": "حرب"}, {"date": "1994م", "event": "وثيقة العهد والاتفاق بين شطري اليمن", "details": "أسهمت الوساطة الأردنية في رأب الصدع بين الأشقاء اليمنيين بتوقيع وثيقة العهد والاتفاق في قصر رغدان في عمّان في رمضان 1994م.", "type": "معاهدة"}, {"date": "2003م", "event": "معارضة الأردن للاحتلال الأمريكي للعراق", "details": "عارض الأردن الاحتلال الأمريكي للعراق، ومارس دبلوماسية وقائية، وأرسل المستشفى الميداني الأردني إلى العراق بين عامَي 2003-2011م. استضاف نصف مليون عراقي تقريبًا.", "type": "حرب"}, {"date": "2003م", "event": "استضافة المنتدى الاقتصادي العالمي", "details": "استطاع الملك عبد الله الثاني أن يأتي بالمنتدى الاقتصادي العالمي في أوّل اجتماع له في الشرق الأوسط في منطقة البحر الميت. عُقد المنتدى 10 مرات بين 2003-2019م.", "type": "تأسيس"}, {"date": "2004م", "event": "إصدار رسالة عمّان", "details": "خاطب الملك عبد الله الثاني العالم ونخبه السياسية والفكرية لشرح حقيقة الإسلام عبر رسالة عمّان.", "type": "قرار"}, {"date": "2005م", "event": "تفجيرات فنادق عمّان", "details": "صُدم الأردنيون بعملية إرهابية كبيرة لتفجير ثلاثة فنادق في عمّان في وقت واحد، أسفرت عن استشهاد 60 شخصًا وإصابة 200 من المواطنين ومن جنسيات أخرى.", "type": "حرب"}, {"date": "2015م", "event": "تبنّي قرار مجلس الأمن 2250", "details": "تبنّى مجلس الأمن الدولي بالإجماع القرار رقم 2250 حول الشباب والسلم والأمن، بإسهامات ولي العهد الأمير الحسين بن عبد الله الثاني.", "type": "قرار"}], "cards": [{"type": "مفهوم", "title": "مشروع وحدة سورية الكبرى", "summary": "مشروع دعا إليه الأمير عبد الله بن الحسين لتوحيد بلاد الشام.", "details": "تضمّن مشروعين قُدّما في مؤتمر عمّان 1943م: الدولة السورية الموحّدة، والدولة السورية الاتحادية التي تضم شرقي الأردن وسورية ولبنان وفلسطين. فشل بسبب الرفض البريطاني والفرنسي والصهيوني ومعارضة بعض الدول العربية."}, {"type": "مؤسسة", "title": "جامعة الدول العربية", "summary": "منظّمة إقليمية تأسّست عام 1945م.", "details": "تأسّست بعد بروتوكول الإسكندرية 1944م وميثاقها وُقّع في القاهرة في آذار 1945م بحضور مندوبين عن شرقي الأردن ومصر والعراق وسورية ولبنان والسعودية واليمن. حافظ الأردن على دور حيوي في مؤسّساتها."}, {"type": "مفهوم", "title": "مشروع المملكة العربية المتحدة 1972م", "summary": "مشروع طرحه الملك الحسين لإقامة وحدة بين الأردن وفلسطين.", "details": "نصّ على تسمية المملكة بعد الاتحاد المملكة العربية المتحدة وتتكوّن من الضفّتين، وعمّان عاصمتها، ويتولى الملك رئاستها. رفضته منظمة التحرير الفلسطينية وعارضته دول عربية كثيرة."}, {"type": "مؤسسة", "title": "مجلس التعاون العربي 1989م", "summary": "مجلس ضم أربع دول عربية.", "details": "ضم الأردن والعراق ومصر واليمن الشمالي، مع إمكانية انضمام دول عربية أخرى. تأسس بعد مجلس التعاون لدول الخليج العربي 1981م والاتحاد المغربي 1989م. انتهى بسبب احتلال العراق للكويت عام 1990م."}, {"type": "معاهدة", "title": "الاتحاد العربي 1958م", "summary": "اتحاد كونفدرالي بين الأردن والعراق.", "details": "أُعلن في 14 شباط 1958م. نص دستوره على فتح العضوية لكل دولة عربية ترغب في الانضمام. انتهى مبكرًا بعد الانقلاب العسكري الدموي بقيادة عبد الكريم قاسم في تموز 1958م."}, {"type": "مفهوم", "title": "رسالة عمّان 2004م", "summary": "رسالة أصدرها الملك عبد الله الثاني للدفاع عن صورة الإسلام.", "details": "خاطب فيها العالم ونخبه السياسية والفكرية لشرح حقيقة الإسلام، في إطار اهتمام الملك بالدفاع عن صورة الإسلام."}, {"type": "مفهوم", "title": "حلف بغداد", "summary": "حلف عسكري ضمّ تركيا والعراق وإيران وباكستان وبريطانيا.", "details": "رفض الأردن الدخول فيه في عام 1955م بضغط من القوى الشعبية السياسية التي عدّته شكلًا جديدًا من أشكال الأحلاف الاستعمارية. استجاب الملك الحسين للموقف الشعبي وأوقف المباحثات."}]}, {"id": "lesson_3_1_7", "title": "القوات المسلحة الأردنية - الجيش العربي", "timeline": [{"date": "1923م", "event": "تولّي بيك باشا قيادة الجيش العربي", "details": "تشكّلت النواة الأولى للجيش العربي من قوّة الدرك وقوّة الهجّانة وبعض الكتائب. تولّى قيادته فريدريك بيك باشا. اقتصرت مهامّ الجيش على الأمن الداخلي.", "type": "تأسيس"}, {"date": "1930م", "event": "تأسيس قوّة البادية", "details": "تأسّست قوة الصحراء أو قوة البادية التابعة للجيش العربي. تسلّم قيادتها الضابط البريطاني جون كلوب. كُلفت بمهامّ أمنية في مناطق البادية وحراسة الحدود ومنع التسلل والغزو.", "type": "تأسيس"}, {"date": "1941م", "event": "تشكيل كتائب المشاة الأولى", "details": "شُكّلت كتيبة المشاة الأولى والثالثة، والخدمات الطبية الملكية. كان للجيش العربي مشاركة في عمليات الحرب العالمية الثانية في العراق وسورية وفلسطين.", "type": "تأسيس"}, {"date": "1948م", "event": "مشاركة الجيش العربي في حرب فلسطين", "details": "شارك الجيش العربي الأردني في الحرب ودافع عن الضفة الغربية. سجّل تضحيات مشرّفة في معارك باب الواد واللطرون وعلى أسوار القدس ومبنى نوتردام وحي المغاربة. هو الجيش العربي الوحيد الذي حافظ على الأرض التي قاتل فيها.", "type": "حرب"}, {"date": "1 آذار 1956م", "event": "تعريب قيادة الجيش العربي", "details": "خطوة وطنية مهمة على طريق استكمال الاستقلال والسيادة الوطنية، وأسّست لإلغاء المعاهدة الأردنية - البريطانية في 13 آذار 1957م. فُصلت الشرطة والدرك عن الجيش وأُنشئت مديرية الأمن العام وأُلحقت بوزارة الداخلية.", "type": "قرار"}, {"date": "1967م", "event": "خسائر الجيش العربي في حرب حزيران", "details": "خاض الجيش الحرب إلى جانب قوات مصر وسورية، وتكبّد خسائر فادحة، وقدّم مئات الشهداء وخسر جزءًا كبيرًا من معدّاته العسكرية.", "type": "حرب"}, {"date": "21 آذار 1968م", "event": "بطولات الجيش في معركة الكرامة", "details": "سجّل الجيش العربي صفحات من البطولة في معركة الكرامة ضد الجيش الإسرائيلي، وقدّم 86 شهيدًا. أسفرت المعركة عن تراجع الجيش الإسرائيلي وتحطّمت خرافة الجيش الذي لا يُقهر.", "type": "حرب"}, {"date": "تشرين الأول 1973م", "event": "مشاركة الجيش في حرب رمضان", "details": "شارك الجيش العربي الأردني في حرب رمضان على الجبهة السورية، وسجّل بطولات على أرض الجولان العربية، وقدّم عشرات الشهداء والجرحى.", "type": "حرب"}, {"date": "1984م", "event": "تأسيس كلية العلوم العسكرية في جامعة مؤتة", "details": "تأسّست كلية العلوم العسكرية في الجناح العسكري في جامعة مؤتة.", "type": "تأسيس"}, {"date": "1985م", "event": "إنشاء مديرية الحرب الإلكترونية", "details": "أُنشئت في إطار التطوير المستمر لأسلحة الجيش العربي وتشكيلاته.", "type": "تأسيس"}, {"date": "1995م", "event": "تأسيس مديرية شؤون المرأة العسكرية", "details": "أُسّست لتعزيز دور المرأة في القوات المسلحة الأردنية بعد بدء انتسابها للجيش منذ الخمسينيات.", "type": "تأسيس"}, {"date": "1999م", "event": "تأسيس مركز الملك عبد الله الثاني للتصميم والتطوير", "details": "ويُسمّى حاليًا المركز الأردني للتصميم والتطوير، أُسّس في عهد الملك عبد الله الثاني.", "type": "تأسيس"}, {"date": "2009م", "event": "افتتاح مركز الملك عبد الله الثاني لتدريب العمليات الخاصة", "details": "أُنشئ مركز تدريب متخصّص في العمليات الخاصة في إطار التطوير المستمر للقوات المسلحة في عهد الملك عبد الله الثاني.", "type": "تأسيس"}], "cards": [{"type": "مؤسسة", "title": "الجيش العربي (القوات المسلحة الأردنية)", "summary": "الجيش الوطني الأردني الذي يحمي الوطن ويدافع عنه.", "details": "تشكّلت نواته الأولى عام 1923م من قوّة الدرك والهجّانة وبعض الكتائب. شارك في حروب 1948 و1967 و1973م، ومعركة الكرامة 1968م. شهد تطورًا كبيرًا في عهد الملك الحسين والملك عبد الله الثاني."}, {"type": "مفهوم", "title": "قوّة البادية", "summary": "قوة عسكرية أردنية تأسست عام 1930م.", "details": "تأسّست كقوّة صحراء تابعة للجيش العربي بقيادة جون كلوب. كُلفت بمهامّ أمنية في مناطق البادية الشاسعة وبحراسة الحدود ومنع التسلل والغزو."}, {"type": "شخصية", "title": "فريدريك بيك (بيك باشا)", "summary": "أول قائد بريطاني للجيش العربي عام 1923م.", "details": "تولّى قيادة الجيش العربي عام 1923م، وكانت مهامّ الجيش في عهده مقتصرة على الأمن الداخلي، وضمّت شرطة الأرياف وشرطة المدن وإدارة السجون."}, {"type": "شخصية", "title": "جون كلوب (كلوب باشا)", "summary": "ضابط بريطاني تولّى قيادة قوة البادية ثم الجيش العربي.", "details": "تسلّم قيادة قوّة البادية منذ تأسيسها عام 1930م. أعفي من منصبه رئيسًا لهيئة الأركان في 1 آذار 1956م بقرار تعريب قيادة الجيش العربي."}, {"type": "مؤسسة", "title": "المركز الأردني للتصميم والتطوير", "summary": "مركز عسكري أردني للتصميم والتطوير، تأسس 1999م.", "details": "تأسس باسم مركز الملك عبد الله الثاني للتصميم والتطوير في عام 1999م، ويُسمّى حاليًا المركز الأردني للتصميم والتطوير."}, {"type": "مؤسسة", "title": "مركز الملك عبد الله الثاني لتدريب العمليات الخاصة", "summary": "مركز تدريب أُنشئ عام 2009م.", "details": "أُنشئ ضمن مسيرة التحديث والتطوير للقوات المسلحة الأردنية في عهد الملك عبد الله الثاني، ويُعنى بتدريب العمليات الخاصة."}]}, {"id": "lesson_3_1_8", "title": "الأجهزة الأمنية الأردنية", "timeline": [{"date": "1921م", "event": "إنشاء أول قوّة عسكرية لحفظ الأمن", "details": "مع تشكيل أول حكومة أردنية، أُنشئت قوّة عسكرية لغايات حفظ الأمن والنظام.", "type": "تأسيس"}, {"date": "1927م", "event": "دمج الأمن العام بالجيش العربي", "details": "أُدمج الأمن العام بالجيش العربي وأصبح مديره مساعدًا لقائد الجيش.", "type": "قرار"}, {"date": "1948م", "event": "تشكيل هيئة الدفاع المدني", "details": "تشكّلت هيئة للدفاع المدني لتنفيذ غاياته، وكانت بداياته في عهد الإمارة تُناط بفرق مدنية محدودة العدد ضمن كادر البلديات.", "type": "تأسيس"}, {"date": "1956م", "event": "فصل الأمن العام عن الجيش", "details": "فُصل الأمن العام عن الجيش العربي، وأصبحت مديرية الأمن العام تابعة لوزارة الداخلية، وأُنيطت بها مهامّ حفظ الأمن والنظام في المملكة.", "type": "قرار"}, {"date": "1959م", "event": "إنشاء جهاز الدفاع المدني", "details": "أُنشئ جهاز الدفاع المدني عام 1959م وبقي جزءًا من تنظيم الأمن العام إلى أن انفصل عنه إداريًا في عام 1970م.", "type": "تأسيس"}, {"date": "1964م", "event": "تأسيس دائرة المخابرات العامة", "details": "دائرة ذات صبغة عسكرية تسري على ضباطها وأفرادها القوانين السارية على القوات المسلحة. مهامّها حماية الأمن الوطني، وجمع المعلومات وتحليلها، ومقاومة التخريب الفكري والمادي، ومكافحة الإرهاب والتجسس.", "type": "تأسيس"}, {"date": "1970م", "event": "انفصال الدفاع المدني عن الأمن العام إداريًا", "details": "بقي الدفاع المدني جزءًا من تنظيم الأمن العام حتى انفصل عنه إداريًا في عام 1970م.", "type": "قرار"}, {"date": "2008م", "event": "إعادة تأسيس قوّات الدرك", "details": "أُسّست قوات الدرك مع تأسيس الإمارة وتألّفت من الفرسان والهجّانة. بعد تغييرات كثيرة طالت تشكيلات الجيش والأمن العام، أُعيد تأسيس قوات الدرك على أساس التحديث والتطوير ورُفدت بأحدث الوسائل والمعدّات.", "type": "تأسيس"}, {"date": "2019م", "event": "قرار دمج الأجهزة الأمنية", "details": "أمر الملك عبد الله الثاني بدمج مديرية الأمن العام ومديرية الدرك ومديرية الدفاع المدني باسم مديرية الأمن العام. هدفت العملية إلى تعميق التنسيق الأمني المحترف وتحسين الخدمات المقدّمة للمواطن والتوفير في الموازنة العامة.", "type": "قرار"}, {"date": "2020م", "event": "تنفيذ عملية دمج الأجهزة الأمنية", "details": "نُفّذت عملية الدمج وسُنّت التشريعات اللازمة لذلك، وعُدّت الخطوة الأبرز في تاريخ المؤسّسة الأمنية.", "type": "قرار"}], "cards": [{"type": "مؤسسة", "title": "مديرية الأمن العام", "summary": "الجهاز الأمني الرئيسي في الأردن.", "details": "مرّ تشكيله بمراحل: إنشاء قوة عسكرية للأمن 1921م، دمجه بالجيش 1927م، ثم فصله عنه عام 1956م وإلحاقه بوزارة الداخلية. في 2019م أمر الملك عبد الله الثاني بدمج الأمن العام والدرك والدفاع المدني تحت اسم مديرية الأمن العام، ونُفّذ الدمج عام 2020م."}, {"type": "مؤسسة", "title": "الدفاع المدني", "summary": "جهاز أمني مدني أُنشئ عام 1959م.", "details": "بدأت أعماله في عهد الإمارة بفرق مدنية محدودة ضمن البلديات. تشكّلت هيئة للدفاع المدني عام 1948م، وأُنشئ الجهاز عام 1959م، وبقي ضمن الأمن العام حتى انفصل إداريًا عام 1970م. مهامّه: الإطفاء والإنقاذ ومكافحة التخريب المادي وتدريب الفرق التطوعية."}, {"type": "مؤسسة", "title": "قوات الدرك", "summary": "قوات أمنية أُسّست مع تأسيس إمارة شرقي الأردن.", "details": "تألّفت من الفرسان والهجّانة. بعد تغييرات كثيرة، أُعيد تأسيس قوّات الدرك عام 2008م على أساس التحديث والتطوير ورُفدت بأحدث الوسائل والمعدّات والأسلحة."}, {"type": "مؤسسة", "title": "دائرة المخابرات العامة", "summary": "دائرة استخبارية أردنية ذات صبغة عسكرية تأسست عام 1964م.", "details": "تسري على ضباطها وأفرادها القوانين السارية على القوات المسلحة. من أهم واجباتها: حماية الأمن الوطني، جمع المعلومات وتحليلها، مقاومة التخريب الفكري والمادي، مكافحة الإرهاب والتجسس، وتنفيذ المهام والعمليات الاستخبارية. تتمتع بسمعة عالمية."}, {"type": "قرار", "title": "دمج الأجهزة الأمنية 2019-2020م", "summary": "قرار ملكي بدمج الأمن العام والدرك والدفاع المدني.", "details": "أمر الملك عبد الله الثاني عام 2019م بدمج مديرية الأمن العام ومديرية الدرك ومديرية الدفاع المدني باسم مديرية الأمن العام. هدف الدمج إلى تعميق التنسيق الأمني وتحسين الخدمات والتوفير في الموازنة. نُفّذ في عام 2020م."}]}]}, {"id": "unit_3_2", "title": "الحياة الاقتصادية في الأردن", "general_idea": "التعرّف إلى تطوّر الحياة الاقتصادية في الأردن منذ تأسيس الإمارة عام 1921م حتى الوقت الحاضر، بما في ذلك تطوّر القطاعات الزراعية والصناعية والتجارية والنقدية والاستثمارية، والتحديات الاقتصادية التي واجهت الأردن.", "lessons": [{"id": "lesson_3_2_1", "title": "الحياة الاقتصادية في الأردن بين عامَي 1921-1950م", "timeline": [{"date": "1922م", "event": "إنشاء أول مصرف زراعي", "details": "أنشأت الحكومة الأردنية أول مصرف زراعي في الأردن لدعم القطاع الزراعي الذي كان المصدر الأساس للرزق والمعيشة.", "type": "تأسيس"}, {"date": "1923م", "event": "اتفاقية تجارية مع سوريا ولبنان", "details": "عقدت الحكومة الأردنية اتفاقًا تجاريًا نصّ على إعفاء الحاصلات والمنتجات الأردنية من رسوم الاستيراد في هذين القطرين، ونقل البضائع عبر ميناء بيروت والسكك الحديدية بين دمشق وعمّان.", "type": "معاهدة"}, {"date": "1924م", "event": "تشكيل أول لجنة اقتصادية عليا", "details": "شُكّلت لتطوير مقوّمات الاقتصاد الأردني، وانبثقت عنها لجان فرعية في مختلف المدن الأردنية.", "type": "تأسيس"}, {"date": "1932م", "event": "اكتشاف الفوسفات قرب الرصيفة", "details": "اكتُشفت مادّة الفوسفات قرب منطقة الرصيفة، فتأسّست شركة للتنقيب عن هذه المادّة واستخراجها.", "type": "تأسيس"}, {"date": "1945-1950م", "event": "توسّع في تأسيس الشركات", "details": "كان أكبر توسّع في تأسيس الشركات في الأردن في هذه الفترة، إذ بلغت 341 شركة، منها 42 شركة صناعية ذات صناعات متنوّعة كشركات المطاحن والأغذية والتنقيب عن الثروات المعدنية والصابون والزيوت والمرطبات.", "type": "تأسيس"}, {"date": "1949م", "event": "صدور قانون النقد الأردني", "details": "صدر القانون بعد انتهاء الانتداب البريطاني على فلسطين عام 1948م، وتشكّل بموجبه مجلس النقد الأردني ليكون الجهة الوحيدة المخوّلة بإصدار النقد.", "type": "قرار"}, {"date": "1950م", "event": "تداول الدينار الأردني وإلغاء الجنيه الفلسطيني", "details": "أصبح الدينار الأردني وحدة النقد المتداولة، وأُلغي التعامل بالجنيه الفلسطيني.", "type": "قرار"}], "cards": [{"type": "مفهوم", "title": "الزراعة في عهد الإمارة", "summary": "المصدر الأساس للرزق والمعيشة لمعظم الأردنيين.", "details": "شكّلت الأراضي الصالحة للزراعة نسبة لا تزيد على 10% من مساحة البلاد. كانت الحبوب (القمح والشعير والعدس والفول والحمص والذرة) أهم المحاصيل. تُعدّ الأغوار الأردنية وقرى الهضبة من إربد شمالًا إلى جبال الشراة جنوبًا أهمّ مناطق الزراعة."}, {"type": "مفهوم", "title": "الحرف اليدوية", "summary": "المهن التي يعتمد فيها الشخص على مهاراته الفردية والذهنية واليدوية.", "details": "ظهرت في عهد الإمارة مطاحن الحبوب اليدوية ومعاصر الزيتون الخشبية، إلى جانب صناعة النسيج اليدوي وبعض الملابس والعباءات والبسط والعُقل."}, {"type": "مؤسسة", "title": "مؤسسة الخط الحجازي الأردني", "summary": "خط سكة حديد ربط بلاد الشام بالحجاز.", "details": "أعلن السلطان عبد الحميد الثاني عام 1900م عن إنشاء الخط وانتهى العمل به عام 1908م. أنشئت المؤسسة عام 1952م وعُدّت وقفًا إسلاميًا ومؤسسة عامّة ذات شخصية حقوقية واستقلال مالي. اتّخذ الملك عبد الله الأول من محطة معان مقرًا له."}, {"type": "مؤسسة", "title": "دائرة النافعة", "summary": "أول دائرة للأشغال العامّة في الأردن.", "details": "أُنشئت مع بداية تأسيس الإمارة بهدف تشغيل العمال والفنيين والإداريين، ثم أُلحقت بوزارة المواصلات. من أبرز إنجازاتها تعبيد طرق صويلح-جرش-إربد والمفرق-جسر المجامع، وإنشاء مدارس ومستشفيات."}, {"type": "مفهوم", "title": "الدينار الأردني", "summary": "وحدة النقد الرسمية للمملكة الأردنية الهاشمية منذ 1950م.", "details": "بعد انتهاء الانتداب البريطاني على فلسطين عام 1948م، صدر قانون النقد الأردني عام 1949م وتشكّل مجلس النقد الأردني. أصبح الدينار وحدة النقد المتداولة منذ 1950م وألغي التعامل بالجنيه الفلسطيني."}, {"type": "مفهوم", "title": "الفوسفات", "summary": "ثروة معدنية اكتُشفت في الأردن عام 1932م.", "details": "اكتُشفت في منطقة الرصيفة، فتأسّست شركة للتنقيب عنها واستخراجها. توجد له استخدامات طبية وزراعية وصناعية وغذائية. أصبح من أهم صادرات الأردن لاحقًا."}]}, {"id": "lesson_3_2_2", "title": "الحياة الاقتصادية في الأردن بين عامَي 1951-1967م", "timeline": [{"date": "1951م", "event": "أول تصدير للفوسفات وتأسيس شركة البوتاس العربية", "details": "صُدّرت أوّل كمّية فوسفات إلى خارج الأردن. تأسّست شركة البوتاس العربية المساهمة لاستغلال ثروات البحر الميت.", "type": "تأسيس"}, {"date": "1952م", "event": "تأسيس وزارة الصناعة والتجارة وسلطة ميناء العقبة", "details": "أُنشئت أوّل وزارة مستقلّة للصناعة والتجارة في الأردن، وأنشأت الحكومة سلطة ميناء العقبة وعهدت إليها إنشاء ميناء العقبة وإدارته وتنميته. كما أُنشئ مطار عمّان المدني في ماركا الشمالية وهو أول مطار مدني أردني.", "type": "تأسيس"}, {"date"
