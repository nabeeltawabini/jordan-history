<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة دراسة تاريخ الأردن — تفاعلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root {
  --bg: #f5f1e8;
  --bg-elev: #ffffff;
  --bg-soft: #ebe5d4;
  --ink: #1a2332;
  --ink-soft: #4a5568;
  --ink-mute: #8a94a6;
  --accent: #1e3a5f;
  --accent-2: #c9a961;
  --accent-3: #8b6b3f;
  --border: #d8cfb8;
  --shadow: 0 2px 8px rgba(26,35,50,.06), 0 1px 2px rgba(26,35,50,.04);
  --shadow-lg: 0 12px 32px rgba(26,35,50,.12), 0 4px 8px rgba(26,35,50,.06);
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar-w: 300px;
  --header-h: 64px;

  /* Era colors */
  --era-prehistoric: #6b5b3d;
  --era-ancient: #8b4513;
  --era-classical: #b8860b;
  --era-byzantine: #4a6d8c;
  --era-islamic-early: #2d6a4f;
  --era-islamic-mid: #1b5e3f;
  --era-ottoman: #5d4037;
  --era-modern-early: #1565c0;
  --era-modern-mid: #1976d2;
  --era-contemporary: #d84315;

  /* Card type colors */
  --t-person: #c9a961;
  --t-treaty: #8e44ad;
  --t-concept: #16a085;
  --t-cause: #e67e22;
  --t-movement: #c0392b;
  --t-state: #2c3e50;
  --t-term: #7f8c8d;
  --t-place: #27ae60;
  --t-institution: #2980b9;
  --t-award: #d4af37;
}

[data-theme="dark"] {
  --bg: #0f1419;
  --bg-elev: #1a212b;
  --bg-soft: #232b36;
  --ink: #e8eaed;
  --ink-soft: #b8bfc7;
  --ink-mute: #7a8290;
  --accent: #8ab4f8;
  --accent-2: #f7c948;
  --accent-3: #d4a04a;
  --border: #2d3742;
  --shadow: 0 2px 8px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.5), 0 4px 8px rgba(0,0,0,.3);
}

/* ============ RESET ============ */
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.7;
  font-size: 16px;
  overflow: hidden;
  transition: background .3s, color .3s;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
::selection { background: var(--accent-2); color: var(--ink); }

/* ============ APP LAYOUT ============ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  height: 100vh;
}

/* ============ SIDEBAR ============ */
.sidebar {
  grid-row: 1 / -1;
  background: var(--bg-elev);
  border-inline-start: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform .3s ease;
  z-index: 10;
}
.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 8px;
  display: grid; place-items: center;
  color: white;
  font-size: 18px;
  font-weight: 900;
}
.brand-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.brand-subtitle {
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 2px;
}
.search-box {
  position: relative;
}
.search-input {
  width: 100%;
  padding: 10px 36px 10px 12px;
  background: var(--bg-soft);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--ink);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent-2); }
.search-input::placeholder { color: var(--ink-mute); }
.search-icon {
  position: absolute;
  inset-inline-end: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}
.nav-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 8px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.nav-tree::-webkit-scrollbar { width: 6px; }
.nav-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tree-book { margin-bottom: 4px; }
.tree-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  text-align: start;
  font-size: 14px;
  color: var(--ink);
  transition: background .15s;
}
.tree-toggle:hover { background: var(--bg-soft); }
.tree-toggle.book { font-weight: 700; color: var(--accent); }
.tree-toggle.unit { font-weight: 500; padding-inline-start: 24px; font-size: 13.5px; color: var(--ink-soft); }
.tree-leaf {
  display: block;
  width: 100%;
  padding: 8px 12px 8px 36px;
  text-align: start;
  font-size: 13px;
  color: var(--ink-soft);
  border-radius: var(--radius-sm);
  transition: all .15s;
  border-inline-end: 2px solid transparent;
  line-height: 1.5;
}
.tree-leaf:hover { background: var(--bg-soft); color: var(--ink); }
.tree-leaf.active {
  background: var(--bg-soft);
  color: var(--accent);
  font-weight: 700;
  border-inline-end-color: var(--accent-2);
}
.chev {
  display: inline-block;
  transition: transform .2s;
  font-size: 12px;
  color: var(--ink-mute);
}
.tree-book[open] > .tree-toggle .chev,
.tree-unit[open] > .tree-toggle .chev {
  transform: rotate(-90deg);
}
.tree-book:not([open]) > .tree-toggle .chev,
.tree-unit:not([open]) > .tree-toggle .chev {
  transform: rotate(90deg);
}
.tree-children { display: none; }
.tree-book[open] > .tree-children,
.tree-unit[open] > .tree-children { display: block; }
.count-badge {
  margin-inline-start: auto;
  background: var(--bg-soft);
  color: var(--ink-mute);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}

/* ============ HEADER ============ */
.header {
  grid-column: 2;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 5;
}
.menu-btn {
  display: none;
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  align-items: center;
  justify-content: center;
  color: var(--ink-soft);
}
.menu-btn:hover { background: var(--bg-soft); }
.breadcrumb {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--ink-soft);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.bc-item { color: var(--ink-soft); }
.bc-item.current { color: var(--ink); font-weight: 700; }
.bc-sep { color: var(--ink-mute); font-size: 10px; }
.view-toggle {
  display: flex;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.view-btn {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  transition: all .15s;
}
.view-btn:hover { color: var(--ink); }
.view-btn.active {
  background: var(--bg-elev);
  color: var(--accent);
  font-weight: 700;
  box-shadow: var(--shadow);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: var(--radius-sm);
  display: grid;
  place-items: center;
  color: var(--ink-soft);
  transition: background .15s;
}
.icon-btn:hover { background: var(--bg-soft); color: var(--ink); }

/* ============ MAIN ============ */
.main {
  grid-column: 2;
  overflow-y: auto;
  padding: 24px 28px 80px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.lesson-head {
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 2px solid var(--border);
}
.lesson-eyebrow {
  font-size: 12px;
  color: var(--accent-2);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.lesson-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.3;
}
.lesson-stats {
  margin-top: 12px;
  display: flex;
  gap: 18px;
  font-size: 13px;
  color: var(--ink-mute);
}
.lesson-stats span strong { color: var(--accent); font-weight: 700; }

.section-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 32px 0 16px;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
}
.section-bar {
  flex: 1;
  height: 2px;
  background: linear-gradient(to var(--bar-dir, left), var(--accent-2), transparent);
}

/* ============ TIMELINE ============ */
.timeline-wrap {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 0 30px;
  box-shadow: var(--shadow);
  position: relative;
}
.timeline-scroll {
  overflow-x: auto;
  padding: 24px 32px 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent-2) transparent;
}
.timeline-scroll::-webkit-scrollbar { height: 10px; }
.timeline-scroll::-webkit-scrollbar-track { background: var(--bg-soft); border-radius: 5px; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--accent-2); border-radius: 5px; }
.timeline-track {
  position: relative;
  display: flex;
  gap: 12px;
  padding: 60px 0 30px;
  min-width: 100%;
}
.timeline-line {
  position: absolute;
  top: 50%;
  inset-inline-start: 0;
  inset-inline-end: 0;
  height: 3px;
  background: linear-gradient(to left, var(--accent-2), var(--accent), var(--accent-2));
  border-radius: 2px;
  z-index: 0;
}
.tl-event {
  position: relative;
  min-width: 220px;
  max-width: 260px;
  flex-shrink: 0;
  cursor: pointer;
  z-index: 1;
}
.tl-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--era-color, var(--accent));
  border: 3px solid var(--bg-elev);
  box-shadow: 0 0 0 2px var(--era-color, var(--accent));
  margin: 0 auto;
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  transition: transform .2s;
}
.tl-event:hover .tl-dot { transform: translateY(-50%) scale(1.3); }
.tl-event:nth-child(odd) .tl-card { margin-top: -180px; }
.tl-event:nth-child(odd) .tl-connector { top: -30px; }
.tl-event:nth-child(even) .tl-card { margin-top: 30px; }
.tl-card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-inline-start: 4px solid var(--era-color, var(--accent));
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: transform .2s, box-shadow .2s;
  position: relative;
}
.tl-event:hover .tl-card {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.tl-date {
  font-size: 12px;
  font-weight: 800;
  color: var(--era-color, var(--accent));
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tl-type-icon { font-size: 14px; }
.tl-event-title {
  font-size: 13.5px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 6px;
}
.tl-event-preview {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ============ CARDS ============ */
.cards-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-pill:hover { border-color: var(--accent-2); color: var(--ink); }
.filter-pill.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.filter-pill .pill-count {
  background: rgba(255,255,255,.15);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.filter-pill:not(.active) .pill-count {
  background: var(--bg-soft);
  color: var(--ink-mute);
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card::before {
  content: '';
  position: absolute;
  inset-inline-start: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--card-color, var(--accent));
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--card-color, var(--accent));
}
.card-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.card-icon {
  font-size: 24px;
  line-height: 1;
  flex-shrink: 0;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.35;
  flex: 1;
}
.card-type {
  font-size: 11px;
  font-weight: 700;
  color: var(--card-color, var(--accent));
  text-transform: uppercase;
  letter-spacing: .5px;
  background: var(--bg-soft);
  padding: 2px 8px;
  border-radius: 10px;
}
.card-summary {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,20,25,.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  backdrop-filter: blur(4px);
  animation: fadeIn .2s ease;
}
.modal-backdrop.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
.modal {
  background: var(--bg-elev);
  border-radius: var(--radius);
  max-width: 720px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp .25s ease;
}
.modal-head {
  padding: 22px 26px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.modal-icon {
  font-size: 36px;
  line-height: 1;
}
.modal-title-wrap { flex: 1; }
.modal-meta {
  font-size: 12px;
  font-weight: 700;
  color: var(--modal-color, var(--accent));
  margin-bottom: 4px;
  letter-spacing: .5px;
}
.modal-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.3;
}
.modal-close {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: grid;
  place-items: center;
  color: var(--ink-mute);
  font-size: 22px;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--bg-soft); color: var(--ink); }
.modal-body {
  padding: 22px 26px 28px;
  overflow-y: auto;
  font-size: 15.5px;
  line-height: 1.9;
  color: var(--ink);
}

/* ============ EMPTY STATE ============ */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-mute);
}
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .5; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--ink-soft); margin-bottom: 6px; }
.empty-text { font-size: 14px; }

/* ============ WELCOME ============ */
.welcome {
  max-width: 700px;
  margin: 40px auto;
  text-align: center;
  padding: 40px 20px;
}
.welcome-icon {
  font-size: 72px;
  margin-bottom: 20px;
}
.welcome-title {
  font-size: 32px;
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 12px;
}
.welcome-text {
  font-size: 16px;
  color: var(--ink-soft);
  line-height: 1.8;
  margin-bottom: 24px;
}
.welcome-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 30px;
}
.stat-box {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 12px;
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
}
.stat-label {
  font-size: 12px;
  color: var(--ink-mute);
  margin-top: 6px;
  font-weight: 600;
}

/* ============ RESPONSIVE ============ */
.backdrop-mobile {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 9;
}
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: fixed;
    top: 0; bottom: 0;
    inset-inline-end: 0;
    width: var(--sidebar-w);
    transform: translateX(100%);
    box-shadow: var(--shadow-lg);
  }
  [dir="rtl"] .sidebar { transform: translateX(100%); }
  .sidebar.open { transform: translateX(0) !important; }
  .sidebar.open ~ .backdrop-mobile { display: block; }
  .header, .main { grid-column: 1; }
  .menu-btn { display: grid; }
  .main { padding: 16px 16px 80px; }
  .lesson-title { font-size: 22px; }
  .view-btn { padding: 6px 10px; font-size: 12px; }
  .welcome-stats { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .header { padding: 0 12px; gap: 8px; }
  .breadcrumb { font-size: 12px; }
  .view-toggle { display: none; }
  .timeline-scroll { padding: 16px 16px; }
  .tl-event { min-width: 180px; }
}

/* ============ MEGA TIMELINE BUTTON ============ */
.sidebar-mega { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg-soft); }
.mega-btn {
  width: 100%;
  padding: 11px 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-3));
  color: white;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: transform .15s, box-shadow .15s;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.mega-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.mega-btn.active { background: linear-gradient(135deg, var(--accent-2), var(--accent-3)); }

/* ============ GLOBAL SEARCH OVERLAY ============ */
.search-overlay {
  position: fixed; inset: 0;
  background: rgba(15,20,25,.7);
  z-index: 200;
  display: none;
  justify-content: center;
  padding: 60px 20px 20px;
  backdrop-filter: blur(6px);
  animation: fadeIn .15s ease;
}
.search-overlay.open { display: flex; }
.search-panel {
  background: var(--bg-elev);
  border-radius: var(--radius);
  width: 100%; max-width: 720px; max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s ease;
}
.search-panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }

مناجم استخراج معدن النحاس في الأردن، يقع بالقرب من وادي عربة في الجنوب.", "details": "يُعدّ وادي فينان بالقرب من وادي عربة في جنوب الأردن من أشهر مناجم استخراج معدن النحاس في العصر الحجري النحاسي. تدل الاكتشافات الأثرية في هذا الموقع على نشاط استخراجي وتعديني متقدم."}, {"type": "موقع", "title": "موقع بسطة الأثري", "summary": "موقع أثري في محافظة معان يعود إلى العصر الحجري الحديث.", "details": "يقع موقع بسطة في محافظة معان ويُمثّل فترة العصر الحجري الحديث. يُعدّ من المواقع الأردنية المهمة التي تُمثّل حياة الاستقرار والزراعة في تلك الحقبة."}, {"type": "موقع", "title": "تل أبو الصوان الأثري", "summary": "موقع أثري في محافظة جرش يعود إلى العصر الحجري الحديث.", "details": "يقع تل أبو الصوان في محافظة جرش ويُمثّل فترة العصر الحجري الحديث. يُعدّ من المواقع الأردنية التي تكشف عن أنماط الحياة في مرحلة الاستقرار الزراعي الأولى."}]}, {"id": "lesson_1_1_2", "title": "الأردن في العصر الحديدي", "timeline": [{"date": "1200 ق.م - 332 ق.م", "event": "العصر الحديدي في الأردن", "details": "سُمّي العصر الحديدي هذا الاسم لأن الإنسان بدأ بصناعة أدواته وأسلحته من معدن الحديد. شهد هذا العصر حدوث العديد من التغيّرات السياسية والاقتصادية والاجتماعية، تمثّلت في تحوّل نظام الحكم من دويلات المدن الذي كان سائداً في العصر البرونزي إلى نظام الحكم الملكي، وهجرة العديد من القبائل العربية من شبه الجزيرة العربية نتيجة القحط والجفاف وانهيار سد بينها إلى بلاد الشام وبلاد الرافدين وأرض الأردن، واندماجها مع السكان المحليين. وتطورت الأدوات الزراعية، وصُنعت المحاريث والمناجل وأدوات الطحن وغيرها، وسُكّت العملات المعدنية من الذهب والفضة والبرونز.", "type": "أخرى"}, {"date": "القرن الثامن ق.م", "event": "دخول المملكة المؤابية تحت حماية الدولة الآشورية", "details": "دخلت المملكة المؤابية في القرن الثامن قبل الميلاد تحت حماية الدولة الآشورية في بلاد الرافدين (العراق حالياً) التي توسّعت في بلاد الشام.", "type": "أخرى"}, {"date": "582 ق.م", "event": "المملكة العمونية تابعة للآشوريين", "details": "في عام 582 قبل الميلاد أصبحت المملكة العمونية تابعة للآشوريين في شمال بلاد الرافدين، إلى أن حلّ البابليون محلهم في النصف الثاني من القرن السادس قبل الميلاد.", "type": "أخرى"}, {"date": "539 ق.م", "event": "سقوط الدولة البابلية وانتهاء الوجود المؤابي والعموني المستقل", "details": "في عام 539 قبل الميلاد سقطت الدولة البابلية (الكلدانية) في بلاد الرافدين على يد الفرس، واختفت حينئذٍ المملكة المؤابية عن مسرح الأحداث السياسية. وفي العام نفسه دخلت المملكة العمونية تحت السيطرة الفارسية وبقيت كذلك حتى سيطر عليها الإسكندر المقدوني في عام 332 ق.م.", "type": "أخرى"}, {"date": "القرن السادس ق.م", "event": "اندماج الآدوميين مع العرب الأنباط", "details": "توسّع الآدوميون بمملكتهم غرباً حتى وصلت إلى جنوب فلسطين، وفي القرن السادس قبل الميلاد اندمجوا مع العرب الأنباط الذين استقروا في جنوبي الأردن.", "type": "أخرى"}, {"date": "332 ق.م", "event": "سيطرة الإسكندر المقدوني على المملكة العمونية", "details": "انتهت السيطرة الفارسية على المملكة العمونية بسيطرة الإسكندر المقدوني عليها في عام 332 قبل الميلاد عندما احتل بلاد الشام.", "type": "أخرى"}], "cards": [{"type": "دولة", "title": "المملكة الآدومية", "summary": "مملكة عربية أسسها الآدوميون في جنوب الأردن، امتدت من العقبة إلى وادي الحسا، وعاصمتها بصيرا.", "details": "الآدوميون من القبائل العربية التي هاجرت من شبه الجزيرة العربية واستقرّت في جنوب الأردن، وسمّوا الآدوميين نسبة إلى كلمة (آدوم) وتعني اللون الأحمر الذي تتميّز به الصخور الرملية في منطقة سكناهم في جنوب الأردن. امتدّت مملكة الآدوميين من العقبة جنوباً حتى وادي الحسا شمالاً، واتّخذوا مدينة بصيرا في محافظة الطفيلة عاصمة لهم لموقعها الاستراتيجي على الطرق التجارية. اعتمد نظام الحكم عند الآدوميين على النظام القبلي؛ إذ كان شيوخ القبائل يختارون من بينهم شيخاً يُلقّب بشيخ الشيوخ أو الملك، وكانت مهمته القيادة الإدارية والعسكرية للدولة. ومن ملوكهم: قوص ملك وأيارامو. وعبد الآدوميون الآلهة، ومن أشهرها: بعل وإيل وقوس، وشيّدوا لها المعابد. اشتُهر الآدوميون بالزراعة والرعي؛ إذ دلّت الاكتشافات الأثرية على تقنيات متطورة للري عن طريق حفر القنوات وإنشاء السدود والآبار لتجميع مياه الأمطار واستخدامها في الزراعة، وتميّزوا بنمط العمارة التي ورثها الأنباط من بعدهم. عمل الآدوميون بالتجارة أدلاّء للقوافل التجارية التي وصلت إلى الخليج العربي، وبيع ما يُنتجونه من أراضيهم إلى سكان المناطق المجاورة لهم. توسّع الآدوميون بمملكتهم غرباً حتى وصلت إلى جنوب فلسطين، وفي القرن السادس قبل الميلاد اندمجوا مع العرب الأنباط الذين استقروا في جنوبي الأردن."}, {"type": "دولة", "title": "المملكة المؤابية", "summary": "مملكة عربية ذات نظام حكم ملكي، أسسها المؤابيون في وسط الأردن وعاصمتها ذيبان.", "details": "كان نظام الحكم عند المؤابيين ملكياً، ومن أشهر ملوكهم الملك ميشع الذي انتصر على العبرانيين الذين كانوا يقيمون غربي نهر الأردن، ووسّع مملكته وشقّ الطرق وبنى المدن كمأدبا وخربة الدليلة فيها. وعبد المؤابيون الإله كموش إله الحرب وبنوا له المعابد. اهتمّ المؤابيون بزراعة القمح والشعير والذرة والأشجار المثمرة، ومارسوا الرعي؛ إذ عملوا على تربية الماعز والضأن، وحفروا الآبار لتجميع مياه الأمطار، وصنعوا الأدوات الزراعية والحربية المختلفة، وعملوا بالتجارة وأدلاء للقوافل فأقاموا التحصينات على طول الطرق التجارية لحمايتها وحراستها. دخلت المملكة المؤابية في القرن الثامن قبل الميلاد تحت حماية الدولة الآشورية في بلاد الرافدين (العراق حالياً) التي توسّعت في بلاد الشام. وبعد سقوط الدولة الآشورية وقعت المملكة المؤابية تحت سيطرة الدولة البابلية (الكلدانية) في بلاد الرافدين التي سقطت على يد الفرس في عام 539 ق.م، واختفت حينئذٍ المملكة المؤابية عن مسرح الأحداث السياسية."}, {"type": "شخصية", "title": "الملك ميشع", "summary": "أشهر ملوك المملكة المؤابية، انتصر على العبرانيين ووسّع مملكته وترك مسلّة ميشع الشهيرة.", "details": "الملك ميشع هو أشهر ملوك المملكة المؤابية الذي انتصر على العبرانيين الذين كانوا يقيمون غربي نهر الأردن، ووسّع مملكته وشقّ الطرق وبنى المدن كمأدبا وخربة الدليلة فيها. خلّف الملك ميشع مسلّة شهيرة تُعرف بـ(مسلّة ميشع) أو (حجر مؤاب)، وهي من أهم الشواهد التاريخية والأثرية على المملكة المؤابية."}, {"type": "دولة", "title": "المملكة العمونية", "summary": "مملكة عربية بنظام حكم ملكي، عاصمتها ربّة عمون (عمّان حالياً)، ازدهرت في القرنين السابع والسادس قبل الميلاد.", "details": "العمونيون هم إحدى القبائل العربية التي استقرت في المنطقة الواقعة بين وادي الموجب جنوباً وحتى نهر الزرقاء شمالاً، وأسّسوا فيها مملكة لهم، واتخذوا من ربّة عمون (عمّان حالياً) عاصمة لهم. كان نظام الحكم لديهم ملكياً، ومن أشهر ملوكهم نحّاش الأول. وعبد العمونيون العديد من الآلهة كعشتار وبعل وقوس. وصلت المملكة العمونية في القرنين السابع والسادس قبل الميلاد إلى أوج ازدهارها؛ فقد ازدادت المواقع العمونية في كل من عمان ومأدبا وحسبان، واهتموا بالزراعة وبخاصة الحبوب والأشجار المثمرة، فانتشرت معاصر العنب وحُفرت الآبار وشُيّدت أبراج حراسة المزروعات مثل رجم الملفوف في عمان بين الدوار الثالث والدوار الرابع، وصنعوا الأواني وأدوات الزينة والأسلحة وغيرها، ومارسوا التجارة وعملوا أدلاء وحراساً للقوافل التجارية. وفي عام 582 ق.م أصبحت المملكة العمونية تابعة للآشوريين في شمال بلاد الرافدين، إلى أن حل البابليون محلهم في النصف الثاني من القرن السادس قبل الميلاد، وفي عام 539 ق.م دخلت تحت السيطرة الفارسية وبقيت كذلك حتى سيطر عليها الإسكندر المقدوني في عام 332 ق.م."}, {"type": "موقع", "title": "رجم الملفوف", "summary": "برج حراسة عموني لحماية المزروعات، يقع في عمان بين الدوار الثالث والدوار الرابع.", "details": "يقع رجم الملفوف في عمان بين الدوار الثالث والدوار الرابع، وهو برج حراسة عموني كان يُستخدم لحماية المزروعات في العصر الحديدي. يُعدّ من الشواهد الأثرية المهمة على وجود المملكة العمونية وازدهارها الزراعي."}]}, {"id": "lesson_1_1_3", "title": "مملكة الأنباط", "timeline": [{"date": "القرن السادس ق.م تقريباً", "event": "استقرار الأنباط في جنوب الأردن", "details": "الأنباط إحدى القبائل العربية التي هاجرت من شبه الجزيرة العربية واستقرت جنوبي الأردن في القرن السادس قبل الميلاد تقريباً (العصر الحديدي)، فقد دلّت الحفريات الأثرية على أن الأنباط استقروا في المنطقة التي سكنها الآدوميون مثل: البترا وبصيرا وخربة الذريح، وهذا يدل على الارتباط الحضاري واللغوي بينهم.", "type": "تأسيس"}, {"date": "1985م", "event": "إدراج مدينة البترا على لائحة التراث العالمي", "details": "أُدرجت مدينة البترا على لائحة التراث العالمي لليونسكو في عام 1985م، اعترافاً بقيمتها الأثرية والحضارية الاستثنائية.", "type": "اكتشاف"}, {"date": "2007م", "event": "اختيار البترا إحدى عجائب الدنيا السبعة الجديدة", "details": "اختيرت مدينة البترا بوصفها إحدى عجائب الدنيا السبعة الجديدة عام 2007م في استفتاء عالمي شارك فيه الملايين حول العالم.", "type": "أخرى"}, {"date": "64 ق.م", "event": "الاحتلال الروماني لبلاد الشام وتهديد مملكة الأنباط", "details": "في عام 64 قبل الميلاد احتل القائد الروماني بومبي بلاد الشام، وكانت مملكة الأنباط قد احتفظت باستقلالها الذاتي في البداية مقابل دفع إتاوة سنوية لروما. بعد ذلك بدأ الرومان بسيطرتهم على الطرق التجارية وحرمان الأنباط من استخدامها، ونقلوا مركز التجارة إلى مملكة تدمر لمنافسة الأنباط تجارياً وحصارهم.", "type": "أخرى"}, {"date": "106م", "event": "احتلال الإمبراطور تراجان للبترا وضمها للولاية العربية", "details": "في عام 106م احتلّ الإمبراطور الروماني تراجان البترا وضمّها للولاية العربية التابعة لروما، بعد أن شهدت تراجعاً وضعفاً سياسياً وتجارياً ساعد على سيطرة الرومان عليها.", "type": "أخرى"}], "cards": [{"type": "دولة", "title": "مملكة الأنباط", "summary": "مملكة عربية ازدهرت في جنوب الأردن وامتدت من مدائن صالح إلى دمشق، وعاصمتها البترا.", "details": "الأنباط إحدى القبائل العربية التي هاجرت من شبه الجزيرة العربية واستقرت جنوبي الأردن في القرن السادس قبل الميلاد تقريباً. امتدّت مملكة الأنباط من مدائن صالح جنوباً حتى دمشق شمالاً، ومن وادي السرحان شرقاً حتى غزة على سواحل البحر المتوسط غرباً. اتّخذ الأنباط مدينة البترا - المدينة الوردية - عاصمة لهم لموقعها على الطرق التجارية وموقعها الحصين بين الجبال وقربها من ينابيع المياه. كان نظام الحكم عند الأنباط ملكياً وراثياً، ومن أشهر ملوكهم عبادة الأول الذي انتصر على العبرانيين، والحارث الثالث الذي وسّع مملكته حتى شملت دمشق التي سكّ نقوده فيها، والحارث الرابع الذي كانت فترة حكمه أطولها وأكثرها ازدهاراً في تاريخ الأنباط. شهد الأردن في الفترة النبطية ازدهاراً سياسياً واجتماعياً واقتصادياً وتجارياً وزراعياً، نافس فيه الحضارات المجاورة واحتل مركزاً مرموقاً على الطرق التجارية."}, {"type": "موقع", "title": "مدينة البترا", "summary": "عاصمة مملكة الأنباط، المدينة الوردية المحفورة في الصخر، وإحدى عجائب الدنيا السبع الجديدة.", "details": "مدينة البترا هي عاصمة مملكة الأنباط، وتُعرف بالمدينة الوردية لألوان صخورها. اختارها الأنباط عاصمة لهم لموقعها على الطرق التجارية وموقعها الحصين بين الجبال وقربها من ينابيع المياه. ظلّت البترا غير معروفة لدى العالم الغربي حتى زيارة الرحالة السويسري بيركهارت لها. أُدرجت على لائحة التراث العالمي في عام 1985م، واختيرت إحدى عجائب الدنيا السبعة الجديدة عام 2007م. من أبرز معالمها الأثرية: السيق والخزنة والمدرّج وقصر البنت والدير."}, {"type": "موقع", "title": "السيق في البترا", "summary": "الطريق الرئيس لمدينة البترا، شق صخري يبلغ طوله 1200 متر.", "details": "السيق اسم يُطلق على الطريق الرئيس لمدينة البترا، وهو شق صخري يصل طوله إلى 1200 متر. عند مدخل السيق توجد بقايا قوس يُمثّل بوابة المدينة، وتوجد على جانبيه القنوات والأنابيب الفخارية لجر المياه إلى المدينة، وكانت أرضيته مبلّطة بالحجارة، وما زال جزء منها موجوداً في مكانه الأصلي. يضم السيق العديد من المنحوتات كتماثيل الآلهة."}, {"type": "موقع", "title": "الخزنة في البترا", "summary": "مبنى أثري محفور في الصخر، أول معلم يواجه الزائر بعد عبور السيق، وهو في الأصل مدفن نبطي.", "details": "الخزنة مبنى أثري محفور بالصخر في مدينة البترا، ويُعدّ أول معلم يواجه الزائر بعد عبور السيق، وقد أطلق عليه السكان المحليون اسم الخزنة. تحتوي الخزنة من الداخل على ثلاث حجرات؛ حجرتين جانبيتين وواحدة في الوسط. اعتُقد قديماً أن الخزنة بُنيت بغرض العبادة، إلا أن الحفريات الأثرية أثبتت أنها مدفن نبطي."}, {"type": "موقع", "title": "المدرّج في البترا", "summary": "مدرّج نصف دائري منحوت في الصخر يبلغ قطره 95 متراً ويحتوي على 45 صفاً من المقاعد.", "details": "المدرّج هو مبنى نصف دائري منحوت في الصخر يبلغ قطره 95 متراً تقريباً، يقع في وسط مدينة البترا، ويحتوي على 45 صفاً من المقاعد. أما منطقة المسرح فهي مبنية من الحجارة المقطوعة."}, {"type": "موقع", "title": "قصر البنت في البترا", "summary": "معبد نبطي رئيسي يقع في الطرف الغربي من البترا، بُني بالحجر بدلاً من حفره في الصخر.", "details": "يقع قصر البنت في الطرف الغربي من مدينة البترا، ويُعدّ واحداً من المعابد الرئيسة في المدينة، وأحد المباني القليلة التي بُنيت بالحجر بدلاً من حفرها في الصخر. استخدم الأنباط في بنائه الحجر الرملي المقطوع الذي بُني على شكل مداميك وضع فيها الخشب؛ ما جعل جدرانه أكثر طواعية للحركة في أثناء الزلازل."}, {"type": "موقع", "title": "الدير في البترا", "summary": "مبنى أثري منحوت في الصخر على طراز الخزنة، يقع في أعلى البترا ويُعدّ مكاناً للاحتفالات.", "details": "الدير مبنى أثري منحوت في الصخر على طراز الخزنة، يقع في أعلى مدينة البترا على جبل يُسمى بالدير، ويمكن الوصول إليه بوساطة درج منحوت في الصخر. كان مكاناً للاحتفال بالمناسبات المختلفة، وتحوّل في العهد البيزنطي إلى دير للرهبان المسيحيين."}, {"type": "موقع", "title": "البيضا (البترا الصغيرة)", "summary": "موقع أثري نبطي يقع 10 كيلومترات شمال البترا، يُعرف بالبترا الصغيرة لواجهاته الحجرية المنحوتة.", "details": "البيضا إحدى المواقع الأثرية النبطية التي تقع على مسافة 10 كيلومترات شمال البترا، وتُسمى البترا الصغيرة (Little Petra) لصغر الواجهات الحجرية المنحوتة فيها، ولوجود سيق صغير يُفضي إليها شبيه بالسيق الذي يُفضي إلى الخزنة في مدينة البترا. تُعدّ البيضا من المناطق الزراعية المهمة للأنباط؛ إذ وجد فيها آثار لزراعة الكرمة ومعاصر للعنب. وتحتوي أيضاً على المضافات أو القاعات الدينية التي كانت تقام فيها الاحتفالات المختلفة."}, {"type": "موقع", "title": "خربة الذريح", "summary": "موقع نبطي في وادي اللعبان شمال مدينة الطفيلة، اشتُهر بزراعة الزيتون والكرمة.", "details": "خربة الذريح موقع نبطي يقع في وادي اللعبان شمال مدينة الطفيلة، ويُعدّ من المواقع النبطية المهمة لطبيعته الجغرافية والزراعية، ولقربه من مصادر المياه وطرق القوافل التجارية. اشتُهر هذا الموقع بزراعة الزيتون والكرمة، وكُشف فيه عن معاصر للعنب والزيتون، بالإضافة إلى مساكن القرية وأنظمة الري والمعبد."}, {"type": "موقع", "title": "أم الجمال", "summary": "مدينة نبطية تقع شرق المفرق، كانت مركزاً رئيساً على الطرق التجارية النبطية وتتميز بنظام حصاد مائي فريد.", "details": "أم الجمال مدينة تقع إلى الشرق من مدينة المفرق، كانت مركزاً رئيساً على الطرق التجارية النبطية، وواحدة من المدن التي تُصدّر المواشي إلى سكان المنطقة. لذا وجدت المساحات داخل المدينة لإيواء هذه المواشي، بالإضافة إلى أماكن خزن الحبوب. يوجد في المدينة بقايا حصون وكنائس بُنيت من الحجر البازلتي الأسود، وتتميز بنظام للحصاد المائي والتصريف الصحي يُعدّ الأبرز تاريخياً على مستوى العالم، ونظام بناء سقوف المباني بألواح من البازلت تُصفّ بجانب بعضها بعضاً وتحملها العقود."}, {"type": "موقع", "title": "حصن الأُسَيْخِم (الأُصَيْخِم)", "summary": "حصن نبطي يقع شمال شرق الأزرق، بناه الأنباط لمراقبة طريق قوافلهم التجارية.", "details": "أُسَيْخِم أو أُصَيْخِم نسبة إلى كلمة (أصخم) وتعني شدة السواد، هو حصن يقع على قمة تلة مرتفعة شمال شرق بلدة الأزرق، مشرفاً على الوديان التي تجري فيها المياه في موسم الأمطار. بناه الأنباط لمراقبة طريق قوافلهم التجارية من جنوب جزيرة العرب إلى بلاد الشام، واستمر استخدامه في الفترات الرومانية والبيزنطية والإسلامية."}, {"type": "مفهوم", "title": "هندسة الري عند الأنباط", "summary": "تقنيات متقدمة لجمع وتوزيع المياه، شملت خزانات صخرية وقنوات وسدوداً اعتراضية.", "details": "يُعدّ الأردن من المناطق الفقيرة بالمياه وبخاصة السطحية منها، فكان الاعتماد الرئيس على مياه الأمطار. وللتغلب على مشكلة نقص المياه، أتقن الأنباط هندسة الري، وبرعوا في الحصاد المائي بحفر الخزانات في الصخر لجمع مياه الأمطار، وبنوا القنوات وصنعوا الأنابيب الفخارية لجر المياه من عيون الماء المحيطة بالبترا إلى داخل المدينة، وبنوا السدود الاعتراضية لتجنّب خطر السيول التي تُداهم المدينة في فصل الشتاء والاستفادة من المياه في فصل الصيف وريّ المزروعات، وشمل ذلك المدن والقرى جميعها التابعة لمملكة الأنباط."}, {"type": "مفهوم", "title": "الصناعة النبطية", "summary": "صناعات متنوعة شملت الفخار المميز والمعادن والنسيج والحلي واستخراج الملح والنحاس والقار.", "details": "عمل الأنباط على استخراج الملح من البحر الميت وبيعه في فلسطين، واستخراج النحاس من مناجم وادي عربة وسيناء، وجمع القار وهو مادة لزجة شبيهة بمادة القطران الأسود من البحر الميت وتصديره إلى مصر لاستخدامه في التحنيط. صنعوا الأدوات المعدنية كالأزاميل والفؤوس والأسلحة، ونحتوا التماثيل المختلفة من الحجارة، وكذلك أدوات الطحن والأجران. اشتُهر الأنباط بفخّارهم المميز في صناعته ورقته وجمال زخارفه، فصنعوا الأطباق والأباريق والجرار والكؤوس والأسرجة والأنابيب الفخارية وغيرها. عرفوا صناعة النسيج والجلود، وصناعة الحلي من المعدن والعاج والعظام والأحجار الكريمة. اشتُهر الأنباط أيضاً بصناعة الأخشاب واستخدموها في عمارتهم وصناعة السفن والتوابيت الخشبية."}, {"type": "مفهوم", "title": "التجارة النبطية", "summary": "ازدهرت التجارة بسبب الموقع المتوسط للأنباط على الطرق التجارية البرية والبحرية.", "details": "تمتّع الأنباط بموقع تجاري مهم يتوسط الطرق التجارية البرية والبحرية، فقد كانت تمر من أراضيهم القوافل القادمة من اليمن وشبه الجزيرة العربية إلى بلاد الشام وموانئها، والقوافل المتجهة من موانئ الخليج العربي إلى بلاد الشام ومصر. كان الأنباط يرافقون القوافل التجارية ويزودونها بالجمال اللازمة، ويفرضون الضرائب على المواد التي تمر من أراضيهم، ويتعهدون بحمايتها. من عوامل تطور التجارة عند الأنباط: الموقع المتوسط على الطرق التجارية، والسفن التي تجلب البضائع عبر البحر الأحمر، والأبراج والحاميات العسكرية لتوفير الأمن للقوافل، والمحطات التجارية التي أقاموها على طول الطرق التجارية."}, {"type": "شخصية", "title": "الحارث الرابع", "summary": "أشهر ملوك الأنباط وأطولهم حكماً، وتُعدّ فترة حكمه أكثر فترات المملكة النبطية ازدهاراً.", "details": "الحارث الرابع هو من أشهر ملوك الأنباط وأكثرهم ذكراً في المصادر التاريخية، وكانت فترة حكمه أطولها وأكثرها ازدهاراً في تاريخ الأنباط. تُشير المصادر إلى أنه قسّم مملكته إلى مقاطعات يحكمها ولاة، وكانت الملكة تشاركه في الحكم."}, {"type": "شخصية", "title": "الحارث الثالث", "summary": "ملك نبطي وسّع مملكته حتى شملت دمشق وسكّ نقوده فيها.", "details": "الحارث الثالث هو أحد ملوك الأنباط الذي وسّع مملكته حتى شملت دمشق التي سكّ نقوده فيها. تأثّرت النقود النبطية التي سكّها الملك الحارث الثالث بالنقود السلوقية."}]}, {"id": "lesson_1_1_4", "title": "النقوش الصخرية القديمة في الأردن", "timeline": [{"date": "القرن الرابع ق.م - القرن الرابع الميلادي", "event": "فترة النقوش الصفائية في الأردن", "details": "ترجع النقوش الصفائية إلى الفترة الممتدة بين القرن الرابع قبل الميلاد والقرن الرابع الميلادي. سُمّيت هذا الاسم نسبة إلى منطقة الصفاة الواقعة إلى جنوب شرق مدينة دمشق، وسُمّيت القبائل البدوية التي كتبت بهذا الخط القبائل الصفائية. اشتُق الخط الصفائي من الكتابة الجنوبية الغربية لشبه الجزيرة العربية المعروف بالخط المسنَد.", "type": "أخرى"}], "cards": [{"type": "مفهوم", "title": "النقوش الصخرية", "summary": "رموز ومخربشات على الصخور كتبها أصحابها بالحفر أو النقر لرسم أشكال آدمية وحيوانية وكتابة الحروف.", "details": "النقوش الصخرية هي رموز ومخرّبشات متناثرة على الصخور، كتبها أصحابها بأنفسهم أو بإملائها على من كتبها من أصحابهم ومرافقيهم في السفر أو في الرعي، عن طريق الحفر أو النقر على الصخور؛ لرسم أشكال آدمية وحيوانية وغيرها، وكتابة الحروف، أو الجمع بين الرسم والكتابة. تُعدّ البادية الأردنية من شمالها إلى جنوبها متحفاً مفتوحاً للنقوش الصخرية المنتشرة فيها، وسجلاً لتاريخ الشعوب التي استقرت عليها والقوافل التجارية التي مرت بها."}, {"type": "مفهوم", "title": "النقوش الصفائية (الصفوية)", "summary": "نقوش عربية قديمة تعود للقرن الرابع ق.م حتى القرن الرابع الميلادي، منتشرة في البادية الشمالية الشرقية بالأردن.", "details": "سُمّيت النقوش الصفائية هذا الاسم نسبة إلى منطقة الصفاة الواقعة إلى جنوب شرق مدينة دمشق، وسُمّيت القبائل البدوية التي كتبت بهذا الخط القبائل الصفائية. ترجع هذه النقوش إلى الفترة الممتدة بين القرن الرابع قبل الميلاد والقرن الرابع الميلادي. اشتُق الخط الصفائي من الكتابة الجنوبية الغربية لشبه الجزيرة العربية المعروف بالخط المسنَد، ويتميز باللين وعدم الانتظام بطريقة الكتابة. تتألف الأبجدية الصفائية من ثمانية وعشرين حرفاً، وهي خالية من التشكيل والتشديد وحروف العلة والمقاطع، وكان يُكتب من اليمين إلى اليسار أو من اليسار إلى اليمين أو من أعلى إلى أسفل ومن أسفل إلى أعلى. تُبيّن النقوش الصفائية في البادية الشمالية الشرقية في الأردن طبيعة معيشة العرب الصفائيين الذين كانوا يُربّون الأغنام والجمال ويمتهنون الصيد وركوب الخيل ويرتحلون، كما تُظهر أسماء الأعلام والقبائل والآلهة والأمكنة."}, {"type": "مفهوم", "title": "النقوش الثمودية", "summary": "نقوش عربية شمالية قديمة نسبة إلى القبائل الثمودية، تنتشر في شمال الجزيرة العربية وجنوب الأردن.", "details": "سُمّيت النقوش الثمودية نسبة إلى القبائل العربية الثمودية التي ذُكرت في الكتابات الآشورية، وهي مجموعة من النقوش من لهجة عربية شمالية قديمة معروفة قبل الإسلام، وتنتشر في شمال شبه الجزيرة العربية وجنوب الأردن. يُشتهر وادي رم بمجموعته الفريدة من النقوش؛ إذ يمكن العثور على نقوش ثمودية عند سفوح المنحدرات وعلى جانبي الأودية. تتضمن الرسومات الثمودية صوراً للإنسان وصوراً للحيوانات مثل الوعل والجمال، وصوراً لمشاهد الصيد."}, {"type": "مفهوم", "title": "النقوش النبطية", "summary": "نقوش كتبها الأنباط بالخط الآرامي الذي تطور إلى الخط العربي، عدد حروفه 22 حرفاً.", "details": "كتب الأنباط بالخط الآرامي الذي تطور تدريجياً فيما بعد إلى الخط العربي، وعدد حروفه اثنان وعشرون حرفاً تُكتب من اليمين إلى اليسار. انتشر في أنحاء المملكة النبطية وخارجها بسبب التجارة. تدل هذه النصوص على إيمان الأنباط بالإله ذي الشرى الذي يُعدّ كبير الآلهة لديهم، وتُشير إلى تخصيص الأضرحة لفئات معينة من الناس."}, {"type": "مفهوم", "title": "الوسم عند القبائل البدوية", "summary": "علامة مميزة تستخدمها القبائل البدوية على أجساد مواشيها، وكان يُنقش على الصخور أيضاً.", "details": "استخدمت القبائل البدوية الوسم بوصفه علامة مميزة على أجساد المواشي (الإبل والأغنام والماعز) التي تمتلكها، وتشمل هذه الرموز رسوماً وحروفاً وأرقاماً عربية قديمة. يُستثنى من الوسم الخيل إكراماً لها، وكان العرب يعرفونها بأسمائها وينسبونها لسلالاتها ويتعهدونها بالرعاية والاهتمام. كان لكل قبيلة وسم خاص بها تختلف فيه عن القبائل الأخرى، علماً بأن هذا الوسم لا يزال مستخدماً لدى القبائل البدوية. لم يقتصر الوسم على المواشي، بل تعداها إلى أشياء أخرى لها ارتباطها في المعيشة، فقد نقشوا الوسم على الصخور في حدود المنطقة التي يتنقلون فيها ويطلقون عليها اسم الديرة، ونقشوا وسومهم على الآبار وشواهد قبور موتاهم."}, {"type": "موقع", "title": "وادي رم", "summary": "يشتهر بمجموعة فريدة من النقوش الثمودية، تُوجد على سفوح المنحدرات وعلى جانبي الأودية.", "details": "يُشتهر وادي رم بمجموعته الفريدة من النقوش؛ إذ يمكن العثور على نقوش ثمودية عند سفوح المنحدرات وعلى جانبي الأودية. تتضمن الرسومات الثمودية صوراً للإنسان وصوراً للحيوانات مثل الوعل والجمال، وصوراً لمشاهد الصيد. ومن أبرز مواقع النقوش في وادي رم: وادي الخزعلي الذي يحتوي نقوشاً ثمودية بارزة."}]}, {"id": "lesson_1_1_5", "title": "مظاهر الحضارة اليونانية في الأردن", "timeline": [{"date": "356 ق.م", "event": "ولادة الإسكندر المقدوني", "details": "وُلد الإسكندر المقدوني المعروف بالإسكندر الأكبر في عام 356 قبل الميلاد، وتتلمذ على يد الفيلسوف اليوناني أرسطو.", "type": "أخرى"}, {"date": "332 ق.م", "event": "احتلال الإسكندر المقدوني لمصر وبلاد الشام", "details": "خضع الأردن لسيطرة اليونان بعد احتلال قوات الإسكندر المقدوني لمصر وبلاد الشام في عام 332 قبل الميلاد. وحّد الإسكندر المدن اليونانية جميعها تحت قيادته، واهتم بالجيش وزوّده بالأسلحة، ووسّع دولته وكوّن إمبراطورية مترامية الأطراف.", "type": "حرب"}, {"date": "323 ق.م", "event": "وفاة الإسكندر المقدوني وتقسيم إمبراطوريته", "details": "توفّي الإسكندر المقدوني في عام 323 قبل الميلاد، وبعد وفاته قُسّمت الإمبراطورية بين كبار قادة جيشه بعد سلسلة طويلة من النزاعات، فأصبحت أجزاء من آسيا الصغرى من نصيب القائد أنتيغونوس، ومصر وجزء من بلاد الشام من نصيب بطلميوس وسُمّيت دولة البطالمة، أما بقية بلاد الشام والعراق وفارس فكانت من نصيب سلوقس وسُمّيت الدولة السلوقية التي اتخذت من أنطاكية عاصمة لها.", "type": "وفاة"}, {"date": "2016م", "event": "اكتشاف أول تمثال شبه كامل للإلهة أفروديت في جرش", "details": "في عام 2016م اكتُشف أول تمثال شبه كامل لإلهة الحب والجمال اليونانية أفروديت في مدينة جرش.", "type": "اكتشاف"}], "cards": [{"type": "شخصية", "title": "الإسكندر المقدوني (الإسكندر الأكبر)", "summary": "أعظم قائد عسكري يوناني، احتل بلاد الشام عام 332 ق.م وأسّس إمبراطورية مترامية الأطراف.", "details": "عُرِف بالإسكندر الأكبر، وُلد في عام 356 قبل الميلاد، وتتلمذ على يد الفيلسوف اليوناني أرسطو. تولّى الحكم بعد والده الملك فيليب الثاني، ووحّد المدن اليونانية جميعها تحت قيادته، واهتمّ بالجيش وزوّده بالأسلحة، ووسّع دولته وكوّن إمبراطورية مترامية الأطراف. احتل بلاد الشام في عام 332 قبل الميلاد، وتوفّي في عام 323 قبل الميلاد. بعد وفاته قُسّمت الإمبراطورية بين كبار قادة جيشه."}, {"type": "دولة", "title": "الدولة السلوقية", "summary": "دولة يونانية خلفت الإمبراطورية اليونانية في بلاد الشام والعراق وفارس، عاصمتها أنطاكية.", "details": "سُمّيت الدولة السلوقية نسبة إلى القائد سلوقس أحد قادة جيش الإسكندر المقدوني، وكانت من نصيبه بقية بلاد الشام والعراق وفارس بعد تقسيم الإمبراطورية اليونانية. اتخذت الدولة السلوقية من أنطاكية عاصمة لها. استمرت الحروب بين البطالمة والسلوقيين طمعاً في التوسع والسيطرة على المنطقة."}, {"type": "دولة", "title": "دولة البطالمة", "summary": "دولة يونانية حكمت مصر وجزءاً من بلاد الشام بعد وفاة الإسكندر المقدوني.", "details": "سُمّيت دولة البطالمة نسبة إلى القائد بطلميوس أحد قادة جيش الإسكندر المقدوني، وكانت من نصيبه مصر وجزء من بلاد الشام بعد تقسيم الإمبراطورية. استمرت الحروب بين البطالمة والسلوقيين طمعاً في التوسع والسيطرة على المنطقة."}, {"type": "مفهوم", "title": "الحضارة الهلنستية", "summary": "الحضارة اليونانية المنتشرة في المشرق بعد فتوحات الإسكندر، مزيج من الثقافة اليونانية والشرقية.", "details": "تأثّر الأردن كغيره من أقطار بلاد الشام بالحضارة اليونانية. ومن مظاهر الحضارة الهلنستية في الأردن: العمارة على الطراز اليوناني حيث شيّد اليونانيون العديد من المدن، منها: بيلا (طبقة فحل)، وجدارا (أم قيس)، وجراسا (جرش)، وحسبان. كما انتشرت اللغة اليونانية لتصبح اللغة الرسمية في بلاد الشام، بينما بقيت اللغة الآرامية لغة التخاطب بين الناس. استُعملت النقود اليونانية على الصعيد الرسمي، وتأثّرت بها النقود النبطية. وعبد اليونان عدداً من الآلهة مثل: زيوس وآرتيمس وأفروديت."}, {"type": "موقع", "title": "قصر عراق الأمير (قصر العبد)", "summary": "الأثر اليوناني الوحيد المتبقي في الأردن، يقع في وادي السير غرب عمان ومبني من حجارة ضخمة.", "details": "قصر عراق الأمير أو قصر العبد هو الأثر الوحيد الذي ما يزال قائماً ويعود تاريخه إلى الفترة اليونانية في الأردن. يقع في وادي السير إلى الغرب من العاصمة عمان، بُني من حجارة ضخمة نُحتت على بعضها أشكال أسود وحيوانات أخرى. بسبب الحروب والكوارث الطبيعية لم يبقَ من آثار الفترة اليونانية إلا هذا القصر. من العناصر المعمارية التي ظهرت في هذه الفترة في العديد من المواقع الأردنية: العقود والأقواس والقناطر والتاج الكورنثي نسبة إلى مدينة كورنث اليونانية الذي يُبنى رأس العمود فيه على شكل زخارف نباتية."}]}, {"id": "lesson_1_1_6", "title": "مظاهر الحضارة الرومانية - البيزنطية في الأردن", "timeline": [{"date": "64 ق.م", "event": "احتلال القائد الروماني بومبي لبلاد الشام", "details": "خضع الأردن للحكم الروماني بعد احتلال القائد الروماني بومبي بلاد الشام في عام 64 قبل الميلاد باستثناء دولة الأنباط التي احتفظت باستقلالها الذاتي مقابل دفع إتاوة سنوية لروما. عمل بومبي على إعادة تنظيم المدن الأردنية وأعطاها نوعاً من الحكم الذاتي، ووضع أسس حلف الديكابوليس؛ حلف المدن العشر وهو حلف تجاري عسكري لاستمرار التجارة بين هذه المدن وصد هجمات القبائل البدوية عنها.", "type": "حرب"}, {"date": "395م", "event": "تقسيم الإمبراطورية الرومانية إلى قسمين", "details": "قسّم الإمبراطور ثيودوسيوس الإمبراطورية الرومانية بين ولديه: هونريوس الذي حكم الجزء الغربي (الإمبراطورية الرومانية الغربية وعاصمتها روما)، وأركاديوس الذي حكم الجزء الشرقي من الإمبراطورية البيزنطية وعاصمتها بيزنطة (القسطنطينية - إسطنبول حالياً).", "type": "أخرى"}, {"date": "476م", "event": "سقوط الإمبراطورية الرومانية الغربية", "details": "سقطت الإمبراطورية الرومانية الغربية وعاصمتها روما على يد القوط الغربيين في عام 476م، بينما استمرت الإمبراطورية الرومانية الشرقية (البيزنطية) وعاصمتها القسطنطينية.", "type": "أخرى"}, {"date": "395م - 636م", "event": "الحقبة البيزنطية في الأردن", "details": "خضع الأردن للدولة البيزنطية بوصفه تابعاً لها، واستمرت الأوضاع في الأردن كما كانت في الفترة الرومانية، واعتنق سكانه الديانة المسيحية، وانتشرت الكنائس والأديرة في مدنه وقراه. انتهت الحقبة البيزنطية في الأردن مع الفتح العربي الإسلامي عام 636م.", "type": "أخرى"}, {"date": "560م", "event": "تنفيذ خريطة مأدبا الفسيفسائية", "details": "تحوي مدينة مأدبا أقدم خريطة فسيفسائية أصلية للأراضي المقدسة تعود إلى العام 560م، وتوجد اليوم داخل كنيسة الروم الأرثوذكس في وسط مأدبا.", "type": "اكتشاف"}, {"date": "2004م", "event": "إدراج أم الرصاص على لائحة التراث العالمي", "details": "شهدت أم الرصاص استيطاناً واسعاً في العصرين البيزنطي والأموي، وشمل هذا الاستيطان بناء الكنائس ذات الأرضيات الفسيفسائية النادرة، لذلك أُدرجت على لائحة التراث العالمي في عام 2004م.", "type": "أخرى"}, {"date": "2012م", "event": "اكتشاف نفق اليرموك - أطول نفق في العالم", "details": "يُعدّ نفق اليرموك أطول نفق في العالم اكتُشف في شمال الأردن في عام 2012م، يبلغ طوله مئة وأربعين كيلومتراً تقريباً، يبدأ من درعا في سوريا مروراً بمدينة الطرّة ووادي الشلالة وينتهي بمدينة أم قيس، وكان يُستخدم في تزويد مدن الديكابوليس بالمياه.", "type": "اكتشاف"}], "cards": [{"type": "شخصية", "title": "بومبي", "summary": "أشهر القادة العسكريين في الإمبراطورية الرومانية، احتل بلاد الشام عام 64 ق.م وأسّس حلف الديكابوليس.", "details": "بومبي أحد أشهر القادة العسكريين في الإمبراطورية الرومانية، كُلّف بالتوجه إلى آسيا الصغرى فاحتلها واستولى على سوريا وفلسطين في عام 64 قبل الميلاد وضمّها إلى الإمبراطورية الرومانية. عمل على إعادة تنظيم المدن الأردنية وأعطاها نوعاً من الحكم الذاتي، ووضع أسس حلف الديكابوليس؛ حلف المدن العشر وهو حلف تجاري عسكري."}, {"type": "مفهوم", "title": "حلف الديكابوليس", "summary": "حلف المدن العشر، تجاري عسكري أسّسه بومبي في بلاد الشام لاستمرار التجارة وصد هجمات القبائل البدوية.", "details": "حلف الديكابوليس هو حلف المدن العشر، وهو حلف تجاري عسكري لاستمرار التجارة بين هذه المدن وصد هجمات القبائل البدوية عنها. تركّزت المدن العشر في المنطقة الممتدة من دمشق شمالاً إلى عمان جنوباً للسيطرة على الطريق التجاري بين بلاد الشام والجزيرة العربية. ومن هذه المدن في الأردن: فيلادلفيا (عمان) وجراسا (جرش) وكابتولياس (بيت راس) وأبيلا (قويلبة) وجدارا (أم قيس) وبيلا (طبقة فحل). تمتّعت مدن الديكابوليس باستقلال سياسي تحت الحماية الرومانية؛ إذ كان لكل مدينة حاكمها الخاص بها يساعده مجلس لإدارة شؤونها، وتُرك لهذه المدن حرية عقد الاتفاقيات التجارية في ما بينها وسكّ النقود."}, {"type": "موقع", "title": "جراسا (جرش)", "summary": "من أبرز مدن حلف الديكابوليس، تأسّست في العصر اليوناني وتضم آثاراً رومانية مهمة.", "details": "تقع مدينة جرش إلى الشمال من العاصمة عمان، ويعود تاريخ تأسيس المدينة إلى العصر اليوناني، وكانت تسمى جراسا وهو تحريف لاسمها الكنعاني (جرشو) ومعناه المكان كثيف الأشجار. من أبرز معالمها الأثرية: المسرح الجنوبي، ومعبد أرتيمس، والهيبودروم (مضمار الخيل)، وشارع الأعمدة، والبوابة الجنوبية. في عام 2016م اكتُشف في مدينة جرش أول تمثال شبه كامل لإلهة الحب والجمال اليونانية أفروديت."}, {"type": "موقع", "title": "فيلادلفيا (عمّان)", "summary": "عاصمة الأردن الحالية، تغيّر اسمها من ربّة عمون إلى فيلادلفيا في العهد اليوناني ثم عاد إلى عمّان بعد الفتح الإسلامي.", "details": "تغيّر اسم مدينة ربّة عمون إلى فيلادلفيا تكريماً للإمبراطور اليوناني بطليموس الثاني فيلادلفيوس، وبعد الفتح العربي الإسلامي استعادت اسمها القديم (ربّة عمون) ثم عمان. في العصر الروماني أنشأ الرومان العديد من المباني التي تُمثّل حضارتهم ولا تزال قائمة إلى الآن، مثل: المدرّج الروماني، وسبيل الحوريات، وجبل القلعة في وسط العاصمة عمان."}, {"type": "موقع", "title": "جدارا (أم قيس)", "summary": "مدينة رومانية تقع شمال إربد، مطلّة على نهر اليرموك وهضبة الجولان وبحيرة طبريا.", "details": "تقع بلدة أم قيس إلى الشمال من مدينة إربد، وهي مطلّة على نهر اليرموك وهضبة الجولان وبحيرة طبريا، وتعني كلمة جدارا المدينة المحصّنة. ما يُميّز هذه المدينة عن غيرها من مدن الديكابوليس حجارتها البازلتية السوداء التي دخلت في بنائها، ويُعتقد أنها جُلبت من المنطقة الشمالية الشرقية للأردن. من أبرز معالمها الأثرية: شارع الأعمدة، والمدرّج الغربي، والكنيسة البيزنطية. كانت جدارا مركزاً للثقافة والفن ومعهداً للحقوق، وبرز فيها العديد من الفلاسفة والأدباء منهم: الشاعر ميلياغروس الجداري والكاتب يونوماوس والشاعر أريبوس."}, {"type": "موقع", "title": "بيلا (طبقة فحل)", "summary": "موقع أثري قديم في شمال غرب الأردن، تأسّست في الفترة اليونانية وأصبحت إحدى مدن الديكابوليس.", "details": "موقع أثري قديم يقع شمال غرب الأردن في محافظة إربد، تأسّست المدينة في الفترة اليونانية بعد فتح الإسكندر المقدوني لبلاد الشام، وأطلق عليها اليونان اسم بيلا نسبة إلى المدينة التي وُلد فيها الإسكندر، ومن ثم أصبحت واحدة من حلف المدن العشر. من أبرز معالمها الأثرية: المعبد الروماني، والمدرّج، والكنائس، والقبور."}, {"type": "موقع", "title": "نفق اليرموك", "summary": "أطول نفق في العالم يبلغ 140 كيلومتراً، اكتُشف في شمال الأردن عام 2012م، بناه الرومان لتزويد مدن الديكابوليس بالمياه.", "details": "يُعدّ نفق اليرموك أطول نفق في العالم اكتُشف في شمال الأردن في عام 2012م، يبلغ طوله مئة وأربعين كيلومتراً تقريباً، يبدأ من درعا في سوريا مروراً بمدينة الطرّة ووادي الشلالة وينتهي بمدينة أم قيس. كان يُستخدم في تزويد مدن الديكابوليس بالمياه في الحقبة الرومانية."}, {"type": "مفهوم", "title": "الفسيفساء", "summary": "فن قديم يقوم على صناعة مكعبات صغيرة ملونة لتشكيل صور ومناظر تُزيّن الأرضيات والجدران والسقوف.", "details": "الفسيفساء فن قديم يقوم على صناعة المكعبات الصغيرة الملونة من الحجارة أو المعدن أو الزجاج بشكل متراص؛ لتُشكّل صورة أو مناظر طبيعية أو أشكالاً هندسية أو لوحات بشرية أو حيوانية، تُزيّن فيها الأرضيات والجدران والسقوف. تحوي مدينة مأدبا أقدم خريطة فسيفسائية أصلية للأراضي المقدسة تعود إلى العام 560م، وتوجد اليوم داخل كنيسة الروم الأرثوذكس في وسط مأدبا."}, {"type": "موقع", "title": "أم الرصاص", "summary": "موقع أثري بيزنطي وأموي في الأردن، يضم كنائس بأرضيات فسيفسائية نادرة، مدرج على لائحة التراث العالمي عام 2004م.", "details": "شهدت أم الرصاص استيطاناً واسعاً في العصرين البيزنطي والأموي، وشمل هذا الاستيطان بناء الكنائس ذات الأرضيات الفسيفسائية النادرة. لذلك أُدرجت على لائحة التراث العالمي في عام 2004م."}, {"type": "موقع", "title": "موقع المغطس", "summary": "المكان الذي عُمّد فيه السيد المسيح عليه السلام، يقع في وادي الخرار شمال البحر الميت.", "details": "يُعدّ موقع المغطس شاهداً على الحقبة البيزنطية التاريخية، وهو المكان الذي عُمّد فيه السيد المسيح عليه السلام، ويقع في وادي الخرار شمال البحر الميت. يُعدّ معلماً تاريخياً دينياً، ومن مواقع الحج المسيحي، ويزوره آلاف الزوار من أنحاء العالم."}, {"type": "موقع", "title": "موقع أهل الكهف (الرقيم)", "summary": "كهف في الرقيم جنوب شرق عمان، أثبتت الدراسات أنه الكهف الوارد في سورة الكهف في القرآن الكريم.", "details": "أثبتت الدراسات الأثرية والتاريخية أن الكهف الموجود في الرقيم جنوب شرق عمان الوارد ذكره في سورة الكهف في القرآن الكريم، يعود إلى عهد الإمبراطور الروماني ديكيوس (ديقيانوس) الذي اضطهد المسيحيين وأجبرهم على اللجوء إلى الكهف هرباً من الاضطهاد الذي مورِس بحقهم بوصفهم فئة مؤمنة."}, {"type": "مفهوم", "title": "الكنائس البازليكية في الأردن", "summary": "نوع من الكنائس ذات التخطيط الممتد من الشرق إلى الغرب مع صفوف أعمدة، انتشرت في الحقبة البيزنطية.", "details": "ظهر في الحقبة البيزنطية نوعان من الكنائس في الأردن: النوع الأول يُسمّى الكنائس ذات التخطيط البازليكي، وهو نظام معماري يمتد من الشرق إلى الغرب، ويتكون من صفين أو أربعة من الأعمدة يتشكل منها جناحان أو أربعة يتوسطها الصحن. ومن أمثلتها: كنيسة القديس جورجيوس في رحاب (المفرق)، وكنائس أم الرصاص ومأدبا التي تتميز بأرضياتها الفسيفسائية. أما النوع الثاني فيُسمى الكنائس ذات التخطيط المركزي، ويتسم بتغطية الفراغ المركزي (الصحن) بقبة، ومن أمثلتها: كنيسة يوحنا المعمدان في جرش، وكنائس أم قيس."}, {"type": "مفهوم", "title": "الطريق الملكي (طريق تراجان)", "summary": "طريق تجاري روماني مهم يربط مدن الأردن، أُعيد تعبيده وتطويره في عهد الإمبراطور تراجان.", "details": "الطريق الملكي أو طريق تراجان هو طريق تجاري روماني مهم يمر عبر الأردن ويربط مدنه. اهتم الرومان بشبكة الطرق التجارية وربطوا مدن الديكابوليس بها ووفّروا لها الحماية، وربطوها بموانئ البحر المتوسط الشرقية. يمر الطريق الملكي بعدد من المدن الأردنية المهمة التي كانت تربطها علاقات تجارية وثيقة في الحقبة الرومانية."}]}]}]}, {"id": "book_2", "title": "تاريخ الأردن - الجزء الثاني (إسلامي وحديث)", "units": [{"id": "unit_2_2", "title": "الأردن في العصور الإسلامية", "general_idea": "الأردن بوابة الفتح الإسلامي لبلاد الشام، فمنه عبرت الجيوش العربية الإسلامية لنشر الإسلام، وشهدت أرضه معارك مؤتة وطبقة فحل واليرموك، وروى الصحابة رضي الله عنهم بدمائهم أرضه.", "lessons": [{"id": "lesson_2_2_1", "title": "الأردن في صدر الإسلام", "timeline": [{"date": "6هـ / 627م", "event": "صلح الحديبية وبداية استمالة قبائل الأردن", "details": "بعد صلح الحديبية بين المسلمين والمشركين، بدأ الرسول صلى الله عليه وسلم باستمالة القبائل العربية في الأردن، تمهيداً لنشر الدعوة الإسلامية في بلاد الشام، وتحويل ولاء هذه القبائل للحكم الإسلامي، ولتكون عوناً للمسلمين في صراعهم مع الروم.", "type": "معاهدة"}, {"date": "6هـ", "event": "أول سرية إلى منطقة حسمى جنوبي الأردن", "details": "أرسل الرسول صلى الله عليه وسلم أول سرية خارج حدود شبه الجزيرة العربية إلى منطقة حسمى جنوبي الأردن لمعاقبة بعض بطون قبيلة جذام الذين رفضوا دعوة الصحابي دحية بن خليفة الكلبي.", "type": "حرب"}, {"date": "8هـ / 629م", "event": "معركة مؤتة", "details": "أرسل الرسول صلى الله عليه وسلم جيشاً بقيادة زيد بن حارثة فجعفر بن أبي طالب فعبد الله بن رواحة، التقى جيش المسلمين وجيش الروم في مؤتة (الكرك)، واستشهد الأمراء الثلاثة، ثم اتفق المسلمون على إمرة خالد بن الوليد الذي حاول إنقاذ الجيش بالانسحاب المنظم.", "type": "حرب"}, {"date": "8هـ / 629م", "event": "سرية ذات السلاسل", "details": "بعد معركة مؤتة كونت قبيلتا قضاعة وبلي تحالفاً قبلياً لغزو المدينة المنورة، فأمر الرسول صلى الله عليه وسلم عمرو بن العاص بالتوجه إليهم بالقرب من ماء عين السلاسل، ثم أمده بقوة يقودها أبو عبيدة عامر بن الجراح، وتمكن المسلمون من الانتصار على التحالف القبلي المعادي.", "type": "حرب"}, {"date": "9هـ / 630م", "event": "عام الوفود", "details": "سمي هذا الاسم لكثرة الوفود التي قدمت إلى المدينة المنورة مسلمة ومصالحة للرسول صلى الله عليه وسلم، فقد جاء وفد من أهل أذرح والجرباء وصالحوه، وجاء يوحنا بن رؤبة حاكم أيلة فصالحه، وأعلنت قبائل بلي وقضاعة وعذرة وغسان وبلقين ولخم وبهراء إسلامها.", "type": "معاهدة"}, {"date": "11هـ / 632م", "event": "حملة أسامة بن زيد إلى أرض مؤاب", "details": "تابع الخليفة أبو بكر الصديق رضي الله عنه فتح بلاد الشام بإرسال جيش بقيادة أسامة بن زيد إلى الأردن، حتى وصل إلى أرض مؤاب دون مقاومة تذكر، فكانت بمثابة حملة استطلاعية لجمع المعلومات والتعرف إلى المنطقة.", "type": "فتح"}, {"date": "13هـ / 634م", "event": "معركة طبقة فحل", "details": "بعد انتصار المسلمين بقيادة عمرو بن العاص على الروم في معركة أجنادين، استنفر الإمبراطور هرقل الروم لمواجهة المسلمين، فتوجه القائد شرحبيل بن حسنة لمواجهتهم في طبقة فحل التي فرض عليها حصاراً استمر أربعة أشهر إلى أن طلبوا الاستسلام وقبلوا دفع الجزية.", "type": "حرب"}, {"date": "15هـ / 636م", "event": "معركة اليرموك", "details": "وقعت معركة اليرموك على ضفاف نهر اليرموك في شمال الأردن، عندما جمع قائد الروم (ماهان) جيوش الروم لقتال المسلمين. تولى خالد بن الوليد القيادة العامة للجيش، واستطاع المسلمون إلحاق الهزيمة بجيش الروم ومطاردة فلولهم حتى دمشق، وأنهت سبعة قرون من الاحتلال الروماني-البيزنطي لبلاد الشام.", "type": "حرب"}, {"date": "18هـ / 639م", "event": "تقسيم بلاد الشام إلى أربعة أجناد", "details": "قسمت بلاد الشام في عهد الخليفة عمر بن الخطاب رضي الله عنه إلى أربعة أجناد: جند دمشق، وجند فلسطين ومركزه اللد، وجند الأردن ومركزه طبرية، وجند حمص. وكان جند الأردن يضم المنطقة الواقعة إلى الشمال من نهر الزرقاء وشمال فلسطين.", "type": "تأسيس"}, {"date": "1989م", "event": "اكتشاف آثار مدينة العقبة الإسلامية", "details": "اكتشفت آثار مدينة العقبة الإسلامية وهي مصممة وفقاً للطراز الإسلامي، عثر فيها على جدران حجرية سميكة ومحصنة، وفيها شارعان رئيسان يقسمان المدينة إلى أربعة أقسام ويلتقيان في الوسط، وكان للمدينة أربعة أبواب من جهاتها الأربع.", "type": "اكتشاف"}], "cards": [{"type": "مكان", "title": "ميفعة (أم الرصاص)", "summary": "مدينة جنوب عمان مر بها النبي صلى الله عليه وسلم قبل البعثة.", "details": "مدينة أم الرصاص جنوب عمان، مر بها سيدنا محمد صلى الله عليه وسلم قبل البعثة في رحلته الأولى إلى بلاد الشام في أثناء مرافقته لعمه أبي طالب."}, {"type": "شخصية", "title": "الحارث بن عمير الأزدي", "summary": "صحابي قتله حاكم مؤاب فكانت سبباً لمعركة مؤتة.", "details": "أرسله الرسول صلى الله عليه وسلم إلى ملك بصرى، فقتله حاكم مؤاب شرحبيل بن عمرو الغساني، ولما بلغ الخبر الرسول جهز جيشاً لمعركة مؤتة. ضريحه في محافظة الكرك."}, {"type": "شخصية", "title": "خالد بن الوليد", "summary": "القائد الذي أنقذ جيش المسلمين في مؤتة وقاد جيش اليرموك.", "details": "تولى قيادة الجيش في معركة مؤتة بعد استشهاد الأمراء الثلاثة وحاول إنقاذ الجيش بالانسحاب المنظم، وأظهرت المعركة حنكته وشجاعته. وتولى القيادة العامة في معركة اليرموك واستخدم سرية الخيالة المتحركة لإلحاق الهزيمة بجيش الروم."}, {"type": "شخصية", "title": "فروة بن عمرو الجذامي", "summary": "حاكم الروم على معان أسلم فقتله الروم وعد من شهداء الإسلام الأوائل.", "details": "حاكم الروم على معان، أعلن إسلامه في عام الوفود، وما إن علم الروم بإسلامه حتى قتلوه، ويعد من شهداء الإسلام الأوائل خارج شبه الجزيرة العربية."}, {"type": "حركة", "title": "الغساسنة", "summary": "قبائل عربية مسيحية كانت حلفاء للروم في بلاد الشام.", "details": "قبائل عربية كانت تحت حكم الروم، ومنهم شرحبيل بن عمرو الغساني حاكم مؤاب الذي قتل الحارث بن عمير. شاركت بعض قبائلهم لاحقاً في الفتوحات الإسلامية."}, {"type": "مفهوم", "title": "القبائل المسالمة", "summary": "القبائل التي وقفت على الحياد في الفتح الإسلامي.", "details": "هي القبائل التي كرهت قتال الروم بسبب الدِين، وكرهت قتال المسلمين بسبب القُربى، فوقفت على الحياد في أثناء الفتح الإسلامي لبلاد الشام."}, {"type": "معاهدة", "title": "صلح الحديبية", "summary": "صلح عام 6هـ مهد لاستمالة قبائل الأردن.", "details": "وقع عام 6هـ / 627م بين المسلمين والمشركين، وبعده بدأ الرسول صلى الله عليه وسلم باستمالة القبائل العربية في الأردن تمهيداً لنشر الدعوة الإسلامية في بلاد الشام."}, {"type": "مكان", "title": "مدينة أيلة (العقبة)", "summary": "أول مدينة نالت اهتمام المسلمين خارج شبه الجزيرة العربية.", "details": "تعد أول مدينة نالت اهتمام المسلمين خارج حدود شبه الجزيرة العربية، وكانت بوابة للأردن وفلسطين لموقعها الإستراتيجي على الطريق الواصل من شبه الجزيرة العربية إلى بلاد الشام ومصر. صالح الرسولَ حاكمُها يوحنا بن رؤبة."}, {"type": "مفهوم", "title": "الجند", "summary": "مصطلح إداري عسكري يعادل اليوم الولاية أو المحافظة.", "details": "مصطلح إداري عسكري قسمت بلاد الشام بموجبه إلى أربعة أجناد في عهد الخليفة عمر بن الخطاب: جند دمشق، وجند فلسطين، وجند الأردن، وجند حمص."}, {"type": "مكان", "title": "جامعة مؤتة", "summary": "جامعة عسكرية أسست عام 1981م على أرض معركة مؤتة.", "details": "تأسست جامعة مؤتة في عام 1981م بوصفها جامعة عسكرية على أرض معركة مؤتة في محافظة الكرك، واتسعت في ما بعد لتضم جناحين عسكرياً ومدنياً، في خطوة رمزية هدفها الربط بين الماضي والحاضر."}]}, {"id": "lesson_2_2_2", "title": "الأردن في العصر الأموي", "timeline": [{"date": "41هـ / 662م", "event": "تأسيس الدولة الأموية ودخول الأردن تحت حكمها", "details": "أسس معاوية بن أبي سفيان الدولة الأموية ونقل عاصمة الخلافة من المدينة المنورة إلى دمشق. ودخل الأردن تحت حكم الأمويين في عام 41هـ وحظي باهتمام خلفائهم لولاء قبائله للأمويين وقربه من دمشق.", "type": "تأسيس"}, {"date": "132هـ / 750م", "event": "نهاية الدولة الأموية", "details": "انتهت الدولة الأموية بعد هزيمة مروان بن محمد على يد الجيش العباسي بقيادة عبد الله بن علي العباسي في معركة الزاب.", "type": "حرب"}, {"date": "1904م", "event": "نقل واجهة قصر المشتى إلى برلين", "details": "نقلت الواجهة الحجرية ذات الزخارف النباتية والهندسية لقصر المشتى إلى برلين عام 1904م هدية من السلطان العثماني عبد الحميد الثاني إلى الإمبراطور الألماني فيلهلم الثاني.", "type": "أخرى"}, {"date": "1985م", "event": "إدراج قصير عمرة على لائحة التراث العالمي", "details": "أدرج قصير عمرة على لائحة التراث العالمي، إذ تعد اللوحات الجدارية الواسعة التي تمثل مشاهد الصيد وصور الحيوانات والطيور ترافقها نقوش باللغتين اليونانية والعربية فريدة من نوعها في العمارة العربية الإسلامية في العصر الأموي.", "type": "أخرى"}, {"date": "2018م", "event": "اكتشاف ميناء أموي في أيلة (العقبة)", "details": "عثرت البعثات العلمية الأثرية في الأردن على ميناء أموي في مدينة أيلة (العقبة)، ويعد هذا الميناء أول عمارة بحرية غارقة يكشف عنها في الأردن.", "type": "اكتشاف"}], "cards": [{"type": "دولة", "title": "الدولة الأموية", "summary": "أول دولة إسلامية وراثية أسسها معاوية بن أبي سفيان وعاصمتها دمشق.", "details": "الدولة الأموية (41 - 132 هـ / 662م - 750م) أسسها معاوية بن أبي سفيان ونقل عاصمة الخلافة فيها من المدينة المنورة إلى دمشق. سموا الأمويين نسبة إلى أمية بن عبد شمس من قبيلة قريش، واتخذوا من اللون الأبيض شعاراً لهم. وبلغت أوج اتساعها في عهد الوليد بن عبد الملك."}, {"type": "شخصية", "title": "الوليد بن عبد الملك", "summary": "الخليفة الأموي الذي بلغت في عهده الدولة أوج اتساعها.", "details": "خليفة أموي بلغت الدولة الأموية في عهده أوج اتساعها، وبني في عهده قصير عمرة وقصر الحرانة، وشاركت في عهده القبائل الأردنية في فتوحات شمال إفريقيا والأندلس."}, {"type": "شخصية", "title": "هشام بن عبد الملك", "summary": "خليفة أموي أمر بإعادة تعمير قصر الحلابات.", "details": "خليفة أموي أمر بإعادة تعمير قصر الحلابات وأضاف إليه ملحقات أخرى. شيد القصر من حجارة جيرية بيضاء وبازلتية سوداء مشذبة، وشيد إلى جانبه مسجد منفصل عنه."}, {"type": "مكان", "title": "قصير عمرة", "summary": "قصر أموي مدرج في التراث العالمي شمال شرق عمان.", "details": "يقع قصير عمرة إلى الشمال الشرقي من العاصمة عمان، بني في عهد الخليفة الأموي الوليد بن عبد الملك، ويتألف المبنى من مدخل واسع يفضي إلى قاعة الاستقبال التي يوجد فيها حوض مائي. تتميز جدارياته بمشاهد الصيد."}, {"type": "مكان", "title": "قصر المشتى", "summary": "قصر أموي جنوب شرق عمان نقلت واجهته إلى برلين.", "details": "يقع قصر المشتى إلى الجنوب الشرقي من العاصمة عمان في لواء الجيزة، بناه الوليد بن يزيد بن عبد الملك، ويقسم القصر إلى ثلاثة أجنحة ويحيط به سور مدعم بالأبراج، وأهم ما يميزه واجهته الحجرية ذات الزخارف النباتية والهندسية التي نقلت إلى برلين عام 1904م."}, {"type": "مكان", "title": "قصر الأزرق", "summary": "قلعة بازلتية متعددة العصور اتخذها قادة الثورة العربية الكبرى مقراً.", "details": "يقع قصر الأزرق إلى الشمال الشرقي من عمان، شيد من الحجارة البازلتية السوداء، ومر بعدة مراحل من الإصلاح. يعود إلى الفترة الرومانية واستخدم بيزنطياً وأموياً وأيوبياً، واتخذت قيادات الثورة العربية الكبرى القصر مقراً لها."}, {"type": "مكان", "title": "قصر الحلابات", "summary": "قصر شمال شرق الزرقاء بدأ نبطياً ثم رومانياً ثم أموياً.", "details": "يقع قصر الحلابات شمال شرق مدينة الزرقاء، يعود إلى مملكة الأنباط بوصفه محطة تجارية، ثم استخدم في الفترة الرومانية حصناً دفاعياً. وفي العصر الأموي أمر هشام بن عبد الملك بإعادة تعميره وأضاف إليه ملحقات."}, {"type": "مكان", "title": "قصر برقع", "summary": "قصر أموي بازلتي في الرويشد بمحافظة المفرق.", "details": "يقع قصر برقع في منطقة الرويشد التابعة لمحافظة المفرق، ويعود بناؤه إلى عهد الوليد بن يزيد بن عبد الملك، بني من حجارة البازلت السوداء، ويتألف من ثلاثة طوابق وسكن للجنود."}, {"type": "مكان", "title": "قصر الطوبة", "summary": "قصر أموي جنوب شرق عمان يشبه المشتى.", "details": "يقع قصر الطوبة إلى الجنوب الشرقي من عمان، بني في عهد الوليد بن يزيد بن عبد الملك على إحدى الطرق التجارية. بني من الحجر الجيري والطوب الطيني، وسقوفه على شكل أنصاف دوائر أسطوانية."}, {"type": "مكان", "title": "قصر الحرانة", "summary": "قصر أموي مربع الشكل شرق عمان.", "details": "يقع قصر الحرانة شرق عمان، شيد في عهد الوليد بن عبد الملك، ويتخذ شكلاً مماثلاً لشكل قلعة مربعة البناء، بني من الحجر الرملي والطين، ويتكون من طابقين تتوسطهما ساحة مكشوفة."}, {"type": "مكان", "title": "قصر الموقر", "summary": "قصر أموي شرق عمان شيد في عهد يزيد بن عبد الملك.", "details": "يقع شرق عمان، بناه يزيد بن عبد الملك، يحيط به أربعة أبراج ويمتاز بزخارفه. اكتشف فيه تاج عمود نقشت عليه كتابات عربية بالخط الكوفي كان يستخدم لقياس ارتفاع الماء في البركة."}, {"type": "مكان", "title": "قصر القسطل", "summary": "قصر أموي يحوي أقدم مئذنة قائمة في العالم الإسلامي.", "details": "يقع جنوب عمان، شيد في عهد يزيد بن عبد الملك، يحتوي جداره الخارجي على 12 برجاً دائرياً، ويحيط به حمام ومسجد وقرية ومقبرة. ويتميز مسجده بأقدم مئذنة ما زالت قائمة في العالم الإسلامي."}, {"type": "مفهوم", "title": "الخراج", "summary": "مقدار معين من المال تفرضه الدولة على الأراضي الزراعية.", "details": "هو مقدار معين من المال تفرضه الدولة على الأراضي الزراعية التي فتحت صلحاً أو عنوة. استغل الأمويون الأراضي الزراعية وأحيوا الأرض الموات لزيادة الإنتاج، فزاد الخراج ونما دخل الدولة."}, {"type": "شخصية", "title": "كثير عزة", "summary": "شاعر أموي تغنى بمواقع الأردن مثل الموقر والقسطل.", "details": "من أعظم شعراء الدولة الأموية، تغنى بمواقع الأردن في قوله: سقى الله حياً بالموقر دارهم  إلى قسطل البلقاء ذات المحارب."}, {"type": "مكان", "title": "ختم جند الأردن", "summary": "ختم أموي يحمل اسم جند الأردن.", "details": "قالب ختم تنص الكتابة التي يحملها على أن «الأردن من أجناد عبد الله الوليد أمير المؤمنين»، ويدل على المكانة الإدارية للأردن في العصر الأموي."}]}, {"id": "lesson_2_2_3", "title": "الأردن في العصر العباسي", "timeline": [{"date": "132هـ / 750م", "event": "معركة الزاب وقيام الدولة العباسية", "details": "انتصر الجيش العباسي بقيادة عبد الله بن علي العباسي على الجيش الأموي بقيادة مروان بن محمد في معركة الزاب (أحد روافد نهر دجلة)، ونقلوا العاصمة من دمشق إلى الكوفة فبغداد. سمي العباسيون نسبة إلى العباس بن عبد المطلب عم الرسول، واتخذوا اللون الأسود شعاراً لهم.", "type": "حرب"}, {"date": "132هـ / 750م", "event": "خضوع الأردن للحكم العباسي", "details": "خضع الأردن لحكم الدولة العباسية، وقد واجه العباسيون عدداً من حركات التمرد والاحتجاج والثورة، وشدد العباسيون من قبضتهم على أهالي الأردن.", "type": "فتح"}, {"date": "813م", "event": "ثورة خالد بن سعيد الأموي (الفديني)", "details": "قاد خالد بن سعيد الأموي المعروف بالفديني ثورة فاشلة من حصن الفدين في محافظة المفرق وامتدت حتى منطقة حسبان ضد الحكم العباسي، في محاولة منه لاسترداد الخلافة الأموية.", "type": "ثورة"}], "cards": [{"type": "دولة", "title": "الدولة العباسية", "summary": "الدولة التي حكمت العالم الإسلامي بعد سقوط الأمويين وعاصمتها بغداد.", "details": "الدولة العباسية (132 - 656 هـ / 750 - 1258م) هي الدولة التي حكمت العالم الإسلامي بعد سقوط الدولة الأموية. سموا العباسيين نسبة إلى العباس بن عبد المطلب عم الرسول، واتخذوا من اللون الأسود شعاراً لهم."}, {"type": "مكان", "title": "الحميمة", "summary": "قرية في محافظة العقبة كانت مركز الدعوة العباسية السرية.", "details": "قرية تقع في محافظة العقبة من أرض البلقاء، أقطعها الخليفة الأموي عبد الملك بن مروان لعلي بن عبد الله بن العباس. اتخذها محمد بن علي مركزاً لدعوته السرية لإحلال بني العباس محل بني أمية، لوقوعها على طريق الحج وموقعها المتوسط بين المشرق والمغرب الإسلامي."}, {"type": "شخصية", "title": "محمد بن علي العباسي", "summary": "صاحب الدعوة العباسية الذي اتخذ الحميمة مركزاً لها.", "details": "ابن علي بن عبد الله بن العباس، أوصى له أبو هاشم عبد الله بن محمد بن الحنفية بالخلافة. اتخذ من الحميمة مركزاً لدعوته السرية الرامية لإحلال بني العباس محل بني أمية، ومنها انطلقت دعوته إلى الكوفة وخراسان."}, {"type": "شخصية", "title": "أبو العباس السفاح", "summary": "أول خليفة عباسي ولد في الحميمة بالأردن.", "details": "أحد أبرز الخلفاء العباسيين الذين ولدوا في الحميمة بالأردن، إلى جانب أبي جعفر المنصور والمهدي."}, {"type": "حرب", "title": "معركة الزاب", "summary": "المعركة الفاصلة التي أنهت حكم الأمويين عام 132هـ.", "details": "وقعت عام 132هـ / 750م على أحد روافد نهر دجلة، انتصر فيها الجيش العباسي بقيادة عبد الله بن علي العباسي على الجيش الأموي بقيادة مروان بن محمد، وأنهت الدولة الأموية."}, {"type": "شخصية", "title": "خالد بن سعيد الفديني", "summary": "أموي قاد ثورة من حصن الفدين ضد العباسيين عام 813م.", "details": "أموي معروف بالفديني، قاد ثورة فاشلة عام 813م من حصن الفدين في محافظة المفرق وامتدت حتى منطقة حسبان ضد الحكم العباسي، في محاولة لاسترداد الخلافة الأموية."}]}, {"id": "lesson_2_2_4", "title": "الأردن تحت غزو الفرنجة لبلاد الشام", "timeline": [{"date": "492هـ / 1099م", "event": "احتلال الفرنجة للقدس واتجاه أنظارهم إلى الأردن", "details": "بعد احتلال الفرنجة للقدس اتجهت أنظارهم إلى الأردن، لأنه الخط الدفاعي عن مملكتهم في القدس من غارات القبائل العربية المجاورة، وحلقة وصل بين بلاد الشام ومصر والجزيرة العربية.", "type": "حرب"}, {"date": "بداية القرن 12م", "event": "بناء قلعة الشوبك (مونتريال)", "details": "شن الملك بلدوين الأول ملك القدس هجوماً على القبائل العربية القاطنة بالقرب من البحر الميت، واختار موقعاً حصيناً وإستراتيجياً وبنى عليه قلعة مونتريال (قلعة الشوبك) جنوبي الأردن، وأقام فيها حامية عسكرية من الفرسان والمشاة.", "type": "بناء"}, {"date": "1142م تقريباً", "event": "بناء قلعة الكرك", "details": "بنى الملك فولك أنجو ملك القدس قلعة الكرك على أنقاض قلعة قديمة تعود إلى المملكة المؤابية؛ لتكون مركزاً للمنطقة الفرنجية في شرقي مملكة بيت المقدس، وإحكاماً لسيطرتها على القبائل المحيطة وطرق المواصلات.", "type": "بناء"}, {"date": "583هـ / 1187م", "event": "معركة حطين", "details": "هزم صلاح الدين الأيوبي الفرنجة في معركة حطين وحرر القدس، ثم توجه إلى الكرك والشوبك وحاصرهما وحررهما.", "type": "حرب"}], "cards": [{"type": "حركة", "title": "حملات الفرنجة", "summary": "هجمات أوروبية على بلاد الشام لتأسيس مملكة في بيت المقدس.", "details": "تعرضت بلاد الشام في نهاية القرن الحادي عشر الميلادي إلى هجمات شرسة قادها ملوك وأمراء أوروبا للسيطرة على الأراضي المقدسة، وتأسيس مملكة لهم في بيت المقدس، مستغلين حالة الضعف والفرقة والصراع السياسي في العالم الإسلامي، ومدفوعين بعوامل سياسية ودينية واقتصادية."}, {"type": "شخصية", "title": "بلدوين الأول", "summary": "ملك القدس الفرنجي الذي أمر ببناء قلعة الشوبك.", "details": "ملك القدس الفرنجي الأول، شن هجوماً على القبائل العربية القاطنة قرب البحر الميت، وبنى قلعة مونتريال (الشوبك) جنوبي الأردن، ثم احتل أيلة (العقبة) وبنى فيها حصناً ليسيطر على الطريق بين الشام ومصر."}, {"type": "شخصية", "title": "فولك أنجو", "summary": "ملك القدس الذي بنى قلعة الكرك.", "details": "Fulk of Anjou، ملك القدس الذي بنى قلعة الكرك على أنقاض قلعة قديمة تعود إلى المملكة المؤابية، لتكون مركزاً للمنطقة الفرنجية في شرقي مملكة بيت المقدس." القاعة الناصرية."}, {"type": "دولة", "title": "إمارة الكرك الأيوبية", "summary": "إمارة أسسها الملك الناصر داود ضمت الأردن ومناطق فلسطينية.", "details": "تأسست في عهد الملك الناصر داود، ضمت كل المناطق والمدن الأردنية الحالية بالإضافة إلى نابلس والقدس والخليل، وكان لها تنظيمات إدارية وجيش ووزراء."}, {"type": "حركة", "title": "المغول", "summary": "غزاة دخلوا الأردن عام 1260م وحاصروا قلعة عجلون.", "details": "هاجموا دمشق في عام 658هـ/1260م، ودخلت قواتهم أرض الأردن، واستعصت عليهم قلعة عجلون فحاصروها إلى أن استسلمت بعد قتل حاميتها وهدم أجزاء منها."}, {"type": "مكان", "title": "مسجد عجلون الكبير", "summary": "أحد أقدم المساجد في الأردن بناه الملك الصالح نجم الدين أيوب.", "details": "يقع في وسط مدينة عجلون، أمر ببنائه الملك الصالح نجم الدين أيوب، يؤكد ذلك النقش المثبت فوق عتبة المدخل الشمالي، ويعد من أقدم المساجد في الأردن."}, {"type": "شخصية", "title": "عبد الحميد الخسروشاهي", "summary": "عالم حكيم عاش في الكرك واشتهر بالعلوم الطبية والفلسفية.", "details": "عاش في الكرك، اشتهر بتدريس العلوم الطبية والفلسفية والفقهية والشرعية، من مؤلفاته كتاب (مختصر المهذب في الفقه)."}, {"type": "شخصية", "title": "سبط بن الجوزي", "summary": "مؤرخ من أشهر علماء الكرك مؤلف تاريخ مرآة الزمان.", "details": "المؤرخ سبط بن الجوزي مؤلف كتاب (تاريخ مرآة الزمان)، وهو من أشهر العلماء الذين أقاموا في الكرك."}, {"type": "شخصية", "title": "جمال الدين محمد بن واصل", "summary": "مؤرخ ألف كتاب مفرج الكروب في أخبار بني أيوب.", "details": "مؤرخ قدم مع والده من حماة إلى الكرك زمن الملك الناصر داود، مؤلف كتاب (مفرج الكروب في أخبار بني أيوب)."}, {"type": "مكان", "title": "قلعة السلط", "summary": "قلعة بناها الملك المعظم عيسى على رأس الأمير.", "details": "بنى الأيوبيون قلعة السلط في مدينة السلط غرب عمان، وتشير المصادر التاريخية إلى أن الملك المعظم عيسى هو من أمر ببناء حصن على قمة جبل يسمى رأس الأمير."}]}, {"id": "lesson_2_2_6", "title": "الأردن في العصر المملوكي", "timeline": [{"date": "648هـ / 1250م", "event": "تأسيس الدولة المملوكية", "details": "تأسست الدولة المملوكية بعد سقوط الدولة الأيوبية في مصر، وشملت ب لت إليه مهمة حراسة طريق الحج وتوفير الأمن مقابل تقديم قواته للسلطان عند الحاجة."}, {"type": "مفهوم", "title": "نيابتا الكرك ودمشق", "summary": "التقسيم الإداري للأردن في العصر المملوكي.", "details": "قسم المماليك الأردن إلى نيابتين: نيابة الكرك تمتد من وادي الموجب شمالاً إلى العقبة جنوباً، ونيابة دمشق تضم في الأردن المنطقة الممتدة من نهر اليرموك شمالاً إلى وادي الموجب جنوباً."}, {"type": "مفهوم", "title": "البريد المملوكي والحمام الزاجل", "summary": "نظام اتصالات مملوكي بمحطات في الأردن.", "details": "أنشأ المماليك محطات للبريد بين الشام ومصر مرورا بالأردن، ومنها غور الصافي والكرك والربة وذيبان وحسبان وإربد. واستخدموا الحمام الزاجل لنقل الأخبار بسرعة، ومن مراكزه: الكرك وحسبان والبرج الأبيض وعمان وعجلون."}, {"type": "مكان", "title": "خان (قلعة) القطرانة", "summary": "خان مملوكي لخدمة طريق الحج الشامي.", "details": "أنشأه المماليك على طريق الحج الشامي لخدمة الحجاج وتوفير الراحة لهم، ويعد من أبرز الخانات الأيوبية المملوكية في الأردن."}, {"type": "مفهوم", "title": "صناعة السكر المملوكية", "summary": "صناعة ازدهرت في الأغوار الأردنية لجودتها.", "details": "اهتم المماليك بزراعة قصب السكر في منطقة الأغوار الأردنية، وبلغت صناعة السكر أوج ازدهارها بسبب جودته ونقائه، فأنشأوا المصانع لعصره. وأشارت الوثائق إلى وجود سكر الكرك والشوبك في أسواق فلورنسا بإيطاليا."}, {"type": "شخصية", "title": "عائشة الباعونية", "summary": "عالمة أردنية من باعون بمحافظة عجلون.", "details": "عائشة بنت يوسف الباعونية، وصفت بالصلاح والعلم، لها العديد من المؤلفات منها كتاب (الملامح الشريفة والآثار المنيفة)."}, {"type": "شخصية", "title": "أبو الفرج بن يعقوب بن القف الكركي", "summary": "طبيب من الكرك له مؤلفات في الطب والجراحة.", "details": "طبيب من الكرك، مارس مهنة الطب في دمشق، له العديد من المؤلفات منها كتاب (الشافي في الطب) وكتاب (العمدة في صناعة الجراح)."}, {"type": "مفهوم", "title": "المكوس", "summary": "ضرائب تفرض على البضائع المستوردة.", "details": "ضرائب كان المماليك يفرضونها على البضائع المستوردة، وأنشأوا مراكز خاصة بجمعها مثل مركزَي الحسا والعقبة، ويصف ابن إياس العقبة بأنه كان فيها قصر عال يقيم فيه قباض المكوس."}]}, {"id": "lesson_2_2_7", "title": "المسكوكات (النقود) في الأردن", "timeline": [{"date": "القرن 7 ق.م", "event": "ظهور أولى القطع النقدية في ليديا", "details": "في القرن السابع قبل الميلاد ظهرت أولى القطع النقدية في مدينة ليديا في آسيا الصغرى في عهد الملك كرسيوس، ومن ثم أخذت الممالك والدول المجاورة بسك النقود وأنشئت دور خاصة لسكها.", "type": "اكتشاف"}, {"date": "77هـ / 696م", "event": "ضرب فلس أموي في جرش", "details": "فلس أموي سك في مدينة جرش، يعتقد أنه ضرب في عام 77هـ/696م، ويعد من المسكوكات النقدية النحاسية بعد إجراء الخليفة عبد الملك بن مروان عملية التعريب.", "type": "أخرى"}, {"date": "158هـ / 774م", "event": "ضرب فلس عباسي نادر في عمان", "details": "فلس عباسي نادر ضرب في عمان في عام 158هـ/774م، يدل على استمرار مكانة عمان مركزاً لسك النقود في العصر العباسي.", "type": "أخرى"}, {"date": "1991م", "event": "إهداء مجموعة سمير شما إلى جامعة اليرموك", "details": "أهدى المحسن الأردني سمير شما مجموعة نادرة من العملات الذهبية والفضية التي تعود إلى العصور الإسلامية جميعها إلى جامعة اليرموك، وعرضت في قاعة المسكوكات في متحف التراث الأردني.", "type": "أخرى"}], "cards": [{"type": "مفهوم", "title": "المقايضة", "summary": "نظام التبادل قبل ظهور النقود.", "details": "مبادلة سلعة بسلعة بين ما ينتجه الفلاحون وما ينتجه الصناع، بدأ بها الإنسان للتجارة قبل اختراع النقود، ثم توصل إلى إيجاد وحدة معيارية تقاس بها قيم السلع والخدمات."}, {"type": "مفهوم", "title": "السكة (دار الضرب)", "summary": "المكان الذي تصدر فيه العملات النقدية.", "details": "دار السكة أو دار الضرب هي المكان الذي تصدر فيه العملات النقدية الذهبية أو الفضية أو النحاسية أو البرونزية. حرصت الدول على كشف النقود المزيفة عبر طرائق مختلفة كالحك والكثافة النوعية."}, {"type": "مفهوم", "title": "النقاد", "summary": "الشخص المختص بفحص النقود وتمييز الجيد من الرديء.", "details": "هو شخص كان يوجد في الأسواق يختص بعملية فحص النقود وتمييز الجيد من الرديء، ينقد الدنانير والدراهم، ويحذر الناس من غش النقود وتزييفها."}, {"type": "مفهوم", "title": "تعريب النقود", "summary": "عملية صبغ النقود بالطابع العربي في عهد عبد الملك بن مروان.", "details": "أدرك الخليفة الأموي عبد الملك بن مروان ضرورة تأكيد كيان الدولة وصبغها بالصبغة العربية، فعمد إلى تعريب النقود والقراطيس والوثائق الرسمية والدواوين. وأصبح للعرب سكة نقدية خاصة بهم على الطراز العربي الإسلامي."}, {"type": "شخصية", "title": "عبد الملك بن مروان", "summary": "الخليفة الأموي الذي عرب النقود.", "details": "الخليفة الأموي الذي أدرك ضرورة تأكيد كيان الدولة السياسي والاقتصادي وصبغها بالصبغة العربية، فعمد إلى تعريب النقود والقراطيس والوثائق الرسمية والدواوين، وهذا يعد بداية الاستقلال النقدي للمجتمع العربي الإسلامي."}, {"type": "مصطلح", "title": "الدينار الذهبي البيزنطي", "summary": "العملة الذهبية البيزنطية المستخدمة في صدر الإسلام.", "details": "عملة ذهبية بيزنطية كانت تتداول في بلاد الشام وترد إلى شبه الجزيرة العربية عن طريق التجارة قبل الإسلام، أقرها النبي محمد صلى الله عليه وسلم وخلفاؤه، ثم عربها عبد الملك بن مروان."}, {"type": "مصطلح", "title": "الدرهم الفضي الساساني", "summary": "العملة الفضية الساسانية المستخدمة في صدر الإسلام.", "details": "عملة فضية ساسانية كانت تتداول في بلاد فارس والعراق، استخدمها المسلمون في صدر الإسلام، وبدأت محاولات تعريبه في عهد عمر بن الخطاب ثم عثمان ثم معاوية وأخيراً عبد الملك بن مروان."}, {"type": "مصطلح", "title": "الفلس", "summary": "عملة نحاسية للمعاملات التجارية البسيطة.", "details": "عرفه العرب عن طريق معاملاتهم مع البيزنطيين، ولم يكن له وزن واحد، اختلف وزنه من إقليم إلى آخر. كان عملة للمعاملات التجارية البسيطة، وعرب في عهد عبد الملك بن مروان."}, {"type": "مصطلح", "title": "القراطيس", "summary": "أوراق البردي التي كانت تصنع في مصر.", "details": "أوراق البردي التي كانت تصنع في مصر وتصدر إلى القسطنطينية، عربها الخليفة عبد الملك بن مروان ضمن إجراءات صبغ الدولة بالصبغة العربية."}, {"type": "مكان", "title": "متحف النقد الأردني", "summary": "متحف تابع للبنك المركزي يوثق المسكوكات الأردنية.", "details": "متحف تابع للبنك المركزي الأردني، يحتوي على مجموعة من المسكوكات القديمة والحديثة التي جرى تداولها في الأردن منذ العهد اليوناني إلى آخر إصدار أردني، بالإضافة إلى إصدارات مجلس النقد الأردني."}, {"type":
